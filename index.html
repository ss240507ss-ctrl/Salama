<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Salama">
    <title>Salama - Care Coordination Platform</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://gqgsmhqpixvqxkynpotc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ3NtaHFwaXh2cXhreW5wb3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDA3NjMsImV4cCI6MjA4NTY3Njc2M30.sbscrW-ho5JnwtAo1732bb5q5kBfkkzxrTmPjAIe8u4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // SVG Icons
        const User = ({className}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );
        
        const Mic = ({className}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        );
        
        const Keyboard = ({className}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"></path>
            </svg>
        );
        
        const Users = ({className}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const Briefcase = ({className}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
        );

        const SalamaApp = () => {
          // Existing state
          const [currentUser, setCurrentUser] = useState(null);
          const [isLoading, setIsLoading] = useState(true);
          const [showAuth, setShowAuth] = useState(false);
          const [authMode, setAuthMode] = useState('login');
          const [authForm, setAuthForm] = useState({ username: '', password: '', name: '', role: '' });
          const [showPassword, setShowPassword] = useState(false);
          const [currentPage, setCurrentPage] = useState('home');
          const [currentCardIndex, setCurrentCardIndex] = useState(0);
          const [selectedMood, setSelectedMood] = useState(null);
          const [isRecording, setIsRecording] = useState(false);
          const [sosPressed, setSosPressed] = useState(false);
          const [okPressed, setOkPressed] = useState(false);
          const [showSidebar, setShowSidebar] = useState(false);
          const [chatWith, setChatWith] = useState(null);
          const [showCommunities, setShowCommunities] = useState(false);
          const [chatMessages, setChatMessages] = useState([]);
          const [messageInput, setMessageInput] = useState('');
          const [showProtectionChat, setShowProtectionChat] = useState(false);
          const [protectionMessages, setProtectionMessages] = useState([]);
          const [protectionInput, setProtectionInput] = useState('');
          const [isAIThinking, setIsAIThinking] = useState(false);
          const [backgroundMonitoring, setBackgroundMonitoring] = useState(true);
          const [monitoringAlerts, setMonitoringAlerts] = useState([]);
          const [showQRCode, setShowQRCode] = useState(false);
          const [showQRScanner, setShowQRScanner] = useState(false);
          const [qrCodeData, setQRCodeData] = useState('');
          const [currentTime, setCurrentTime] = useState(new Date());
          const [caregivers, setCaregivers] = useState([]);
          const [medications, setMedications] = useState([]);
          const [appointments, setAppointments] = useState([]);
          const [activities, setActivities] = useState([]);
          const [documents, setDocuments] = useState([]);
          const [showAddMedication, setShowAddMedication] = useState(false);
          const [showAddAppointment, setShowAddAppointment] = useState(false);
          const [showAddActivity, setShowAddActivity] = useState(false);
          const [showDocumentUpload, setShowDocumentUpload] = useState(false);
          const [showProfileEdit, setShowProfileEdit] = useState(false);
          const [profileForm, setProfileForm] = useState({ name: '', avatar: '' });
          const [newMed, setNewMed] = useState({ medication_name: '', dosage: '', time: '', notes: '' });
          const [newAppointment, setNewAppointment] = useState({ appointment_name: '', appointment_time: '', location: '', notes: '' });
          const [newActivity, setNewActivity] = useState({ activity_name: '', time: '', notes: '' });
          const [uploadingFile, setUploadingFile] = useState(false);
          const [showSettings, setShowSettings] = useState(false);
          const [caregiverPermissions, setCaregiverPermissions] = useState([]);
          const [viewingCareRecipient, setViewingCareRecipient] = useState(null);
          const [myCareRecipients, setMyCareRecipients] = useState([]);
          const [memories, setMemories] = useState([]);
          const [showAddMemory, setShowAddMemory] = useState(false);
          const [newMemory, setNewMemory] = useState({ title: '', description: '' });
          const [uploadingMemory, setUploadingMemory] = useState(false);
          const [thoughtRecordings, setThoughtRecordings] = useState([]);
          const [showThoughtRecordings, setShowThoughtRecordings] = useState(false);
          const [mediaRecorder, setMediaRecorder] = useState(null);
          const [audioChunks, setAudioChunks] = useState([]);
          const [recordingDuration, setRecordingDuration] = useState(0);
          const [recordingTimer, setRecordingTimer] = useState(null);
          const [showDocumentQRManager, setShowDocumentQRManager] = useState(false);
          const [documentShareLinks, setDocumentShareLinks] = useState([]);
          const [showCreateShareLink, setShowCreateShareLink] = useState(false);
          const [newShareLink, setNewShareLink] = useState({ name: '', type: 'all_documents', selected_docs: [] });
          const [showSharedDocuments, setShowSharedDocuments] = useState(false);
          const [sharedDocumentsData, setSharedDocumentsData] = useState(null);

          // NEW PROFESSIONAL FEATURES STATE
          const [isProfessional, setIsProfessional] = useState(false);
          const [professionalProfile, setProfessionalProfile] = useState(null);
          const [showProfessionalSetup, setShowProfessionalSetup] = useState(false);
          const [professionalForm, setProfessionalForm] = useState({
            full_name: '',
            professional_type: 'nurse',
            license_number: '',
            years_experience: '',
            languages_spoken: [],
            location: '',
            city: '',
            state: '',
            country: '',
            bio: '',
            hourly_rate: ''
          });
          const [careRequests, setCareRequests] = useState([]);
          const [showCareRequestModal, setShowCareRequestModal] = useState(false);
          const [newCareRequest, setNewCareRequest] = useState({
            professional_type: 'nurse',
            location: '',
            urgency_level: 'medium',
            care_needs_description: '',
            preferred_languages: [],
            start_date: '',
            duration_weeks: 4
          });
          const [myAssignments, setMyAssignments] = useState([]);
          const [dailyCareLogs, setDailyCareLogs] = useState([]);
          const [showDailyCareLogModal, setShowDailyCareLogModal] = useState(false);
          const [selectedAssignment, setSelectedAssignment] = useState(null);
          const [careTips, setCareTips] = useState([]);
          const [todaysTip, setTodaysTip] = useState(null);
          const [careTasks, setCareTasks] = useState([]);
          const [showTaskModal, setShowTaskModal] = useState(false);
          const [newTask, setNewTask] = useState({
            task_name: '',
            description: '',
            due_date: '',
            priority: 'medium',
            assigned_to: ''
          });
            const checkUser = async () => {
            const userId = localStorage.getItem('salamaUserId');
            if (userId) {
              const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('id', userId)
                .single();
              
              if (data) {
                setCurrentUser(data);
                
                // Check if user is a professional
                if (data.role_type === 'professional') {
                  setIsProfessional(true);
                  loadProfessionalProfile(userId);
                }
              }
            }
            setIsLoading(false);
          };

          useEffect(() => {
            checkUser();
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            
            const urlParams = new URLSearchParams(window.location.search);
            const shareCode = urlParams.get('share');
            if (shareCode) {
              viewSharedDocuments(shareCode);
            }
            
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            if (currentUser) {
              if (currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') {
                loadCaregivers();
                loadDocumentShareLinks();
                loadCareTips();
              }
              if (currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') {
                loadMyCareRecipients();
              }
              if (isProfessional) {
                loadCareRequests();
                loadMyAssignments();
              }
              loadUserData();
              loadMemories();
              loadThoughtRecordings();
              loadCareTasks();
            }
          }, [currentUser, isProfessional]);

          useEffect(() => {
            if (viewingCareRecipient) {
              loadUserData();
              loadMemories();
              loadThoughtRecordings();
              loadCareTasks();
            }
          }, [viewingCareRecipient]);

          const loadProfessionalProfile = async (userId) => {
            const { data } = await supabase
              .from('professionals')
              .select('*')
              .eq('user_id', userId)
              .single();
            
            if (data) {
              setProfessionalProfile(data);
            } else {
              setShowProfessionalSetup(true);
            }
          };

          const loadCareTips = async () => {
            const { data } = await supabase
              .from('care_tips')
              .select('*')
              .eq('is_active', true);
            
            if (data && data.length > 0) {
              setCareTips(data);
              const randomTip = data[Math.floor(Math.random() * data.length)];
              setTodaysTip(randomTip);
            }
          };

          const loadCareTasks = async () => {
            if (!currentUser) return;
            
            let query = supabase.from('care_tasks').select('*');
            
            if (viewingCareRecipient) {
              query = query.eq('care_recipient_id', viewingCareRecipient.id);
            } else if (currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') {
              query = query.eq('care_recipient_id', currentUser.id);
            } else {
              query = query.eq('assigned_to', currentUser.id);
            }
            
            const { data } = await query.order('created_at', { ascending: false });
            if (data) setCareTasks(data);
          };

          const loadCareRequests = async () => {
            const { data } = await supabase
              .from('care_requests')
              .select('*')
              .eq('status', 'open')
              .order('created_at', { ascending: false });
            
            if (data) setCareRequests(data);
          };

          const loadMyAssignments = async () => {
            if (!professionalProfile) return;
            
            const { data } = await supabase
              .from('care_assignments')
              .select(`
                *,
                care_recipient:users!care_assignments_care_recipient_id_fkey(id, name, avatar)
              `)
              .eq('professional_id', professionalProfile.id)
              .in('status', ['active', 'paused'])
              .order('start_date', { ascending: false });
            
            if (data) setMyAssignments(data);
          };

          const loadUserData = async () => {
            if (!currentUser) return;
            
            let targetUserId = currentUser.id;
            
            if (viewingCareRecipient) {
              targetUserId = viewingCareRecipient.id;
            }
            
            const { data: medsData } = await supabase
              .from('medications')
              .select('*')
              .eq('user_id', targetUserId)
              .order('created_at', { ascending: false });
            if (medsData) setMedications(medsData);
            
            const { data: apptData } = await supabase
              .from('appointments')
              .select('*')
              .eq('user_id', targetUserId)
              .order('created_at', { ascending: false });
            if (apptData) setAppointments(apptData);
            
            const { data: actData } = await supabase
              .from('activities')
              .select('*')
              .eq('user_id', targetUserId)
              .order('created_at', { ascending: false });
            if (actData) setActivities(actData);
            
            const { data: docsData } = await supabase
              .from('documents')
              .select('*')
              .eq('user_id', targetUserId)
              .order('uploaded_at', { ascending: false });
            if (docsData) setDocuments(docsData);
          };

          const loadCaregivers = async () => {
            if (!currentUser || (currentUser.role !== 'care_recipient' && currentUser.role_type !== 'care_recipient')) return;
            
            const { data } = await supabase
              .from('caregivers')
              .select('caregiver_user_id')
              .eq('care_circle_id', currentUser.care_circle_id);

            if (data && data.length > 0) {
              const caregiverIds = data.map(c => c.caregiver_user_id);
              const { data: caregiversData } = await supabase
                .from('users')
                .select('*')
                .in('id', caregiverIds);
              
              setCaregivers(caregiversData || []);
              loadCaregiverPermissions(caregiverIds);
            }
          };

          const loadCaregiverPermissions = async (caregiverIds) => {
            const { data } = await supabase
              .from('caregiver_permissions')
              .select('*')
              .eq('care_recipient_id', currentUser.id)
              .in('caregiver_id', caregiverIds);
            
            setCaregiverPermissions(data || []);
          };

          const loadMyCareRecipients = async () => {
            if (!currentUser || (currentUser.role !== 'caregiver' && currentUser.role_type !== 'family_caregiver')) return;
            
            const { data } = await supabase
              .from('caregivers')
              .select('care_circle_id')
              .eq('caregiver_user_id', currentUser.id);

            if (data && data.length > 0) {
              const circleIds = data.map(c => c.care_circle_id);
              const { data: recipientsData } = await supabase
                .from('users')
                .select('*')
                .in('care_circle_id', circleIds)
                .or('role.eq.care_recipient,role_type.eq.care_recipient');
              
              setMyCareRecipients(recipientsData || []);
            }
          };

          const viewCareRecipientData = async (recipient) => {
            setViewingCareRecipient(recipient);
            
            const { data: perms } = await supabase
              .from('caregiver_permissions')
              .select('*')
              .eq('care_recipient_id', recipient.id)
              .eq('caregiver_id', currentUser.id)
              .single();
            
            if (!perms) {
              await supabase.from('caregiver_permissions').insert([{
                care_recipient_id: recipient.id,
                caregiver_id: currentUser.id,
                can_view_documents: true,
                can_view_medications: true,
                can_view_appointments: true,
                can_view_activities: true,
                receive_quick_texts: true
              }]);
            }
          };

          const updateCaregiverPermission = async (caregiverId, field, value) => {
            const { data: existing } = await supabase
              .from('caregiver_permissions')
              .select('*')
              .eq('care_recipient_id', currentUser.id)
              .eq('caregiver_id', caregiverId)
              .maybeSingle();
            
            if (existing) {
              await supabase
                .from('caregiver_permissions')
                .update({ [field]: value })
                .eq('id', existing.id);
            } else {
              await supabase.from('caregiver_permissions').insert([{
                care_recipient_id: currentUser.id,
                caregiver_id: caregiverId,
                [field]: value
              }]);
            }
            
            loadCaregivers();
          };
            const createProfessionalProfile = async () => {
            if (!professionalForm.full_name || !professionalForm.professional_type) {
              alert('Please fill in all required fields');
              return;
            }

            const { data, error } = await supabase
              .from('professionals')
              .insert([{
                user_id: currentUser.id,
                full_name: professionalForm.full_name,
                professional_type: professionalForm.professional_type,
                license_number: professionalForm.license_number,
                years_experience: parseInt(professionalForm.years_experience) || 0,
                languages_spoken: professionalForm.languages_spoken,
                location: professionalForm.location,
                city: professionalForm.city,
                state: professionalForm.state,
                country: professionalForm.country,
                bio: professionalForm.bio,
                hourly_rate: parseFloat(professionalForm.hourly_rate) || null,
                is_verified: false,
                availability_status: 'available'
              }])
              .select()
              .single();

            if (data) {
              setProfessionalProfile(data);
              setShowProfessionalSetup(false);
              
              // Update user role_type
              await supabase
                .from('users')
                .update({ role_type: 'professional' })
                .eq('id', currentUser.id);
              
              setCurrentUser({ ...currentUser, role_type: 'professional' });
              alert('Professional profile created! Your verification request has been submitted.');
            } else {
              alert('Error creating profile: ' + error?.message);
            }
          };

          const updateProfessionalAvailability = async (status) => {
            if (!professionalProfile) return;

            await supabase
              .from('professionals')
              .update({ availability_status: status })
              .eq('id', professionalProfile.id);

            setProfessionalProfile({ ...professionalProfile, availability_status: status });
          };

          const createCareRequest = async () => {
            if (!newCareRequest.care_needs_description || !newCareRequest.professional_type) {
              alert('Please fill in care needs and professional type');
              return;
            }

            const targetRecipientId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

            const { data, error } = await supabase
              .from('care_requests')
              .insert([{
                care_recipient_id: targetRecipientId,
                requested_by: currentUser.id,
                professional_type: newCareRequest.professional_type,
                location: newCareRequest.location,
                urgency_level: newCareRequest.urgency_level,
                care_needs_description: newCareRequest.care_needs_description,
                preferred_languages: newCareRequest.preferred_languages,
                start_date: newCareRequest.start_date || null,
                duration_weeks: parseInt(newCareRequest.duration_weeks) || 4,
                status: 'open'
              }])
              .select()
              .single();

            if (data) {
              setShowCareRequestModal(false);
              setNewCareRequest({
                professional_type: 'nurse',
                location: '',
                urgency_level: 'medium',
                care_needs_description: '',
                preferred_languages: [],
                start_date: '',
                duration_weeks: 4
              });
              alert('Care request posted! Professionals will be notified.');
              loadCareRequests();
            } else {
              alert('Error creating request: ' + error?.message);
            }
          };

          const respondToCareRequest = async (requestId, status, message = '') => {
            if (!professionalProfile) return;

            const { data, error } = await supabase
              .from('care_request_responses')
              .insert([{
                request_id: requestId,
                professional_id: professionalProfile.id,
                status: status,
                message: message,
                proposed_rate: professionalProfile.hourly_rate
              }])
              .select()
              .single();

            if (data) {
              alert(`Response sent! Status: ${status}`);
              loadCareRequests();
            } else {
              alert('Error sending response: ' + error?.message);
            }
          };

          const createDailyCareLog = async (assignmentId, logData) => {
            if (!professionalProfile) return;

            const assignment = myAssignments.find(a => a.id === assignmentId);
            if (!assignment) return;

            const { data, error } = await supabase
              .from('daily_care_logs')
              .insert([{
                assignment_id: assignmentId,
                professional_id: professionalProfile.id,
                care_recipient_id: assignment.care_recipient_id,
                log_date: new Date().toISOString().split('T')[0],
                check_in_time: logData.check_in_time,
                check_out_time: logData.check_out_time,
                activities_performed: logData.activities_performed || [],
                vital_signs: logData.vital_signs || {},
                medications_administered: logData.medications_administered || [],
                observations: logData.observations,
                incidents: logData.incidents,
                family_communication: logData.family_communication
              }])
              .select()
              .single();

            if (data) {
              alert('Daily care log saved successfully!');
              setShowDailyCareLogModal(false);
            } else {
              alert('Error saving log: ' + error?.message);
            }
          };

          const createCareTask = async () => {
            if (!newTask.task_name) {
              alert('Please enter a task name');
              return;
            }

            const targetRecipientId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

            const { data, error } = await supabase
              .from('care_tasks')
              .insert([{
                care_recipient_id: targetRecipientId,
                assigned_to: newTask.assigned_to || null,
                created_by: currentUser.id,
                task_name: newTask.task_name,
                description: newTask.description,
                due_date: newTask.due_date || null,
                priority: newTask.priority,
                status: 'pending'
              }])
              .select()
              .single();

            if (data) {
              setCareTasks([data, ...careTasks]);
              setShowTaskModal(false);
              setNewTask({
                task_name: '',
                description: '',
                due_date: '',
                priority: 'medium',
                assigned_to: ''
              });
              alert('Task created successfully!');
            } else {
              alert('Error creating task: ' + error?.message);
            }
          };

          const updateTaskStatus = async (taskId, newStatus) => {
            const updates = { status: newStatus };
            
            if (newStatus === 'completed') {
              updates.completed_at = new Date().toISOString();
            }
            
            if (newStatus === 'verified') {
              updates.verified_by = currentUser.id;
              updates.verified_at = new Date().toISOString();
            }

            await supabase
              .from('care_tasks')
              .update(updates)
              .eq('id', taskId);

            setCareTasks(careTasks.map(t => 
              t.id === taskId ? { ...t, ...updates } : t
            ));
          };

          const submitDailyCheckIn = async (mood, notes) => {
            const { data, error } = await supabase
              .from('daily_checkins')
              .insert([{
                user_id: currentUser.id,
                check_in_date: new Date().toISOString().split('T')[0],
                status: 'checked_in',
                mood: mood,
                notes: notes
              }])
              .select()
              .single();

            if (data) {
              alert('Daily check-in submitted!');
            } else if (error?.code === '23505') {

                      message: `AI detected concern: "${question.substring(0, 50)}..." - Caregivers notified.`
                    }]);
                  }, 1000);
                }
                
                setProtectionMessages(prev => [...prev, {
                  text: data.response,
                  sender: "salama",
                  time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
              } else if (data.fallback) {
                throw new Error('AI service unavailable');
              }
            } catch (error) {
              console.error('AI Error:', error);
              
              let fallbackResponse = "I'm here with you. ";
              const lq = question.toLowerCase();
              
              if (lq.includes('lonely') || lq.includes('alone')) {
                fallbackResponse += "I understand feeling lonely can be hard. Would you like to talk about what's on your mind, or shall I help you connect with someone from your care circle?";
              } else if (lq.includes('pain') || lq.includes('hurt')) {
                fallbackResponse += "I'm concerned to hear you're in pain. I'm notifying your caregivers right away. Can you describe where it hurts?";
              } else if (lq.includes('hello') || lq.includes('hi')) {
                fallbackResponse += "Hello! It's wonderful to hear from you. How can I help you today?";
              } else if (lq.includes('thank')) {
                fallbackResponse += "You're very welcome! I'm always here whenever you need me.";
              } else {
                fallbackResponse += "I'm having a small connection issue, but I'm here with you. If this is urgent, please use the SOS button or contact your caregiver directly.";
              }
              
              setProtectionMessages(prev => [...prev, {
                text: fallbackResponse,
                sender: "salama",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              }]);
            }
            
            setIsAIThinking(false);
          };

          const moods = [
            { emoji: '😡', color: 'bg-red-500' },
            { emoji: '😟', color: 'bg-orange-500' },
            { emoji: '😐', color: 'bg-yellow-500' },
            { emoji: '🙂', color: 'bg-lime-500' },
            { emoji: '😊', color: 'bg-green-500' }
          ];

          const quickTexts = [
            'I fell',
            'Mistreated',
            'I feel sick',
            'I need to go to the hospital',
            '(Customizable message)'
          ];

          const communities = [
            { id: 'internal', name: 'Internal (Caregivers)' },
            { id: 'group1', name: 'External (Support Group 1)' },
            { id: 'group2', name: 'External (Support Group 2)' },
            { id: 'group3', name: 'External (Support Group 3)' }
          ];

          const professionalTypes = [
            { value: 'nurse', label: 'Nurse' },
            { value: 'doctor', label: 'Doctor' },
            { value: 'therapist', label: 'Therapist' },
            { value: 'social_worker', label: 'Social Worker' },
            { value: 'aide', label: 'Home Health Aide' },
            { value: 'other', label: 'Other' }
          ];
            const renderNavBar = () => {
            if (isProfessional && !viewingCareRecipient) {
              return (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-teal-700 flex justify-around items-center py-2 z-50">
                  {[
                    { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                    { id: 'requests', label: 'Requests', icon: '📋' },
                    { id: 'assignments', label: 'Cases', icon: '👥' },
                    { id: 'profile', label: 'Profile', icon: '⚙️' }
                  ].map((item) => (
                    <button key={item.id} onClick={() => setCurrentPage(item.id)} className="flex flex-col items-center">
                      <span className="text-2xl mb-1">{item.icon}</span>
                      <span className={`text-xs ${currentPage === item.id ? 'text-teal-700 font-semibold' : 'text-teal-600'}`}>{item.label}</span>
                    </button>
                  ))}
                </div>
              );
            }
            
            return (
              <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-teal-700 flex justify-around items-center py-2 z-50">
                {[
                  { id: 'home', label: 'Home', icon: '🏠' },
                  { id: 'checkin', label: 'Check-In', icon: '📝' },
                  { id: 'carenotes', label: 'Care Notes', icon: '📋' },
                  { id: 'safety', label: 'Safety', icon: '🛡️' },
                  { id: 'carecircle', label: 'Care-Circle', icon: '👥' }
                ].map((item) => (
                  <button key={item.id} onClick={() => setCurrentPage(item.id)} className="flex flex-col items-center">
                    <span className="text-2xl mb-1">{item.icon}</span>
                    <span className={`text-xs ${currentPage === item.id ? 'text-teal-700 font-semibold' : 'text-teal-600'}`}>{item.label}</span>
                  </button>
                ))}
              </div>
            );
          };

          const renderHeader = (title) => (
            <div className="flex justify-between items-center mb-8">
              <button onClick={() => setShowSidebar(!showSidebar)} className="w-14 h-14 rounded-full border-2 border-white flex items-center justify-center">
                <User className="w-8 h-8 text-white" />
              </button>
              <h1 className="text-4xl font-serif text-white">{title}</h1>
              <button onClick={() => { setSosPressed(true); setTimeout(() => setSosPressed(false), 300); alert('🚨 SOS ALERT!'); }} className={`w-20 h-20 rounded-3xl bg-red-500 flex items-center justify-center transition-all ${sosPressed ? 'scale-95 animate-pulse' : 'hover:scale-105'}`}>
                <span className="text-white text-3xl font-bold">SOS</span>
              </button>
            </div>
          );

          if (isLoading) {
            return (
              <div className="w-full h-screen bg-gradient-to-b from-teal-600 to-blue-300 flex items-center justify-center">
                <div className="text-white text-4xl">Loading...</div>
              </div>
            );
          }

          if (!currentUser || showAuth) {
            return (
              <div className="w-full min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 flex items-center justify-center p-6">
                <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
                  <h1 className="text-4xl font-serif text-teal-700 text-center mb-8">Salama</h1>
                  <div className="flex gap-4 mb-6">
                    <button onClick={() => setAuthMode('login')} className={`flex-1 py-3 rounded-full ${authMode === 'login' ? 'bg-teal-600 text-white' : 'bg-gray-200'}`}>
                      Login
                    </button>
                    <button onClick={() => setAuthMode('signup')} className={`flex-1 py-3 rounded-full ${authMode === 'signup' ? 'bg-teal-600 text-white' : 'bg-gray-200'}`}>
                      Sign Up
                    </button>
                  </div>
                  <form onSubmit={handleAuth} className="space-y-4">
                    <input
                      type="text"
                      placeholder="Username"
                      value={authForm.username}
                      onChange={(e) => setAuthForm({...authForm, username: e.target.value})}
                      className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      required
                    />
                    <div className="relative">
                      <input
                        type={showPassword ? "text" : "password"}
                        placeholder="Password"
                        value={authForm.password}
                        onChange={(e) => setAuthForm({...authForm, password: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg pr-12"
                        required
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 text-2xl"
                      >
                        {showPassword ? '🙈' : '👁️'}
                      </button>
                    </div>
                    {authMode === 'signup' && (
                      <>
                        <input
                          type="text"
                          placeholder="Your Name"
                          value={authForm.name}
                          onChange={(e) => setAuthForm({...authForm, name: e.target.value})}
                          className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                          required
                        />
                        <div className="space-y-2">
                          <p className="text-lg font-semibold">Who are you?</p>
                          <label className="flex items-center gap-3 p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input
                              type="radio"
                              name="role"
                              value="care_recipient"
                              onChange={(e) => setAuthForm({...authForm, role: e.target.value})}
                              required
                            />
                            <span className="text-lg">I need care</span>
                          </label>
                          <label className="flex items-center gap-3 p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input
                              type="radio"
                              name="role"
                              value="caregiver"
                              onChange={(e) => setAuthForm({...authForm, role: e.target.value})}
                              required
                            />
                            <span className="text-lg">I provide care (Family)</span>
                          </label>
                          <label className="flex items-center gap-3 p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input
                              type="radio"
                              name="role"
                              value="professional"
                              onChange={(e) => setAuthForm({...authForm, role: e.target.value})}
                              required
                            />
                            <span className="text-lg">I'm a professional caregiver</span>
                          </label>
                        </div>
                      </>
                    )}
                    <button type="submit" className="w-full bg-teal-600 text-white py-4 rounded-lg text-lg font-semibold hover:bg-teal-700">
                      {authMode === 'login' ? 'Login' : 'Sign Up'}
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="w-full min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 pb-24 relative">
                {showSidebar && (
                <>
                  <div className="fixed inset-0 bg-black/50 z-40" onClick={() => setShowSidebar(false)} />
                  <div className="fixed left-0 top-0 bottom-0 w-64 bg-teal-600 z-50 p-6 shadow-2xl overflow-y-auto">
                    <button onClick={() => setShowSidebar(false)} className="absolute top-4 right-4 text-white text-2xl">✕</button>
                    <div className="mt-12">
                      <div className="text-center mb-6">
                        <div className="text-6xl mb-2">{currentUser.avatar}</div>
                        <p className="text-white text-xl font-semibold">{currentUser.name}</p>
                        <p className="text-white/80 text-sm">
                          {isProfessional ? 'Professional Caregiver' : 
                           currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient' ? 'Care Recipient' : 'Family Caregiver'}
                        </p>
                        {professionalProfile && (
                          <div className="mt-2">
                            {professionalProfile.is_verified ? (
                              <span className="bg-green-500 text-white px-3 py-1 rounded-full text-xs">✓ Verified</span>
                            ) : (
                              <span className="bg-yellow-500 text-white px-3 py-1 rounded-full text-xs">Pending Verification</span>
                            )}
                          </div>
                        )}
                        {viewingCareRecipient && (
                          <div className="mt-4 p-3 bg-white/20 rounded-lg">
                            <p className="text-white text-sm">Viewing:</p>
                            <p className="text-white font-semibold">{viewingCareRecipient.name}</p>
                            <button 
                              onClick={() => {
                                setViewingCareRecipient(null);
                                loadUserData();
                                setShowSidebar(false);
                              }}
                              className="mt-2 text-xs text-white underline"
                            >
                              Back to my view
                            </button>
                          </div>
                        )}
                      </div>
                      <button 
                        onClick={() => {
                          setProfileForm({ name: currentUser.name, avatar: currentUser.avatar });
                          setShowProfileEdit(true);
                          setShowSidebar(false);
                        }} 
                        className="w-full text-left text-2xl text-white mb-6 hover:bg-white/20 p-3 rounded">
                        1. Profile
                      </button>
                      <button 
                        onClick={() => {
                          setShowSettings(true);
                          setShowSidebar(false);
                        }}
                        className="w-full text-left text-2xl text-white mb-6 hover:bg-white/20 p-3 rounded">
                        2. Settings
                      </button>
                      {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (
                        <button 
                          onClick={() => {
                            setShowDocumentQRManager(true);
                            setShowSidebar(false);
                          }}
                          className="w-full text-left text-2xl text-white mb-6 hover:bg-white/20 p-3 rounded">
                          3. Share Links
                        </button>
                      )}
                      {isProfessional && (
                        <button 
                          onClick={() => {
                            setCurrentPage('profile');
                            setShowSidebar(false);
                          }}
                          className="w-full text-left text-2xl text-white mb-6 hover:bg-white/20 p-3 rounded bg-purple-600">
                          <Briefcase className="w-6 h-6 inline mr-2" />
                          Professional Settings
                        </button>
                      )}
                      <button onClick={logout} className="w-full text-left text-2xl text-white hover:bg-white/20 p-3 rounded">
                        {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') ? '4' : '3'}. Log Out
                      </button>
                    </div>
                  </div>
                </>
              )}

              {showQRCode && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                  <div className="bg-white rounded-3xl p-8 max-w-md">
                    <h2 className="text-3xl font-serif text-center mb-4">Your Care Circle QR Code</h2>
                    <p className="text-center mb-6">Caregivers can scan this to join your care circle!</p>
                    <div id="qr-code-container" className="flex justify-center mb-6"></div>
                    <button onClick={() => setShowQRCode(false)} className="w-full bg-teal-600 text-white py-3 rounded-lg">
                      Close
                    </button>
                  </div>
                </div>
              )}

              {showQRScanner && (
                <div className="fixed inset-0 bg-black z-50 flex flex-col">
                  <div className="p-6 bg-teal-600">
                    <button onClick={() => { setShowQRScanner(false); }} className="text-white text-2xl">✕ Close Scanner</button>
                  </div>
                  <div id="qr-reader" className="flex-1"></div>
                </div>
              )}

              {showProfileEdit && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                  <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                    <h2 className="text-3xl font-serif text-center mb-6">Edit Profile</h2>
                    
                    <div className="space-y-4">
                      <div>
                        <label className="block text-lg font-semibold mb-2">Name</label>
                        <input
                          type="text"
                          value={profileForm.name}
                          onChange={(e) => setProfileForm({...profileForm, name: e.target.value})}
                          className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                          placeholder="Your name"
                        />
                      </div>
                      
                      <div>
                        <label className="block text-lg font-semibold mb-2">Avatar Emoji</label>
                        <div className="flex gap-3 flex-wrap mb-3">
                          {['👴', '👵', '👨', '👩', '🧑', '👨‍⚕️', '👩‍⚕️', '😊', '🙂', '😎'].map(emoji => (
                            <button
                              key={emoji}
                              onClick={() => setProfileForm({...profileForm, avatar: emoji})}
                              className={`text-4xl p-3 rounded-lg border-2 ${profileForm.avatar === emoji ? 'border-teal-600 bg-teal-50' : 'border-gray-300'}`}
                            >
                              {emoji}
                            </button>
                          ))}
                        </div>
                        <input
                          type="text"
                          value={profileForm.avatar}
                          onChange={(e) => setProfileForm({...profileForm, avatar: e.target.value})}
                          className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                          placeholder="Or type your own emoji"
                        />
                      </div>
                    </div>
                    
                    <div className="flex gap-4 mt-6">
                      <button 
                        onClick={() => setShowProfileEdit(false)} 
                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                      >
                        Cancel
                      </button>
                      <button 
                        onClick={updateProfile} 
                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                      >
                        Save
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {showProfessionalSetup && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                  <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                    <h2 className="text-3xl font-serif text-center mb-6">Complete Your Professional Profile</h2>
                    
                    <div className="space-y-4">
                      <input
                        type="text"
                        placeholder="Full Name *"
                        value={professionalForm.full_name}
                        onChange={(e) => setProfessionalForm({...professionalForm, full_name: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                      
                      <select
                        value={professionalForm.professional_type}
                        onChange={(e) => setProfessionalForm({...professionalForm, professional_type: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      >
                        {professionalTypes.map(type => (
                          <option key={type.value} value={type.value}>{type.label}</option>
                        ))}
                      </select>
                      
                      <input
                        type="text"
                        placeholder="License Number"
                        value={professionalForm.license_number}
                        onChange={(e) => setProfessionalForm({...professionalForm, license_number: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                      
                      <input
                        type="number"
                        placeholder="Years of Experience"
                        value={professionalForm.years_experience}
                        onChange={(e) => setProfessionalForm({...professionalForm, years_experience: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                      
                      <input
                        type="text"
                        placeholder="City"
                        value={professionalForm.city}
                        onChange={(e) => setProfessionalForm({...professionalForm, city: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                      
                      <input
                        type="text"
                        placeholder="State"
                        value={professionalForm.state}
                        onChange={(e) => setProfessionalForm({...professionalForm, state: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                      
                      <textarea
                        placeholder="Professional Bio"
                        value={professionalForm.bio}
                        onChange={(e) => setProfessionalForm({...professionalForm, bio: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-32"
                      />
                      
                      <input
                        type="number"
                        placeholder="Hourly Rate (optional)"
                        value={professionalForm.hourly_rate}
                        onChange={(e) => setProfessionalForm({...professionalForm, hourly_rate: e.target.value})}
                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                      />
                    </div>
                    
                    <button 
                      onClick={createProfessionalProfile}
                      className="w-full bg-teal-600 text-white py-4 rounded-lg text-lg font-semibold mt-6"
                    >
                      Complete Setup
                    </button>
                  </div>
                </div>
              )}
                {showSettings && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                  <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-3xl font-serif">Settings</h2>
                      <button onClick={() => setShowSettings(false)} className="text-2xl">✕</button>
                    </div>
                    
                    {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && caregivers.length > 0 && (
                      <div>
                        <h3 className="text-2xl font-serif mb-4">Caregiver Permissions</h3>
                        <p className="text-gray-600 mb-4">Control what each caregiver can see and access</p>
                        
                        <div className="space-y-6">
                          {caregivers.map((cg) => {
                            const perms = caregiverPermissions.find(p => p.caregiver_id === cg.id) || {
                              can_view_documents: true,
                              can_view_medications: true,
                              can_view_appointments: true,
                              can_view_activities: true,
                              receive_quick_texts: true
                            };
                            
                            return (
                              <div key={cg.id} className="p-4 border-2 border-gray-300 rounded-lg">
                                <div className="flex items-center gap-3 mb-4">
                                  <span className="text-3xl">{cg.avatar}</span>
                                  <div>
                                    <p className="font-semibold text-lg">{cg.name}</p>
                                    <p className="text-sm text-gray-600">Caregiver</p>
                                  </div>
                                </div>
                                
                                <div className="space-y-3">
                                  <label className="flex items-center justify-between">
                                    <span className="text-gray-700">Can view documents</span>
                                    <input
                                      type="checkbox"
                                      checked={perms.can_view_documents}
                                      onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_documents', e.target.checked)}
                                      className="w-5 h-5"
                                    />
                                  </label>
                                  
                                  <label className="flex items-center justify-between">
                                    <span className="text-gray-700">Can view medications</span>
                                    <input
                                      type="checkbox"
                                      checked={perms.can_view_medications}
                                      onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_medications', e.target.checked)}
                                      className="w-5 h-5"
                                    />
                                  </label>
                                  
                                  <label className="flex items-center justify-between">
                                    <span className="text-gray-700">Can view appointments</span>
                                    <input
                                      type="checkbox"
                                      checked={perms.can_view_appointments}
                                      onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_appointments', e.target.checked)}
                                      className="w-5 h-5"
                                    />
                                  </label>
                                  
                                  <label className="flex items-center justify-between">
                                    <span className="text-gray-700">Can view activities</span>
                                    <input
                                      type="checkbox"
                                      checked={perms.can_view_activities}
                                      onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_activities', e.target.checked)}
                                      className="w-5 h-5"
                                    />
                                  </label>
                                  
                                  <label className="flex items-center justify-between">
                                    <span className="text-gray-700 font-semibold">Receive quick text alerts</span>
                                    <input
                                      type="checkbox"
                                      checked={perms.receive_quick_texts}
                                      onChange={(e) => updateCaregiverPermission(cg.id, 'receive_quick_texts', e.target.checked)}
                                      className="w-5 h-5"
                                    />
                                  </label>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    
                    {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && caregivers.length === 0 && (
                      <div className="text-center py-8">
                        <p className="text-gray-500 text-lg">No caregivers yet. Share your QR code to add caregivers!</p>
                      </div>
                    )}
                    
                    {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && (
                      <div className="text-center py-8">
                        <p className="text-gray-500 text-lg">Settings available for care recipients</p>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {showDocumentQRManager && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                  <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-3xl font-serif">Document Share Links</h2>
                      <button onClick={() => setShowDocumentQRManager(false)} className="text-2xl">✕</button>
                    </div>
                    
                    <p className="text-gray-600 mb-6">Create QR codes to share specific documents with doctors, therapists, or anyone without adding them to your care circle.</p>
                    
                    <button 
                      onClick={() => setShowCreateShareLink(true)}
                      className="w-full bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold mb-6"
                    >
                      + Create New Share Link
                    </button>
