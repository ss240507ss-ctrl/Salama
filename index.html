<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salama - Elder Care App</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .notification-badge {
            position: absolute; top: -5px; right: -5px;
            background: red; color: white; border-radius: 50%;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        @keyframes slideUp { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
        .high-contrast { filter: contrast(1.5); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25%); } }
        .animate-bounce { animation: bounce 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;
        const { Home, Heart, Users, FileText, Shield, Clock, Bell, User, Camera, Mic, Settings, Search, ChevronLeft, ChevronRight, CheckSquare, AlertCircle, CheckCircle, Menu, X, Plus, Trash2, Edit } = lucide;

        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function SalamaApp() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showAuth, setShowAuth] = useState(true);
            const [isLogin, setIsLogin] = useState(true);
            const [authUsername, setAuthUsername] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authRole, setAuthRole] = useState('care_recipient');
            const [showPassword, setShowPassword] = useState(false);
            
            const [currentPage, setCurrentPage] = useState('home');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            
            const [medications, setMedications] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [activities, setActivities] = useState([]);
            const [memories, setMemories] = useState([]);
            const [documents, setDocuments] = useState([]);
            const [thoughtRecordings, setThoughtRecordings] = useState([]);
            const [caregivers, setCaregivers] = useState([]);
            const [careTasks, setCareTasks] = useState([]);
            const [communities, setCommunities] = useState([]);
            
            const [showSidebar, setShowSidebar] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [showAddMedication, setShowAddMedication] = useState(false);
            const [showAddAppointment, setShowAddAppointment] = useState(false);
            const [showAddActivity, setShowAddActivity] = useState(false);
            const [showAddMemory, setShowAddMemory] = useState(false);
            const [showDocumentUpload, setShowDocumentUpload] = useState(false);
            const [showQRCode, setShowQRCode] = useState(false);
            const [showQRScanner, setShowQRScanner] = useState(false);
            const [showProfileEdit, setShowProfileEdit] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showProtectionChat, setShowProtectionChat] = useState(false);
            const [showCommunities, setShowCommunities] = useState(false);
            const [showTaskModal, setShowTaskModal] = useState(false);
            const [showCareRequestModal, setShowCareRequestModal] = useState(false);
            const [showDocumentQRManager, setShowDocumentQRManager] = useState(false);
            const [showCreateShareLink, setShowCreateShareLink] = useState(false);
            const [showOnboarding, setShowOnboarding] = useState(false);
            const [onboardingStep, setOnboardingStep] = useState(0);
            const [showCaregiverChat, setShowCaregiverChat] = useState(false);
            
            const [editName, setEditName] = useState('');
            const [editAvatar, setEditAvatar] = useState('');
            const [uploadingFile, setUploadingFile] = useState(false);
            
            const [isRecording, setIsRecording] = useState(false);
            const [mediaRecorder, setMediaRecorder] = useState(null);
            const [recordingDuration, setRecordingDuration] = useState(0);
            
            const [chatWith, setChatWith] = useState(null);
            const [messageInput, setMessageInput] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            
            const [protectionInput, setProtectionInput] = useState('');
            const [protectionMessages, setProtectionMessages] = useState([]);
            const [isAIThinking, setIsAIThinking] = useState(false);
            
            const [selectedMood, setSelectedMood] = useState(null);
            const [checkInNotes, setCheckInNotes] = useState('');
            const [recentMoods, setRecentMoods] = useState([]);
            const [recentCheckIns, setRecentCheckIns] = useState([]);
            
            const [notifications, setNotifications] = useState([]);
            const [unreadNotifications, setUnreadNotifications] = useState(0);
            
            const [timelineEvents, setTimelineEvents] = useState([]);
            const [todaysEvents, setTodaysEvents] = useState([]);
            const [todaysTip, setTodaysTip] = useState(null);
            
            const [medicationsTaken, setMedicationsTaken] = useState({});
            const [keyMetrics, setKeyMetrics] = useState({
                tasksCompleted: 0,
                checkInsThisWeek: 0,
                missedMedications: 0,
                completionRate: 0
            });
            
            const [caregiverPermissions, setCaregiverPermissions] = useState({});
            const [documentShareLinks, setDocumentShareLinks] = useState([]);
            const [shareLinkName, setShareLinkName] = useState('');
            const [shareAllDocs, setShareAllDocs] = useState(true);
            
            const [viewingCareRecipient, setViewingCareRecipient] = useState(null);
            const [myCareRecipients, setMyCareRecipients] = useState([]);
            
            const [isProfessional, setIsProfessional] = useState(false);
            const [professionalProfile, setProfessionalProfile] = useState(null);
            const [professionalForm, setProfessionalForm] = useState({
                full_name: '', professional_type: 'nurse', license_number: '',
                years_experience: 0, city: '', state: '', bio: '', hourly_rate: 0
            });
            const [showProfessionalSetup, setShowProfessionalSetup] = useState(false);
            const [careRequests, setCareRequests] = useState([]);
            const [myAssignments, setMyAssignments] = useState([]);
            const [newCareRequest, setNewCareRequest] = useState({
                professional_type: 'nurse', location: '', urgency_level: 'medium',
                care_needs_description: '', preferred_languages: [], start_date: '', duration_weeks: 4
            });
            const [selectedAssignment, setSelectedAssignment] = useState(null);
            const [showDailyCareLogModal, setShowDailyCareLogModal] = useState(false);
            const [newTask, setNewTask] = useState({
                task_name: '', description: '', due_date: '', priority: 'medium', assigned_to: null
            });
            
            const [error, setError] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [debouncedSearch, setDebouncedSearch] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [showSearch, setShowSearch] = useState(false);
            
            const [showExportOptions, setShowExportOptions] = useState(false);
            const [analyticsData, setAnalyticsData] = useState(null);
            
            const [fontSize, setFontSize] = useState('normal');
            const [highContrast, setHighContrast] = useState(false);
            const [voiceAnnouncements, setVoiceAnnouncements] = useState(false);
            const [showAccessibilitySettings, setShowAccessibilitySettings] = useState(false);

            const moods = [
                { emoji: '😊', label: 'Great', value: 5 },
                { emoji: '🙂', label: 'Good', value: 4 },
                { emoji: '😐', label: 'Okay', value: 3 },
                { emoji: '😟', label: 'Sad', value: 2 },
                { emoji: '😡', label: 'Angry', value: 1 }
            ];

            const professionalTypes = [
                { value: 'nurse', label: 'Registered Nurse' },
                { value: 'home_health_aide', label: 'Home Health Aide' },
                { value: 'physical_therapist', label: 'Physical Therapist' },
                { value: 'occupational_therapist', label: 'Occupational Therapist' },
                { value: 'social_worker', label: 'Social Worker' },
                { value: 'companion', label: 'Companion Caregiver' }
            ];
// ===== UTILITY FUNCTIONS =====
            const formatDuration = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const handleError = (errorMessage, context = '') => {
                console.error(`Error in ${context}:`, errorMessage);
                setError(errorMessage);
                createNotification(currentUser?.id || 'system', 'alert', 'Error Occurred', errorMessage);
                setTimeout(() => setError(null), 5000);
            };

            const announce = (message) => {
                if (!voiceAnnouncements) return;
                const utterance = new SpeechSynthesisUtterance(message);
                window.speechSynthesis.speak(utterance);
            };

            const filterData = () => {
                const query = debouncedSearch.toLowerCase();
                let results = [];
                
                if (filterType === 'all' || filterType === 'medications') {
                    results.push(...medications.filter(m => 
                        m.medication_name.toLowerCase().includes(query)
                    ).map(m => ({...m, type: 'medication'})));
                }
                
                if (filterType === 'all' || filterType === 'appointments') {
                    results.push(...appointments.filter(a => 
                        a.appointment_name.toLowerCase().includes(query)
                    ).map(a => ({...a, type: 'appointment'})));
                }
                
                if (filterType === 'all' || filterType === 'documents') {
                    results.push(...documents.filter(d => 
                        d.document_name.toLowerCase().includes(query)
                    ).map(d => ({...d, type: 'document'})));
                }
                
                if (filterType === 'all' || filterType === 'tasks') {
                    results.push(...careTasks.filter(t => 
                        t.task_name.toLowerCase().includes(query)
                    ).map(t => ({...t, type: 'task'})));
                }
                
                return results;
            };

            const generateAnalytics = () => {
                setAnalyticsData({
                    summary: {
                        totalMedications: medications.length,
                        totalAppointments: appointments.length,
                        totalTasks: careTasks.length,
                        completedTasks: careTasks.filter(t => t.status === 'completed').length,
                        averageMoodValue: recentMoods.length > 0 
                            ? (recentMoods.reduce((sum, mood) => {
                                const moodValue = moods.find(m => m.emoji === mood)?.value || 3;
                                return sum + moodValue;
                            }, 0) / recentMoods.length).toFixed(1)
                            : 'N/A'
                    },
                    careCircle: { totalCaregivers: caregivers.length }
                });
            };

            const exportToJSON = () => {
                const exportData = {
                    exportDate: new Date().toISOString(),
                    user: { name: currentUser.name, role: currentUser.role },
                    medications, appointments, activities, careTasks, recentMoods
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `salama_export_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                
                createNotification(currentUser.id, 'update', 'Data Exported', 'Your data has been exported successfully');
            };

            const exportToCSV = (dataType) => {
                let csvContent = '';
                let filename = '';
                
                switch(dataType) {
                    case 'medications':
                        csvContent = 'Medication Name,Dosage,Time,Notes\n';
                        medications.forEach(m => {
                            csvContent += `"${m.medication_name}","${m.dosage || ''}","${m.time || ''}","${m.notes || ''}"\n`;
                        });
                        filename = 'medications';
                        break;
                    case 'appointments':
                        csvContent = 'Appointment Name,Date/Time,Location,Notes\n';
                        appointments.forEach(a => {
                            csvContent += `"${a.appointment_name}","${a.appointment_time || ''}","${a.location || ''}","${a.notes || ''}"\n`;
                        });
                        filename = 'appointments';
                        break;
                    case 'tasks':
                        csvContent = 'Task Name,Description,Priority,Status,Due Date\n';
                        careTasks.forEach(t => {
                            csvContent += `"${t.task_name}","${t.description || ''}","${t.priority}","${t.status}","${t.due_date || ''}"\n`;
                        });
                        filename = 'tasks';
                        break;
                }
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `salama_${filename}_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            };

            // ===== TIMELINE & NOTIFICATION FUNCTIONS =====
            const addToTimeline = (type, title, description, icon, priority = 'normal', completed = false) => {
                const event = {
                    id: `${type}-${Date.now()}`,
                    type, title, description, icon, priority, completed,
                    timestamp: new Date().toISOString(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setTimelineEvents(prev => [event, ...prev]);
                const today = new Date().toDateString();
                if (new Date(event.timestamp).toDateString() === today) {
                    setTodaysEvents(prev => [event, ...prev]);
                }
            };

            const loadTimelineEvents = () => {
                const events = [];
                
                medications.forEach(med => {
                    const taken = medicationsTaken[med.id];
                    events.push({
                        id: `med-${med.id}`,
                        type: taken ? 'medication_taken' : 'medication_pending',
                        title: med.medication_name,
                        description: med.dosage || '',
                        time: med.time,
                        icon: '💊',
                        priority: 'normal',
                        completed: taken,
                        timestamp: new Date().toISOString()
                    });
                });
                
                appointments.forEach(appt => {
                    events.push({
                        id: `appt-${appt.id}`,
                        type: 'appointment',
                        title: appt.appointment_name,
                        description: appt.location || '',
                        time: appt.appointment_time ? new Date(appt.appointment_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',
                        icon: '📅',
                        priority: 'normal',
                        completed: false,
                        timestamp: appt.appointment_time || new Date().toISOString()
                    });
                });
                
                careTasks.forEach(task => {
                    events.push({
                        id: `task-${task.id}`,
                        type: task.status === 'completed' ? 'task_completed' : 'task_pending',
                        title: task.task_name,
                        description: task.description || '',
                        time: task.due_date ? new Date(task.due_date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',
                        icon: '📋',
                        priority: task.priority || 'normal',
                        completed: task.status === 'completed',
                        timestamp: task.due_date || new Date().toISOString()
                    });
                });
                
                setTimelineEvents(events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                const today = new Date().toDateString();
                setTodaysEvents(events.filter(e => new Date(e.timestamp).toDateString() === today));
            };

            const createNotification = (userId, type, title, message, priority = 'normal') => {
                const notification = {
                    id: Date.now(),
                    type, title, message, priority,
                    isRead: false,
                    timestamp: new Date().toISOString()
                };
                setNotifications(prev => [notification, ...prev]);
                setUnreadNotifications(prev => prev + 1);
                if (voiceAnnouncements) announce(title + '. ' + message);
            };

            const loadNotifications = () => {
                const unread = notifications.filter(n => !n.isRead).length;
                setUnreadNotifications(unread);
            };

            const markNotificationRead = (notificationId) => {
                setNotifications(prev => prev.map(n => 
                    n.id === notificationId ? {...n, isRead: true} : n
                ));
                setUnreadNotifications(prev => Math.max(0, prev - 1));
            };

            const calculateKeyMetrics = () => {
                const completedTasks = careTasks.filter(t => t.status === 'completed').length;
                const totalTasks = careTasks.length;
                const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
                const missedMeds = medications.filter(m => !medicationsTaken[m.id]).length;
                
                setKeyMetrics({
                    tasksCompleted: completedTasks,
                    checkInsThisWeek: recentCheckIns.length,
                    missedMedications: missedMeds,
                    completionRate
                });
            };

            const loadRecentMoods = async () => {
                if (!currentUser) return;
                try {
                    const { data } = await supabase
                        .from('daily_checkins')
                        .select('mood_emoji')
                        .eq('user_id', currentUser.id)
                        .order('created_at', { ascending: false })
                        .limit(7);
                    if (data) setRecentMoods(data.map(d => d.mood_emoji));
                } catch (err) {
                    console.error('Error loading moods:', err);
                }
            };

            const markMedicationTaken = async (medId) => {
                setMedicationsTaken(prev => ({...prev, [medId]: true}));
                const med = medications.find(m => m.id === medId);
                if (med) {
                    addToTimeline('medication_taken', `${med.medication_name} Taken`, med.dosage || '', '✅', 'normal', true);
                    createNotification(currentUser.id, 'update', 'Medication Taken', `${med.medication_name} marked as taken`, 'normal');
                }
                loadTimelineEvents();
                calculateKeyMetrics();
            };

            const completeOnboardingStep = (step) => {
                if (step === 4) {
                    setShowOnboarding(false);
                    localStorage.setItem('salamaOnboardingComplete', 'true');
                } else {
                    setOnboardingStep(step + 1);
                }
            };

            const skipOnboarding = () => {
                setShowOnboarding(false);
                localStorage.setItem('salamaOnboardingComplete', 'true');
            };

            // ===== AUTHENTICATION FUNCTIONS =====
            const handleAuth = async () => {
                if (!authUsername || !authPassword) {
                    alert('Please fill in all fields');
                    return;
                }

                if (isLogin) {
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('username', authUsername)
                        .eq('password', authPassword)
                        .single();

                    if (error || !data) {
                        alert('Invalid credentials');
                        return;
                    }

                    setCurrentUser(data);
                    setIsProfessional(data.role === 'professional' || data.role_type === 'professional');
                    setShowAuth(false);
                    
                    if (data.role === 'professional' || data.role_type === 'professional') {
                        loadProfessionalProfile(data.id);
                        setCurrentPage('dashboard');
                    }
                } else {
                    if (!authName) {
                        alert('Please enter your name');
                        return;
                    }

                    const careCircleId = crypto.randomUUID();
                    
                    const { data, error } = await supabase
                        .from('users')
                        .insert([{
                            username: authUsername,
                            password: authPassword,
                            name: authName,
                            role: authRole === 'professional' ? 'professional' : authRole,
                            role_type: authRole,
                            avatar: authRole === 'care_recipient' ? '👴' : authRole === 'caregiver' ? '👨' : '👨‍⚕️',
                            care_circle_id: authRole === 'care_recipient' ? careCircleId : null
                        }])
                        .select()
                        .single();

                    if (error) {
                        alert('Error creating account: ' + error.message);
                        return;
                    }

                    setCurrentUser(data);
                    setIsProfessional(authRole === 'professional');
                    setShowAuth(false);
                    
                    if (authRole === 'professional') {
                        setShowProfessionalSetup(true);
                        setCurrentPage('dashboard');
                    }
                }
            };

            const logout = () => {
                setCurrentUser(null);
                setShowAuth(true);
                setIsProfessional(false);
                setCurrentPage('home');
                setViewingCareRecipient(null);
                setAuthUsername('');
                setAuthPassword('');
                setAuthName('');
            };

            const updateProfile = async () => {
                const { error } = await supabase
                    .from('users')
                    .update({ name: editName, avatar: editAvatar })
                    .eq('id', currentUser.id);

                if (error) {
                    alert('Error updating profile');
                    return;
                }

                setCurrentUser({ ...currentUser, name: editName, avatar: editAvatar });
                setShowProfileEdit(false);
            };

            const loadUserData = async (userId) => {
                try {
                    const { data: medsData } = await supabase.from('medications').select('*').eq('user_id', userId).order('time', { ascending: true });
                    if (medsData) setMedications(medsData);

                    const { data: apptsData } = await supabase.from('appointments').select('*').eq('user_id', userId).order('appointment_time', { ascending: true });
                    if (apptsData) setAppointments(apptsData);

                    const { data: actsData } = await supabase.from('activities').select('*').eq('user_id', userId).order('time', { ascending: true });
                    if (actsData) setActivities(actsData);

                    const { data: memsData } = await supabase.from('memories').select('*').eq('user_id', userId).order('created_at', { ascending: false });
                    if (memsData) setMemories(memsData);

                    const { data: docsData } = await supabase.from('documents').select('*').eq('user_id', userId).order('uploaded_at', { ascending: false });
                    if (docsData) setDocuments(docsData);

                    const { data: recsData } = await supabase.from('audio_recordings').select('*').eq('user_id', userId).order('created_at', { ascending: false });
                    if (recsData) setThoughtRecordings(recsData);

                    if (currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') {
                        const { data: cgData } = await supabase.from('care_circle_members').select('caregiver:users!care_circle_members_caregiver_id_fkey(*)').eq('care_recipient_id', userId);
                        if (cgData) setCaregivers(cgData.map(d => d.caregiver));

                        const { data: permsData } = await supabase.from('caregiver_permissions').select('*').eq('care_recipient_id', userId);
                        if (permsData) {
                            const permsMap = {};
                            permsData.forEach(p => { permsMap[p.caregiver_id] = p; });
                            setCaregiverPermissions(permsMap);
                        }
                    }

                    if (currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') {
                        const { data: recipientsData } = await supabase.from('care_circle_members').select('care_recipient:users!care_circle_members_care_recipient_id_fkey(*)').eq('caregiver_id', userId);
                        if (recipientsData) setMyCareRecipients(recipientsData.map(d => d.care_recipient));
                    }
                } catch (err) {
                    console.error('Error loading data:', err);
                }
            };

            const loadCareTasks = async (userId) => {
                try {
                    let query = supabase.from('care_tasks').select('*').order('created_at', { ascending: false });

                    if (currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') {
                        query = query.eq('assigned_to', userId);
                    } else {
                        query = query.eq('care_recipient_id', userId);
                    }

                    const { data } = await query;
                    if (data) setCareTasks(data);
                } catch (err) {
                    console.error('Error loading tasks:', err);
                }
            };
// ===== CRUD OPERATIONS =====
            const addMedication = async (name, dosage, time, notes) => {
                if (!name) {
                    alert('Please enter medication name');
                    return;
                }

                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

                const { error } = await supabase.from('medications').insert([{
                    user_id: userId,

                    const chunks = [];

                    recorder.ondataavailable = (e) => chunks.push(e.data);

                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                        const fileName = `${userId}/recording_${Date.now()}.webm`;

                        await supabase.storage.from('salama-documents').upload(fileName, blob);

                        const { data: urlData } = supabase.storage.from('salama-documents').getPublicUrl(fileName);

                        await supabase.from('audio_recordings').insert([{
                            user_id: userId,
                            audio_url: urlData.publicUrl,
                            duration_seconds: recordingDuration,
                            title: `Recording ${new Date().toLocaleString()}`

                        setRecordingDuration(0);

                    };

                    recorder.start();
                    setMediaRecorder(recorder);
                    setIsRecording(true);

                    const timer = setInterval(() => setRecordingDuration(prev => prev + 1), 1000);

                                {!isLogin && (<input type="text" placeholder="Full Name" value={authName} onChange={(e) => setAuthName(e.target.value)} className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg" />)}
                                
                                <input type="text" placeholder="Username" value={authUsername} onChange={(e) => setAuthUsername(e.target.value)} className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg" />
                                
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="Password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg pr-12" />
                                    <button onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-4 text-gray-600">{showPassword ? '👁️' : '👁️‍🗨️'}</button>
                                </div>
                                
                                <button onClick={handleAuth} className="w-full bg-teal-600 text-white py-4 rounded-lg text-lg font-semibold hover:bg-teal-700">{isLogin ? 'Login' : 'Create Account'}</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 pb-24">
                    {error && (
                        <div className="fixed top-4 left-4 right-4 z-50 animate-slideUp">
                            <div className="bg-red-500 text-white p-4 rounded-lg shadow-2xl flex items-start gap-3">
                                <AlertCircle className="w-6 h-6 mt-0.5" />
                                <div className="flex-1">
                                    <p className="font-semibold">Error</p>
                                    <p className="text-sm">{error}</p>
                                </div>
                                <button onClick={() => setError(null)} className="text-white text-xl">✕</button>
                            </div>
                        </div>
                    )}

                    {isLoading && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                            <div className="bg-white rounded-3xl p-8 flex flex-col items-center">
                                <div className="w-16 h-16 border-4 border-teal-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-lg font-semibold text-black">Loading...</p>
                            </div>
                        </div>
                    )}

                    {/* ===== SIDEBAR ===== */}
                    {showSidebar && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex">
                            <div className="bg-white w-80 h-full p-6 overflow-y-auto">
                                <button onClick={() => setShowSidebar(false)} className="text-2xl mb-6">✕</button>
                                
                                <div className="text-center mb-8">
                                    <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">{currentUser.avatar}</div>
                                    <h2 className="text-2xl font-serif text-black">{currentUser.name}</h2>
                                    <p className="text-gray-600 capitalize">{currentUser.role_type || currentUser.role}</p>
                                    
                                    {isProfessional && professionalProfile?.is_verified && (
                                        <span className="inline-block bg-green-500 text-white px-3 py-1 rounded-full text-sm mt-2">✓ Verified Professional</span>
                                    )}
                                    
                                    {viewingCareRecipient && (
                                        <div className="mt-4 p-3 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-gray-600">Viewing:</p>
                                            <p className="font-semibold text-black">{viewingCareRecipient.name}</p>
                                            <button onClick={() => { setViewingCareRecipient(null); loadUserData(currentUser.id); loadCareTasks(currentUser.id); setShowSidebar(false); }} className="text-sm text-blue-600 mt-2">Back to my view</button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-3">
                                    <button onClick={() => { setShowProfileEdit(true); setEditName(currentUser.name); setEditAvatar(currentUser.avatar); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">👤 Edit Profile</button>
                                    <button onClick={() => { setShowSettings(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">⚙️ Settings</button>
                                    {isProfessional && (<button onClick={() => { setShowProfessionalSetup(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">👨‍⚕️ Professional Settings</button>)}
                                    <button onClick={() => { setShowSearch(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">🔍 Search</button>
                                    <button onClick={() => { setShowExportOptions(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">📦 Export Data</button>
                                    <button onClick={() => { setShowAccessibilitySettings(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">♿ Accessibility</button>
                                    <button onClick={() => { setShowOnboarding(true); setOnboardingStep(0); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">📚 Tutorial</button>
                                    <button onClick={logout} className="w-full text-left p-4 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">🚪 Logout</button>
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => setShowSidebar(false)}></div>
                        </div>
                    )}

                    {/* ===== NOTIFICATIONS ===== */}
                    {showNotifications && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-start justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full mt-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-black">Notifications</h2>
                                    <button onClick={() => setShowNotifications(false)} className="text-2xl">✕</button>
                                </div>
                                
                                {notifications.length === 0 ? (
                                    <div className="text-center py-12">
                                        <Bell className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                        <p className="text-gray-500">No notifications</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {notifications.map(notif => (
                                            <div key={notif.id} onClick={() => markNotificationRead(notif.id)} className={`p-4 rounded-lg cursor-pointer ${notif.isRead ? 'bg-gray-50' : 'bg-blue-50 border-2 border-blue-200'}`}>
                                                <div className="flex items-start gap-3">
                                                    {notif.type === 'alert' && <AlertCircle className="w-5 h-5 text-red-500 mt-1" />}
                                                    {notif.type === 'update' && <CheckCircle className="w-5 h-5 text-green-500 mt-1" />}
                                                    {notif.type === 'reminder' && <Clock className="w-5 h-5 text-blue-500 mt-1" />}
                                                    
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-black">{notif.title}</p>
                                                        <p className="text-sm text-gray-600">{notif.message}</p>
                                                        {notif.timestamp && (
                                                            <p className="text-xs text-gray-400 mt-1">{new Date(notif.timestamp).toLocaleString()}</p>
                                                        )}
                                                    </div>
                                                    
                                                    {!notif.isRead && (<div className="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {notifications.length > 0 && (
                                    <button onClick={() => setNotifications([])} className="w-full mt-4 text-sm text-gray-500 hover:text-gray-700">Clear All</button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== SEARCH MODAL ===== */}
                    {showSearch && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col">
                            <div className="p-6 bg-gradient-to-b from-teal-600 to-blue-300">
                                <div className="flex items-center gap-3 mb-4">
                                    <button onClick={() => setShowSearch(false)} className="text-white text-3xl">←</button>
                                    <h2 className="text-2xl font-serif text-white">Search</h2>
                                </div>
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search medications, appointments..." className="w-full p-4 rounded-lg text-lg" autoFocus />
                                <div className="flex gap-2 mt-4 overflow-x-auto">
                                    {['all', 'medications', 'appointments', 'documents', 'tasks'].map(type => (
                                        <button key={type} onClick={() => setFilterType(type)} className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${filterType === type ? 'bg-white text-teal-700' : 'bg-white/20 text-white'}`}>{type.charAt(0).toUpperCase() + type.slice(1)}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 bg-white">
                                {filterData().length === 0 ? (
                                    <div className="text-center py-12">
                                        <p className="text-gray-500 text-xl">No results found</p>
                                        <p className="text-gray-400 mt-2">Try a different search term</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {filterData().map((result, idx) => (
                                            <div key={idx} className="p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-2xl">
                                                                {result.type === 'medication' && '💊'}
                                                                {result.type === 'appointment' && '📅'}
                                                                {result.type === 'document' && '📄'}
                                                                {result.type === 'task' && '📋'}
                                                            </span>
                                                            <span className="text-xs bg-gray-200 px-2 py-1 rounded">{result.type}</span>
                                                        </div>
                                                        <p className="font-semibold text-black">{result.medication_name || result.appointment_name || result.document_name || result.task_name}</p>
                                                        {result.dosage && <p className="text-sm text-gray-600">{result.dosage}</p>}
                                                        {result.location && <p className="text-sm text-gray-600">📍 {result.location}</p>}
                                                        {result.description && <p className="text-sm text-gray-600">{result.description}</p>}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== EXPORT OPTIONS ===== */}
                    {showExportOptions && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Export Data</h2>
                                    <button onClick={() => setShowExportOptions(false)} className="text-2xl">✕</button>
                                </div>
                                <div className="space-y-3 mb-6">
                                    <button onClick={exportToJSON} className="w-full bg-teal-600 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold">Complete Data (JSON)</p>
                                            <p className="text-sm text-white/80">All your Salama data</p>
                                        </div>
                                        <span className="text-2xl">📦</span>
                                    </button>
                                    <button onClick={() => exportToCSV('medications')} className="w-full bg-blue-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold">Medications (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">💊</span>
                                    </button>
                                    <button onClick={() => exportToCSV('appointments')} className="w-full bg-purple-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold">Appointments (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">📅</span>
                                    </button>
                                    <button onClick={() => exportToCSV('tasks')} className="w-full bg-orange-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold">Tasks (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">📋</span>
                                    </button>
                                </div>
                                <button onClick={() => { generateAnalytics(); setTimeout(() => alert(`Analytics:\nMedications: ${medications.length}\nAppointments: ${appointments.length}\nTasks: ${careTasks.length}\nCaregivers: ${caregivers.length}`), 100); }} className="w-full bg-gray-200 text-black py-3 rounded-lg font-semibold">📊 View Analytics</button>
                            </div>
                        </div>
                    )}

                    {/* ===== ACCESSIBILITY ===== */}
                    {showAccessibilitySettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Accessibility</h2>
                                    <button onClick={() => setShowAccessibilitySettings(false)} className="text-2xl">✕</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-lg font-semibold mb-3">Text Size</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['small', 'normal', 'large', 'xlarge'].map((size, idx) => (
                                                <button key={size} onClick={() => setFontSize(size)} className={`py-2 rounded-lg font-semibold ${fontSize === size ? 'bg-teal-600 text-white' : 'bg-gray-200 text-black'}`} style={{ fontSize: ['12px', '16px', '20px', '24px'][idx] }}>A</button>
                                            ))}
                                        </div>
                                    </div>
                                    <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                        <div>
                                            <p className="font-semibold">High Contrast</p>
                                            <p className="text-sm text-gray-600">Easier to read</p>
                                        </div>
                                        <button onClick={() => setHighContrast(!highContrast)} className={`w-14 h-7 rounded-full ${highContrast ? 'bg-teal-600' : 'bg-gray-400'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${highContrast ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                        </button>
                                    </label>
                                    <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                        <div>
                                            <p className="font-semibold">Voice Announcements</p>
                                            <p className="text-sm text-gray-600">Speak notifications</p>
                                        </div>
                                        <button onClick={() => setVoiceAnnouncements(!voiceAnnouncements)} className={`w-14 h-7 rounded-full ${voiceAnnouncements ? 'bg-teal-600' : 'bg-gray-400'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${voiceAnnouncements ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                        </button>
                                    </label>
                                </div>
                                <button onClick={() => setShowAccessibilitySettings(false)} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mt-6">Done</button>
                            </div>
                        </div>
                    )}
{/* ===== QR CODE ===== */}
                    {showQRCode && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">My Care Circle QR</h2>
                                <div id="qr-code-display" className="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                <p className="text-center text-gray-600 mb-6">Caregivers scan this to join your circle</p>
                                <button onClick={() => setShowQRCode(false)} className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Close</button>
                            </div>
                        </div>
                    )}

                    {/* ===== QR SCANNER ===== */}
                    {showQRScanner && (
                        <div className="fixed inset-0 bg-black z-50 flex flex-col">
                            <div className="p-6 flex items-center justify-between bg-black/50">
                                <h2 className="text-2xl font-serif text-white">Scan QR Code</h2>
                                <button onClick={() => { setShowQRScanner(false); window.location.reload(); }} className="text-white text-3xl">✕</button>
                            </div>
                            <div id="qr-reader" className="flex-1"></div>
                        </div>
                    )}

                    {/* ===== PROFILE EDIT ===== */}
                    {showProfileEdit && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Edit Profile</h2>
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Name</label>
                                    <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-lg font-semibold mb-2">Avatar</label>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['👴', '👵', '👨', '👩', '🧑', '👶', '🧓', '👨‍⚕️', '👩‍⚕️', '🧑‍⚕️'].map(emoji => (
                                            <button key={emoji} onClick={() => setEditAvatar(emoji)} className={`text-4xl p-3 rounded-lg ${editAvatar === emoji ? 'bg-teal-100 border-2 border-teal-600' : 'bg-gray-100'}`}>{emoji}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowProfileEdit(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={updateProfile} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== SETTINGS ===== */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Settings</h2>
                                <h3 className="text-2xl font-serif text-black mb-4">Caregiver Permissions</h3>
                                {caregivers.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No caregivers yet. Add caregivers by sharing your QR code!</p>
                                ) : (
                                    caregivers.map((cg) => {
                                        const perms = caregiverPermissions[cg.id] || {};
                                        return (
                                            <div key={cg.id} className="mb-6 p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center text-2xl">{cg.avatar}</div>
                                                    <h4 className="text-xl font-semibold text-black">{cg.name}</h4>
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="flex items-center justify-between">
                                                        <span>View documents</span>
                                                        <input type="checkbox" checked={perms.can_view_documents || false} onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_documents', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                    <label className="flex items-center justify-between">
                                                        <span>View medications</span>
                                                        <input type="checkbox" checked={perms.can_view_medications || false} onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_medications', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                    <label className="flex items-center justify-between">
                                                        <span>View appointments</span>
                                                        <input type="checkbox" checked={perms.can_view_appointments || false} onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_appointments', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                    <label className="flex items-center justify-between">
                                                        <span>Receive alerts</span>
                                                        <input type="checkbox" checked={perms.receive_quick_text_alerts || false} onChange={(e) => updateCaregiverPermission(cg.id, 'receive_quick_text_alerts', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                <button onClick={() => setShowSettings(false)} className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6">Close</button>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD MEDICATION ===== */}
                    {showAddMedication && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Medication</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Medication Name *" id="med-name" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="Dosage (e.g., 10mg)" id="med-dosage" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="time" id="med-time" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Notes (optional)" id="med-notes" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowAddMedication(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={() => {
                                        addMedication(
                                            document.getElementById('med-name').value,
                                            document.getElementById('med-dosage').value,
                                            document.getElementById('med-time').value,
                                            document.getElementById('med-notes').value
                                        );
                                    }} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Add</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD APPOINTMENT ===== */}
                    {showAddAppointment && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Appointment</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Appointment Name *" id="appt-name" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="datetime-local" id="appt-time" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="Location" id="appt-location" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Notes (optional)" id="appt-notes" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowAddAppointment(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={() => {
                                        addAppointment(
                                            document.getElementById('appt-name').value,
                                            document.getElementById('appt-time').value,
                                            document.getElementById('appt-location').value,
                                            document.getElementById('appt-notes').value
                                        );
                                    }} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Add</button>
