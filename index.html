    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes pulse-alert {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .animate-slideUp {
            animation: slideUp 0.3s ease-out;
        }
        
        .animate-pulse {
            animation: pulse-alert 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .timeline-item {
            animation: fadeIn 0.3s ease-out;
        }
        
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 9999px;
            padding: 2px 6px;
            font-size: 0.75rem;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        
        .high-contrast {
            filter: contrast(1.5);
        }
        
        .high-contrast .bg-white {
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        
        .high-contrast .text-gray-600 {
            color: #000000 !important;
        }
    </style>
</head>

            // ===== UTILITY FUNCTIONS =====
            const formatDuration = (seconds) => {

            // ===== ERROR HANDLING FUNCTIONS (PART 15) =====
            const handleError = (errorMessage, context = '') => {
                console.error(`Error in ${context}:`, errorMessage);

                createNotification(
                    currentUser?.id || 'system',
                    'alert',
                    'Error Occurred',
                    errorMessage
                );
                
                setTimeout(() => setError(null), 5000);
            };

            const safeAsync = async (fn, context = 'operation') => {
                try {
                    setIsLoading(true);
                    await fn();
                } catch (err) {
                    handleError(err.message || 'An error occurred', context);
                } finally {
                    setIsLoading(false);
                }
            };

            // ===== OFFLINE SUPPORT FUNCTIONS (PART 16) =====
            const queueOfflineAction = (action) => {
                const newAction = {
                    id: Date.now(),
                    ...action,
                    timestamp: new Date().toISOString()
                };
                
                const updated = [...pendingActions, newAction];
                setPendingActions(updated);
                localStorage.setItem('salamaPendingActions', JSON.stringify(updated));
            };

            const syncPendingActions = async () => {
                if (pendingActions.length === 0) return;
                
                for (const action of pendingActions) {
                    try {
                        if (action.execute) await action.execute();
                    } catch (err) {
                        console.error('Failed to sync action:', err);
                    }
                }
                
                setPendingActions([]);
                localStorage.removeItem('salamaPendingActions');
            };

            const backupToLocalStorage = () => {
                if (!currentUser) return;
                
                const backup = {
                    medications,
                    appointments,
                    activities,
                    careTasks,
                    recentMoods,
                    lastBackup: new Date().toISOString()
                };
                
                localStorage.setItem(`salamaBackup_${currentUser.id}`, JSON.stringify(backup));
            };

            const restoreFromLocalStorage = () => {
                if (!currentUser) return;
                
                const backup = localStorage.getItem(`salamaBackup_${currentUser.id}`);
                if (!backup) return;
                
                try {
                    const data = JSON.parse(backup);
                    setMedications(data.medications || []);
                    setAppointments(data.appointments || []);
                    setActivities(data.activities || []);
                    setCareTasks(data.careTasks || []);
                    setRecentMoods(data.recentMoods || []);
                } catch (err) {
                    console.error('Failed to restore backup:', err);
                }
            };

            // ===== SEARCH & FILTER FUNCTIONS (PART 17) =====
            const filterData = () => {
                const query = debouncedSearch.toLowerCase();
                
                let results = [];
                
                if (filterType === 'all' || filterType === 'medications') {
                    results.push(...medications.filter(m => 
                        m.medication_name.toLowerCase().includes(query) ||
                        (m.dosage && m.dosage.toLowerCase().includes(query))
                    ).map(m => ({...m, type: 'medication'})));
                }
                
                if (filterType === 'all' || filterType === 'appointments') {
                    results.push(...appointments.filter(a => 
                        a.appointment_name.toLowerCase().includes(query) ||
                        (a.location && a.location.toLowerCase().includes(query))
                    ).map(a => ({...a, type: 'appointment'})));
                }
                
                if (filterType === 'all' || filterType === 'documents') {
                    results.push(...documents.filter(d => 
                        d.document_name.toLowerCase().includes(query)
                    ).map(d => ({...d, type: 'document'})));
                }
                
                if (filterType === 'all' || filterType === 'tasks') {
                    results.push(...careTasks.filter(t => 
                        t.task_name.toLowerCase().includes(query) ||
                        (t.description && t.description.toLowerCase().includes(query))
                    ).map(t => ({...t, type: 'task'})));
                }
                
                return results;
            };

            // ===== EXPORT & ANALYTICS FUNCTIONS (PART 18) =====

                const now = new Date();
                
                const analytics = {
                    summary: {
                        totalMedications: medications.length,
                        totalAppointments: appointments.length,
                        totalActivities: activities.length,
                        totalDocuments: documents.length,
                        totalTasks: careTasks.length,
                        completedTasks: careTasks.filter(t => t.status === 'completed').length,
                        averageMoodValue: recentMoods.length > 0 
                            ? (recentMoods.reduce((sum, mood) => {
                                const moodValue = moods.find(m => m.emoji === mood)?.value || 3;
                                return sum + moodValue;
                            }, 0) / recentMoods.length).toFixed(1)
                            : 'N/A'
                    },
                    recentActivity: {
                        medicationsTakenToday: Object.keys(medicationsTaken).length,
                        tasksCompletedThisWeek: careTasks.filter(t => 
                            t.status === 'completed' && 
                            new Date(t.updated_at) > new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000)

                    },
                    careCircle: {
                        totalCaregivers: caregivers.length
                    }
                };
                
                setAnalyticsData(analytics);

            const exportToJSON = () => {
                const exportData = {
                    exportDate: new Date().toISOString(),
                    user: {
                        name: currentUser.name,
                        role: currentUser.role || currentUser.role_type
                    },
                    medications: medications.map(m => ({
                        name: m.medication_name,
                        dosage: m.dosage,
                        time: m.time,
                        notes: m.notes
                    })),
                    appointments: appointments.map(a => ({
                        name: a.appointment_name,
                        time: a.appointment_time,
                        location: a.location,
                        notes: a.notes
                    })),
                    activities: activities.map(a => ({
                        name: a.activity_name,
                        time: a.time,
                        status: a.status
                    })),
                    tasks: careTasks.map(t => ({
                        name: t.task_name,
                        description: t.description,
                        priority: t.priority,
                        status: t.status,
                        dueDate: t.due_date
                    })),
                    recentMoods: recentMoods,
                    careCircle: {
                        caregivers: caregivers.map(c => ({
                            name: c.name,
                            relationship: c.relationship
                        }))
                    }
                };
                
                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `salama_export_${new Date().toISOString().split('T')[0]}.json`;

                URL.revokeObjectURL(url);

                    currentUser.id,
                    'update',
                    'Data Exported',

            };

            const exportToCSV = (dataType) => {
                let csvContent = '';
                let filename = '';
                
                switch(dataType) {
                    case 'medications':
                        csvContent = 'Medication Name,Dosage,Time,Notes\n';
                        medications.forEach(m => {
                            csvContent += `"${m.medication_name}","${m.dosage || ''}","${m.time || ''}","${m.notes || ''}"\n`;
                        });
                        filename = 'medications';
                        break;
                        
                    case 'appointments':
                        csvContent = 'Appointment Name,Date/Time,Location,Notes\n';
                        appointments.forEach(a => {
                            csvContent += `"${a.appointment_name}","${a.appointment_time || ''}","${a.location || ''}","${a.notes || ''}"\n`;
                        });
                        filename = 'appointments';
                        break;
                        
                    case 'tasks':
                        csvContent = 'Task Name,Description,Priority,Status,Due Date\n';
                        careTasks.forEach(t => {
                            csvContent += `"${t.task_name}","${t.description || ''}","${t.priority}","${t.status}","${t.due_date || ''}"\n`;
                        });
                        filename = 'tasks';
                        break;
                }
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `salama_${filename}_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            };

            // ===== ACCESSIBILITY FUNCTIONS (PART 19) =====
            const announce = (message) => {
                if (!voiceAnnouncements) return;
                
                const utterance = new SpeechSynthesisUtterance(message);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                window.speechSynthesis.speak(utterance);
            };

            // ===== PERFORMANCE OPTIMIZATIONS (PART 20) =====
            const memoizedTimelineEvents = React.useMemo(() => {
                return timelineEvents.slice(0, 50);
            }, [timelineEvents]);

            const memoizedTodaysEvents = React.useMemo(() => {
                const today = new Date().toDateString();
                return timelineEvents.filter(event => 
                    new Date(event.timestamp).toDateString() === today
                );
            }, [timelineEvents]);

            const ITEMS_PER_PAGE = 20;
            const paginateList = (list, page = 1) => {
                const start = (page - 1) * ITEMS_PER_PAGE;
                const end = start + ITEMS_PER_PAGE;
                return list.slice(start, end);
            };

            // ===== ✨ TIMELINE & NOTIFICATION FUNCTIONS =====
            const addToTimeline = (type, title, description, icon, priority = 'normal', completed = false) => {
                const event = {
                    id: `${type}-${Date.now()}`,
                    type,
                    title,
                    description,
                    icon,
                    priority,
                    completed,
                    timestamp: new Date().toISOString(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                setTimelineEvents(prev => [event, ...prev]);
                
                const today = new Date().toDateString();
                if (new Date(event.timestamp).toDateString() === today) {
                    setTodaysEvents(prev => [event, ...prev]);
                }
            };

            const loadTimelineEvents = () => {
                const events = [];
                
                medications.forEach(med => {
                    const taken = medicationsTaken[med.id];
                    events.push({
                        id: `med-${med.id}`,
                        type: taken ? 'medication_taken' : 'medication_pending',
                        title: med.medication_name,
                        description: med.dosage || '',
                        time: med.time,
                        icon: '💊',
                        priority: 'normal',
                        completed: taken,
                        timestamp: new Date().toISOString()
                    });
                });
                
                appointments.forEach(appt => {
                    events.push({
                        id: `appt-${appt.id}`,
                        type: 'appointment',
                        title: appt.appointment_name,
                        description: appt.location || '',
                        time: appt.appointment_time ? new Date(appt.appointment_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',
                        icon: '📅',
                        priority: 'normal',
                        completed: false,
                        timestamp: appt.appointment_time || new Date().toISOString()
                    });
                });
                
                careTasks.forEach(task => {
                    events.push({
                        id: `task-${task.id}`,
                        type: task.status === 'completed' ? 'task_completed' : 'task_pending',
                        title: task.task_name,
                        description: task.description || '',
                        time: task.due_date ? new Date(task.due_date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',
                        icon: '📋',
                        priority: task.priority || 'normal',
                        completed: task.status === 'completed',
                        timestamp: task.due_date || new Date().toISOString()
                    });
                });
                
                setTimelineEvents(events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                
                const today = new Date().toDateString();
                setTodaysEvents(events.filter(e => new Date(e.timestamp).toDateString() === today));
            };

            const createNotification = (userId, type, title, message, priority = 'normal') => {
                const notification = {
                    id: Date.now(),
                    type,
                    title,
                    message,
                    priority,
                    isRead: false,
                    timestamp: new Date().toISOString()
                };
                
                setNotifications(prev => [notification, ...prev]);
                setUnreadNotifications(prev => prev + 1);
                
                if (voiceAnnouncements) {
                    announce(title + '. ' + message);
                }
            };

            const loadNotifications = () => {
                const unread = notifications.filter(n => !n.isRead).length;
                setUnreadNotifications(unread);
            };

            const markNotificationRead = (notificationId) => {
                setNotifications(prev => prev.map(n => 
                    n.id === notificationId ? {...n, isRead: true} : n
                ));
                setUnreadNotifications(prev => Math.max(0, prev - 1));
            };

            // ===== ✨ SMART ALERTS SYSTEM =====
            const checkForAlerts = () => {
                if (!currentUser) return;
                
                const now = new Date();
                const currentHour = now.getHours();
                const currentMinute = now.getMinutes();
                
                medications.forEach(med => {
                    if (med.time && !medicationsTaken[med.id]) {
                        const [medHour, medMinute] = med.time.split(':').map(Number);
                        if (currentHour === medHour && currentMinute === medMinute) {
                            createNotification(
                                currentUser.id,
                                'reminder',
                                'Medication Reminder',
                                `Time to take ${med.medication_name}`,
                                'high'
                            );
                        }
                    }
                });
                
                const badMoodCount = recentMoods.slice(0, 3).filter(m => m === '😡' || m === '😟').length;
                if (badMoodCount === 3) {
                    createNotification(
                        currentUser.id,
                        'alert',
                        'Mood Trend Alert',
                        'You have reported low mood for 3 consecutive days. Caregivers have been notified.',
                        'urgent'
                    );
                }
                
                const overdueUrgentTasks = careTasks.filter(t => 
                    t.priority === 'urgent' && 
                    t.status !== 'completed' &&
                    new Date(t.due_date) < now
                );
                
                if (overdueUrgentTasks.length > 0) {
                    createNotification(
                        currentUser.id,
                        'alert',
                        'Urgent Task Overdue',
                        `You have ${overdueUrgentTasks.length} overdue urgent task(s)`,
                        'urgent'
                    );
                }
            };

            // ===== ✨ METRICS CALCULATION =====
            const calculateKeyMetrics = () => {
                const completedTasks = careTasks.filter(t => t.status === 'completed').length;
                const totalTasks = careTasks.length;
                const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
                
                const missedMeds = medications.filter(m => !medicationsTaken[m.id]).length;
                
                setKeyMetrics({
                    tasksCompleted: completedTasks,
                    checkInsThisWeek: recentCheckIns.length,
                    missedMedications: missedMeds,
                    completionRate
                });
            };

            // ===== ✨ MOOD TRACKING =====
            const loadRecentMoods = async () => {
                if (!currentUser) return;
                
                try {
                    const { data, error } = await supabase
                        .from('daily_checkins')
                        .select('mood_emoji, created_at')
                        .eq('user_id', currentUser.id)
                        .order('created_at', { ascending: false })
                        .limit(7);
                    
                    if (error) throw error;
                    
                    if (data) {
                        setRecentMoods(data.map(d => d.mood_emoji));
                    }
                } catch (err) {
                    console.error('Error loading moods:', err);
                }
            };

            // ===== ✨ INTERACTIVE MEDICATION TRACKING =====
            const markMedicationTaken = async (medId) => {
                setMedicationsTaken(prev => ({...prev, [medId]: true}));
                
                const med = medications.find(m => m.id === medId);
                if (med) {
                    addToTimeline(
                        'medication_taken',
                        `${med.medication_name} Taken`,
                        med.dosage || '',
                        '✅',
                        'normal',
                        true
                    );
                    
                    createNotification(
                        currentUser.id,
                        'update',
                        'Medication Taken',
                        `${med.medication_name} marked as taken`,
                        'normal'
                    );
                }
                
                loadTimelineEvents();
                calculateKeyMetrics();
            };

            const markMedicationMissed = (medId) => {
                const med = medications.find(m => m.id === medId);
                if (med) {
                    addToTimeline(
                        'medication_missed',
                        `Missed: ${med.medication_name}`,
                        'This medication was not taken',
                        '⚠️',
                        'high',
                        false
                    );
                }
            };

            // ===== ✨ ONBOARDING FUNCTIONS =====
            const completeOnboardingStep = (step) => {
                if (step === 4) {
                    setShowOnboarding(false);
                    localStorage.setItem('salamaOnboardingComplete', 'true');
                } else {
                    setOnboardingStep(step + 1);
                }
            };

            const skipOnboarding = () => {
                setShowOnboarding(false);
                localStorage.setItem('salamaOnboardingComplete', 'true');
            };

            // ===== CLOCK UPDATE =====
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // ===== MAIN DATA LOAD USEEFFECT =====
            useEffect(() => {
                if (currentUser) {
                    loadNotifications();
                    loadTimelineEvents();
                    calculateKeyMetrics();
                    loadRecentMoods();
                    
                    const onboardingComplete = localStorage.getItem('salamaOnboardingComplete');
                    if (!onboardingComplete && (currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient')) {
                        setShowOnboarding(true);
                    }
                }
            }, [currentUser, medications, appointments, careTasks, medicationsTaken]);

            // ===== SMART ALERTS CHECK USEEFFECT =====
            useEffect(() => {
                if (!currentUser) return;
                
                const interval = setInterval(checkForAlerts, 60000);
                checkForAlerts();
                
                return () => clearInterval(interval);
            }, [currentUser, medications, medicationsTaken, recentMoods, careTasks]);

            // ===== OFFLINE DETECTION USEEFFECT (PART 16) =====
            useEffect(() => {
                const handleOnline = () => {
                    setIsOnline(true);
                    syncPendingActions();
                };
                
                const handleOffline = () => {
                    setIsOnline(false);
                    createNotification(
                        currentUser?.id || 'system',
                        'alert',
                        'You are offline',
                        'Changes will be saved when you reconnect'
                    );
                };
                
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, [pendingActions]);

            // ===== AUTO-BACKUP USEEFFECT (PART 16) =====
            useEffect(() => {
                const interval = setInterval(backupToLocalStorage, 5 * 60 * 1000);
                return () => clearInterval(interval);
            }, [medications, appointments, activities, careTasks]);

            // ===== DEBOUNCE SEARCH USEEFFECT (PART 17) =====
            useEffect(() => {
                const timer = setTimeout(() => {
                    setDebouncedSearch(searchQuery);
                }, 300);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            // ===== KEYBOARD SHORTCUTS USEEFFECT (PART 17) =====
            useEffect(() => {
                const handleKeyboard = (e) => {
                    if (e.key === 'Escape') {
                        setShowSidebar(false);
                        setShowQRCode(false);
                        setShowQRScanner(false);
                        setShowAddMedication(false);
                        setShowAddAppointment(false);
                        setShowAddActivity(false);
                        setShowNotifications(false);
                        setShowSearch(false);
                        setShowExportOptions(false);
                        setShowAccessibilitySettings(false);
                    }
                    
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        setShowSearch(true);
                    }
                    
                    if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                        e.preventDefault();
                        setShowOnboarding(true);
                        setOnboardingStep(0);
                    }
                };
                
                window.addEventListener('keydown', handleKeyboard);
                return () => window.removeEventListener('keydown', handleKeyboard);
            }, []);

            // ===== APPLY ACCESSIBILITY SETTINGS USEEFFECT (PART 19) =====
            useEffect(() => {
                const root = document.documentElement;
                
                switch(fontSize) {
                    case 'small':
                        root.style.fontSize = '14px';
                        break;
                    case 'large':
                        root.style.fontSize = '18px';
                        break;
                    case 'xlarge':
                        root.style.fontSize = '22px';
                        break;
                    default:
                        root.style.fontSize = '16px';
                }
                
                if (highContrast) {
                    root.classList.add('high-contrast');
                } else {
                    root.classList.remove('high-contrast');
                }
                
                localStorage.setItem('salamaAccessibility', JSON.stringify({
                    fontSize,
                    highContrast,
                    voiceAnnouncements
                }));
            }, [fontSize, highContrast, voiceAnnouncements]);

            // ===== LOAD ACCESSIBILITY PREFERENCES USEEFFECT (PART 19) =====
            useEffect(() => {
                const saved = localStorage.getItem('salamaAccessibility');
                if (saved) {
                    try {
                        const prefs = JSON.parse(saved);
                        setFontSize(prefs.fontSize || 'normal');
                        setHighContrast(prefs.highContrast || false);
                        setVoiceAnnouncements(prefs.voiceAnnouncements || false);
                    } catch (err) {
                        console.error('Failed to load accessibility preferences:', err);
                    }
                }
            }, []);
            // ===== AUTHENTICATION FUNCTIONS =====
            const handleAuth = async () => {
                if (!authUsername || !authPassword) {
                    alert('Please fill in all fields');
                    return;
                }

                if (isLogin) {
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('username', authUsername)
                        .eq('password', authPassword)
                        .single();

                    if (error || !data) {
                        alert('Invalid credentials');
                        return;
                    }

                    setCurrentUser(data);
                    setIsProfessional(data.role === 'professional' || data.role_type === 'professional');
                    setShowAuth(false);
                    
                    if (data.role === 'professional' || data.role_type === 'professional') {
                        loadProfessionalProfile(data.id);
                        setCurrentPage('dashboard');
                    }
                } else {
                    if (!authName) {
                        alert('Please enter your name');
                        return;
                    }

                    const careCircleId = crypto.randomUUID();
                    
                    const { data, error } = await supabase
                        .from('users')
                        .insert([{
                            username: authUsername,
                            password: authPassword,
                            name: authName,
                            role: authRole === 'professional' ? 'professional' : authRole,
                            role_type: authRole,
                            avatar: authRole === 'care_recipient' ? '👴' : authRole === 'caregiver' ? '👨' : '👨‍⚕️',
                            care_circle_id: authRole === 'care_recipient' ? careCircleId : null
                        }])
                        .select()
                        .single();

                    if (error) {
                        alert('Error creating account: ' + error.message);
                        return;
                    }

                    setCurrentUser(data);
                    setIsProfessional(authRole === 'professional');
                    setShowAuth(false);
                    
                    if (authRole === 'professional') {
                        setShowProfessionalSetup(true);
                        setCurrentPage('dashboard');
                    }
                }
            };

            const logout = () => {
                setCurrentUser(null);
                setShowAuth(true);
                setIsProfessional(false);
                setCurrentPage('home');
                setViewingCareRecipient(null);
                setAuthUsername('');
                setAuthPassword('');
                setAuthName('');
            };

            const updateProfile = async () => {
                const { error } = await supabase
                    .from('users')
                    .update({ name: editName, avatar: editAvatar })
                    .eq('id', currentUser.id);

                if (error) {
                    alert('Error updating profile');
                    return;
                }

                setCurrentUser({ ...currentUser, name: editName, avatar: editAvatar });
                setShowProfileEdit(false);
            };

            // ===== DATA LOADING FUNCTIONS =====
            const checkUser = async () => {
                if (!currentUser) return;
                loadUserData(currentUser.id);
                loadCareTasks(currentUser.id);
            };

            const loadUserData = async (userId) => {
                try {
                    const { data: medsData } = await supabase
                        .from('medications')
                        .select('*')
                        .eq('user_id', userId)
                        .order('time', { ascending: true });
                    if (medsData) setMedications(medsData);

                    const { data: apptsData } = await supabase
                        .from('appointments')
                        .select('*')
                        .eq('user_id', userId)
                        .order('appointment_time', { ascending: true });
                    if (apptsData) setAppointments(apptsData);

                    const { data: actsData } = await supabase
                        .from('activities')
                        .select('*')
                        .eq('user_id', userId)
                        .order('time', { ascending: true });
                    if (actsData) setActivities(actsData);

                    const { data: memsData } = await supabase
                        .from('memories')
                        .select('*')
                        .eq('user_id', userId)
                        .order('created_at', { ascending: false });
                    if (memsData) setMemories(memsData);

                    const { data: docsData } = await supabase
                        .from('documents')
                        .select('*')
                        .eq('user_id', userId)
                        .order('uploaded_at', { ascending: false });
                    if (docsData) setDocuments(docsData);

                    const { data: recsData } = await supabase
                        .from('audio_recordings')
                        .select('*')
                        .eq('user_id', userId)
                        .order('created_at', { ascending: false });
                    if (recsData) setThoughtRecordings(recsData);

                    if (currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') {
                        const { data: cgData } = await supabase
                            .from('care_circle_members')
                            .select('caregiver:users!care_circle_members_caregiver_id_fkey(*)')
                            .eq('care_recipient_id', userId);
                        if (cgData) setCaregivers(cgData.map(d => d.caregiver));

                        const { data: permsData } = await supabase
                            .from('caregiver_permissions')
                            .select('*')
                            .eq('care_recipient_id', userId);
                        if (permsData) {
                            const permsMap = {};
                            permsData.forEach(p => {
                                permsMap[p.caregiver_id] = p;
                            });
                            setCaregiverPermissions(permsMap);
                        }

                        const { data: shareLinksData } = await supabase
                            .from('document_share_links')
                            .select('*')
                            .eq('care_recipient_id', userId);
                        if (shareLinksData) setDocumentShareLinks(shareLinksData);
                    }

                    if (currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') {
                        const { data: recipientsData } = await supabase
                            .from('care_circle_members')
                            .select('care_recipient:users!care_circle_members_care_recipient_id_fkey(*)')
                            .eq('caregiver_id', userId);
                        if (recipientsData) setMyCareRecipients(recipientsData.map(d => d.care_recipient));
                    }

                    const { data: commsData } = await supabase
                        .from('community_memberships')
                        .select('community:communities(*)')
                        .eq('user_id', userId);
                    if (commsData) setCommunities(commsData.map(d => d.community));

                    loadCareTips();
                } catch (err) {
                    console.error('Error loading data:', err);
                }
            };

            const loadCareTips = async () => {
                try {
                    const { data, error } = await supabase
                        .from('care_tips')
                        .select('*')
                        .limit(1)
                        .single();
                    
                    if (data) setTodaysTip(data);
                } catch (err) {
                    console.error('Error loading tips:', err);
                }
            };

            const loadCareTasks = async (userId) => {
                try {
                    let query = supabase
                        .from('care_tasks')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') {
                        query = query.eq('assigned_to', userId);
                    } else {
                        query = query.eq('care_recipient_id', userId);
                    }

                    const { data, error } = await query;
                    
                    if (error) throw error;
                    if (data) setCareTasks(data);
                } catch (err) {
                    console.error('Error loading tasks:', err);
                }
            };

            useEffect(() => {
                checkUser();
            }, [currentUser]);

            // ===== CRUD FUNCTIONS =====
            const addMedication = async (name, dosage, time, notes) => {
                if (!name) {
                    alert('Please enter medication name');
                    return;
                }

                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

                const { error } = await supabase
                    .from('medications')
                    .insert([{
                        user_id: userId,
                        medication_name: name,
                        dosage,
                        time,
                        notes
                    }]);

                if (error) {
                    alert('Error adding medication');
                    return;
                }

                setShowAddMedication(false);
                loadUserData(userId);
                loadTimelineEvents();
                
                addToTimeline(
                    'medication_added',
                    `Added: ${name}`,
                    dosage || '',
                    '💊',
                    'normal',
                    false
                );
            };

            const deleteMedication = async (id) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const { error } = await supabase
                    .from('medications')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error deleting medication');
                    return;
                }

                loadUserData(userId);
                loadTimelineEvents();
            };

            const addAppointment = async (name, time, location, notes) => {
                if (!name) {
                    alert('Please enter appointment name');
                    return;
                }

                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

                const { error } = await supabase
                    .from('appointments')
                    .insert([{
                        user_id: userId,
                        appointment_name: name,
                        appointment_time: time,
                        location,
                        notes
                    }]);

                if (error) {
                    alert('Error adding appointment');
                    return;
                }

                setShowAddAppointment(false);
                loadUserData(userId);
                loadTimelineEvents();
                
                addToTimeline(
                    'appointment_added',
                    `Scheduled: ${name}`,
                    location || '',
                    '📅',
                    'normal',
                    false
                );
            };

            const deleteAppointment = async (id) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const { error } = await supabase
                    .from('appointments')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error deleting appointment');
                    return;
                }

                loadUserData(userId);
                loadTimelineEvents();
            };

            const addActivity = async (name, time, notes) => {
                if (!name) {
                    alert('Please enter activity name');
                    return;
                }

                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

                const { error } = await supabase
                    .from('activities')
                    .insert([{
                        user_id: userId,
                        activity_name: name,
                        time,
                        notes,
                        status: 'pending'
                    }]);

                if (error) {
                    alert('Error adding activity');
                    return;
                }

                setShowAddActivity(false);
                loadUserData(userId);
                loadTimelineEvents();
            };

            const deleteActivity = async (id) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const { error } = await supabase
                    .from('activities')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error deleting activity');
                    return;
                }

                loadUserData(userId);
                loadTimelineEvents();
            };

            const toggleActivityStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;

                const { error } = await supabase

                    recorder.ondataavailable = (e) => {

                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                        const fileName = `${userId}/recording_${Date.now()}.webm`;

                        >
                            <Heart className="w-6 h-6" />
                            <span className="text-xs mt-1">Check-In</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('carenotes')}
                            className={`flex flex-col items-center ${currentPage === 'carenotes' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <FileText className="w-6 h-6" />
                            <span className="text-xs mt-1">Notes</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('safety')}
                            className={`flex flex-col items-center ${currentPage === 'safety' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Shield className="w-6 h-6" />
                            <span className="text-xs mt-1">Safety</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('carecircle')}
                            className={`flex flex-col items-center ${currentPage === 'carecircle' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Users className="w-6 h-6" />
                            <span className="text-xs mt-1">Circle</span>
                        </button>
                    </div>
                );
            };

            const renderHeader = (title) => {
                const unreadCount = notifications.filter(n => !n.isRead).length;
                
                return (
                    <div className="flex justify-between items-center mb-8">
                        <button 
                            onClick={() => setShowSidebar(true)} 
                            className="w-14 h-14 rounded-full border-2 border-white flex items-center justify-center"
                        >
                            <User className="w-8 h-8 text-white" />
                        </button>
                        
                        <h1 className="text-4xl font-serif text-white">{title}</h1>
                        
                        <button 
                            onClick={() => setShowNotifications(true)}
                            className="w-14 h-14 rounded-full border-2 border-white flex items-center justify-center relative"
                        >
                            <Bell className="w-8 h-8 text-white" />
                            {unreadCount > 0 && (
                                <span className="notification-badge">{unreadCount}</span>
                            )}
                        </button>
                    </div>
                );
            };

            // ===== LOADING SCREEN =====
            if (showAuth) {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 flex items-center justify-center p-6">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-md">
                            <h1 className="text-5xl font-serif text-center mb-2 text-teal-700">Salama</h1>
                            <p className="text-center text-gray-600 mb-8 italic">Care with dignity</p>
                            
                            <div className="mb-6">
                                <div className="flex gap-2 mb-4">
                                    <button 
                                        onClick={() => setIsLogin(true)}
                                        className={`flex-1 py-3 rounded-lg font-semibold ${isLogin ? 'bg-teal-600 text-white' : 'bg-gray-200 text-gray-700'}`}
                                    >
                                        Login
                                    </button>
                                    <button 
                                        onClick={() => setIsLogin(false)}
                                        className={`flex-1 py-3 rounded-lg font-semibold ${!isLogin ? 'bg-teal-600 text-white' : 'bg-gray-200 text-gray-700'}`}
                                    >
                                        Sign Up
                                    </button>
                                </div>
                                
                                {!isLogin && (
                                    <div className="mb-4">
                                        <label className="block text-sm font-semibold mb-2">I am a:</label>
                                        <select 
                                            value={authRole}
                                            onChange={(e) => setAuthRole(e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg"
                                        >
                                            <option value="care_recipient">Care Recipient</option>
                                            <option value="caregiver">Family Caregiver</option>
                                            <option value="professional">Professional Caregiver</option>
                                        </select>
                                    </div>
                                )}
                                
                                {!isLogin && (
                                    <input
                                        type="text"
                                        placeholder="Full Name"
                                        value={authName}
                                        onChange={(e) => setAuthName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg"
                                    />
                                )}
                                
                                <input
                                    type="text"
                                    placeholder="Username"
                                    value={authUsername}
                                    onChange={(e) => setAuthUsername(e.target.value)}
                                    className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg"
                                />
                                
                                <div className="relative">
                                    <input
                                        type={showPassword ? "text" : "password"}
                                        placeholder="Password"
                                        value={authPassword}
                                        onChange={(e) => setAuthPassword(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg pr-12"
                                    />
                                    <button
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-4 top-4 text-gray-600"
                                    >
                                        {showPassword ? '👁️' : '👁️‍🗨️'}
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={handleAuth}
                                    className="w-full bg-teal-600 text-white py-4 rounded-lg text-lg font-semibold hover:bg-teal-700"
                                >
                                    {isLogin ? 'Login' : 'Create Account'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== MAIN APP =====
            return (
                <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 pb-24">
                    {/* ===== ERROR DISPLAY (PART 15) ===== */}
                    {error && (
                        <div className="fixed top-4 left-4 right-4 z-50 animate-slideUp">
                            <div className="bg-red-500 text-white p-4 rounded-lg shadow-2xl flex items-start gap-3">
                                <AlertCircle className="w-6 h-6 mt-0.5" />
                                <div className="flex-1">
                                    <p className="font-semibold">Error</p>
                                    <p className="text-sm">{error}</p>
                                </div>
                                <button 
                                    onClick={() => setError(null)}
                                    className="text-white text-xl"
                                >
                                    ✕
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== LOADING SPINNER (PART 15) ===== */}
                    {isLoading && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                            <div className="bg-white rounded-3xl p-8 flex flex-col items-center">
                                <div className="w-16 h-16 border-4 border-teal-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-lg font-semibold text-black">Loading...</p>
                            </div>
                        </div>
                    )}

                    {/* ===== OFFLINE INDICATOR (PART 16) ===== */}
                    {!isOnline && (
                        <div className="fixed top-4 left-4 right-4 z-40">
                            <div className="bg-orange-500 text-white p-3 rounded-lg shadow-lg flex items-center gap-2">
                                <AlertCircle className="w-5 h-5" />
                                <span className="text-sm">You are offline. Changes will sync when reconnected.</span>
                            </div>
                        </div>
                    )}

                    {/* ===== SEARCH MODAL (PART 17) ===== */}
                    {showSearch && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col">
                            <div className="p-6 bg-gradient-to-b from-teal-600 to-blue-300">
                                <div className="flex items-center gap-3 mb-4">
                                    <button onClick={() => setShowSearch(false)} className="text-white text-3xl">←</button>
                                    <h2 className="text-2xl font-serif text-white">Search</h2>
                                </div>
                                
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder="Search medications, appointments, documents..."
                                    className="w-full p-4 rounded-lg text-lg"
                                    autoFocus
                                />
                                
                                <div className="flex gap-2 mt-4 overflow-x-auto">
                                    {['all', 'medications', 'appointments', 'documents', 'tasks'].map(type => (
                                        <button
                                            key={type}
                                            onClick={() => setFilterType(type)}
                                            className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${
                                                filterType === type 
                                                    ? 'bg-white text-teal-700' 
                                                    : 'bg-white/20 text-white'
                                            }`}
                                        >
                                            {type.charAt(0).toUpperCase() + type.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-6 bg-white">
                                {filterData().length === 0 ? (
                                    <div className="text-center py-12">
                                        <p className="text-gray-500 text-xl">No results found</p>
                                        <p className="text-gray-400 mt-2">Try a different search term</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {filterData().map((result, idx) => (
                                            <div key={idx} className="p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-2xl">
                                                                {result.type === 'medication' && '💊'}
                                                                {result.type === 'appointment' && '📅'}
                                                                {result.type === 'document' && '📄'}
                                                                {result.type === 'task' && '📋'}
                                                            </span>
                                                            <span className="text-xs bg-gray-200 px-2 py-1 rounded">
                                                                {result.type}
                                                            </span>
                                                        </div>
                                                        <p className="font-semibold text-black">
                                                            {result.medication_name || result.appointment_name || result.document_name || result.task_name}
                                                        </p>
                                                        {result.dosage && <p className="text-sm text-gray-600">{result.dosage}</p>}
                                                        {result.location && <p className="text-sm text-gray-600">📍 {result.location}</p>}
                                                        {result.description && <p className="text-sm text-gray-600">{result.description}</p>}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== EXPORT OPTIONS MODAL (PART 18) ===== */}
                    {showExportOptions && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Export Your Data</h2>
                                    <button onClick={() => setShowExportOptions(false)} className="text-2xl">✕</button>
                                </div>
                                
                                <div className="space-y-3 mb-6">
                                    <button 
                                        onClick={exportToJSON}
                                        className="w-full bg-teal-600 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center"
                                    >
                                        <div>
                                            <p className="font-semibold">Complete Data (JSON)</p>
                                            <p className="text-sm text-white/80">All your Salama data in one file</p>
                                        </div>
                                        <span className="text-2xl">📦</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => exportToCSV('medications')}
                                        className="w-full bg-blue-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center"
                                    >
                                        <div>
                                            <p className="font-semibold">Medications (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">💊</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => exportToCSV('appointments')}
                                        className="w-full bg-purple-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center"
                                    >
                                        <div>
                                            <p className="font-semibold">Appointments (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">📅</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => exportToCSV('tasks')}
                                        className="w-full bg-orange-500 text-white py-3 rounded-lg text-left px-4 flex justify-between items-center"
                                    >
                                        <div>
                                            <p className="font-semibold">Tasks (CSV)</p>
                                            <p className="text-sm text-white/80">Spreadsheet format</p>
                                        </div>
                                        <span className="text-2xl">📋</span>
                                    </button>
                                </div>
                                
                                <div className="pt-4 border-t border-gray-200">
                                    <button
                                        onClick={() => {
                                            generateAnalytics();
                                            setTimeout(() => {
                                                const modal = document.createElement('div');
                                                modal.innerHTML = `
                                                    <div class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6" onclick="this.remove()">
                                                        <div class="bg-white rounded-3xl p-8 max-w-2xl w-full" onclick="event.stopPropagation()">
                                                            <div class="flex justify-between items-center mb-6">
                                                                <h3 class="text-3xl font-serif">Your Analytics</h3>
                                                                <button onclick="this.closest('.fixed').remove()" class="text-2xl">✕</button>
                                                            </div>
                                                            <div class="grid grid-cols-2 gap-4 mb-6">
                                                                <div class="p-4 bg-teal-50 rounded-lg">
                                                                    <p class="text-3xl font-bold text-teal-700">${analyticsData?.summary?.totalMedications || 0}</p>
                                                                    <p class="text-sm text-gray-600">Medications</p>
                                                                </div>
                                                                <div class="p-4 bg-blue-50 rounded-lg">
                                                                    <p class="text-3xl font-bold text-blue-700">${analyticsData?.summary?.totalAppointments || 0}</p>
                                                                    <p class="text-sm text-gray-600">Appointments</p>
                                                                </div>
                                                                <div class="p-4 bg-purple-50 rounded-lg">
                                                                    <p class="text-3xl font-bold text-purple-700">${analyticsData?.summary?.completedTasks || 0}/${analyticsData?.summary?.totalTasks || 0}</p>
                                                                    <p class="text-sm text-gray-600">Tasks Completed</p>
                                                                </div>
                                                                <div class="p-4 bg-green-50 rounded-lg">
                                                                    <p class="text-3xl font-bold text-green-700">${analyticsData?.summary?.averageMoodValue || 'N/A'}</p>
                                                                    <p class="text-sm text-gray-600">Avg Mood (1-5)</p>
                                                                </div>
                                                            </div>
                                                            <div class="mb-6">
                                                                <h4 class="font-semibold mb-2">Care Circle</h4>
                                                                <p class="text-gray-600">${analyticsData?.careCircle?.totalCaregivers || 0} caregivers in your circle</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                `;
                                                document.body.appendChild(modal);
                                            }, 100);
                                        }}
                                        className="w-full bg-gray-200 text-black py-3 rounded-lg font-semibold"
                                    >
                                        📊 View Analytics
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ACCESSIBILITY MODAL (PART 19) ===== */}
                    {showAccessibilitySettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Accessibility</h2>
                                    <button onClick={() => setShowAccessibilitySettings(false)} className="text-2xl">✕</button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-lg font-semibold mb-3">Text Size</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['small', 'normal', 'large', 'xlarge'].map((size, idx) => (
                                                <button
                                                    key={size}
                                                    onClick={() => setFontSize(size)}
                                                    className={`py-2 rounded-lg font-semibold ${
                                                        fontSize === size 
                                                            ? 'bg-teal-600 text-white' 
                                                            : 'bg-gray-200 text-black'
                                                    }`}
                                                    style={{ fontSize: ['12px', '16px', '20px', '24px'][idx] }}
                                                >
                                                    A
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                            <div>
                                                <p className="font-semibold">High Contrast Mode</p>
                                                <p className="text-sm text-gray-600">Easier to read for low vision</p>
                                            </div>
                                            <button 
                                                onClick={() => setHighContrast(!highContrast)}
                                                className={`w-14 h-7 rounded-full ${highContrast ? 'bg-teal-600' : 'bg-gray-400'}`}
                                            >
                                                <div className={`w-6 h-6 bg-white rounded-full transition-transform ${highContrast ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                            </button>
                                        </label>
                                    </div>
                                    
                                    <div>
                                        <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                            <div>
                                                <p className="font-semibold">Voice Announcements</p>
                                                <p className="text-sm text-gray-600">Speak notifications aloud</p>
                                            </div>
                                            <button 
                                                onClick={() => setVoiceAnnouncements(!voiceAnnouncements)}
                                                className={`w-14 h-7 rounded-full ${voiceAnnouncements ? 'bg-teal-600' : 'bg-gray-400'}`}
                                            >
                                                <div className={`w-6 h-6 bg-white rounded-full transition-transform ${voiceAnnouncements ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                            </button>
                                        </label>
                                    </div>
                                    
                                    <div className="pt-4 border-t border-gray-200">
                                        <p className="text-sm text-gray-600 mb-2">Keyboard Shortcuts:</p>
                                        <ul className="text-sm text-gray-600 space-y-1">
                                            <li>• <kbd className="bg-gray-200 px-2 py-1 rounded text-xs">Esc</kbd> - Close modals</li>
                                            <li>• <kbd className="bg-gray-200 px-2 py-1 rounded text-xs">Ctrl/Cmd + K</kbd> - Search</li>
                                            <li>• <kbd className="bg-gray-200 px-2 py-1 rounded text-xs">Ctrl/Cmd + /</kbd> - Help</li>
                                        </ul>
                                    </div>
                                </div>
                                
                                <button 
                                    onClick={() => setShowAccessibilitySettings(false)}
                                    className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mt-6"
                                >
                                    Done
                                </button>
                            </div>
                        </div>
                    )}
                    {/* ===== NOTIFICATIONS PANEL ===== */}
                    {showNotifications && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-start justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full mt-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-black">Notifications</h2>
                                    <button onClick={() => setShowNotifications(false)} className="text-2xl">✕</button>
                                </div>
                                
                                {notifications.length === 0 ? (
                                    <div className="text-center py-12">
                                        <Bell className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                        <p className="text-gray-500">No notifications</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {notifications.map(notif => (
                                            <div 
                                                key={notif.id}
                                                onClick={() => markNotificationRead(notif.id)}
                                                className={`p-4 rounded-lg cursor-pointer ${
                                                    notif.isRead ? 'bg-gray-50' : 'bg-blue-50 border-2 border-blue-200'
                                                }`}
                                            >
                                                <div className="flex items-start gap-3">
                                                    {notif.type === 'alert' && <AlertCircle className="w-5 h-5 text-red-500 mt-1" />}
                                                    {notif.type === 'update' && <CheckCircle className="w-5 h-5 text-green-500 mt-1" />}
                                                    {notif.type === 'reminder' && <Clock className="w-5 h-5 text-blue-500 mt-1" />}
                                                    
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-black">{notif.title}</p>
                                                        <p className="text-sm text-gray-600">{notif.message}</p>
                                                        {notif.timestamp && (
                                                            <p className="text-xs text-gray-400 mt-1">
                                                                {new Date(notif.timestamp).toLocaleString()}
                                                            </p>
