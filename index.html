                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                await supabase
                    .from('appointments')
                    .delete()
                    .eq('id', apptId);
                
                await loadUserData(userId);
                await loadTimelineEvents(userId);
            };

            const addActivity = async (name, time, notes) => {
                if (!name) {
                    alert('Please enter activity name');
                    return;
                }
                
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const { error } = await supabase
                    .from('activities')
                    .insert({
                        user_id: userId,
                        activity_name: name,
                        time,
                        notes,
                        status: 'pending'
                    });
                
                if (!error) {
                    await loadUserData(userId);
                    await loadTimelineEvents(userId);
                    setShowAddActivity(false);
                    addToTimeline('activity_added', `Added: ${name}`, time, '🏃', 'normal');
                }
            };

            const toggleActivityStatus = async (actId, currentStatus) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
                
                const { error } = await supabase
                    .from('activities')
                    .update({ status: newStatus })
                    .eq('id', actId);
                
                if (!error) {
                    await loadUserData(userId);
                    await loadTimelineEvents(userId);
                    
                    if (newStatus === 'completed') {
                        const activity = activities.find(a => a.id === actId);
                        if (activity) {
                            addToTimeline('activity_completed', `Completed: ${activity.activity_name}`, null, '✅', 'normal');
                        }
                    }
                }
            };

            const deleteActivity = async (actId) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                await supabase
                    .from('activities')
                    .delete()
                    .eq('id', actId);
                
                await loadUserData(userId);
                await loadTimelineEvents(userId);
            };

            const uploadDocument = async (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                if (file.size > 10 * 1024 * 1024) {
                    alert('File too large! Maximum 10MB');
                    return;
                }
                
                setUploadingFile(true);
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                const fileExt = file.name.split('.').pop();
                const fileName = `${userId}/docs/${Date.now()}.${fileExt}`;
                
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('salama-documents')
                    .upload(fileName, file);
                
                if (uploadError) {
                    alert('Upload failed: ' + uploadError.message);
                    setUploadingFile(false);
                    return;
                }
                
                const { data: { publicUrl } } = supabase.storage
                    .from('salama-documents')
                    .getPublicUrl(fileName);
                
                const { error: dbError } = await supabase
                    .from('documents')
                    .insert({
                        user_id: userId,
                        document_name: file.name,
                        document_type: fileExt,
                        file_url: publicUrl
                    });
                
                if (!dbError) {
                    await loadUserData(userId);
                    addToTimeline('document_uploaded', `Uploaded: ${file.name}`, null, '📄', 'normal');
                }
                
                setUploadingFile(false);
            };

            const deleteDocument = async (docId, fileUrl) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const fileName = fileUrl.split('/').slice(-2).join('/');
                await supabase.storage
                    .from('salama-documents')
                    .remove([fileName]);
                
                await supabase
                    .from('documents')
                    .delete()
                    .eq('id', docId);
                
                await loadUserData(userId);
            };

            const updateProfile = async () => {
                const { error } = await supabase
                    .from('users')
                    .update({
                        name: editName,
                        avatar: editAvatar
                    })
                    .eq('id', currentUser.id);
                
                if (!error) {
                    const updatedUser = { ...currentUser, name: editName, avatar: editAvatar };
                    setCurrentUser(updatedUser);
                    localStorage.setItem('salamaUser', JSON.stringify(updatedUser));
                    setShowProfileEdit(false);
                }
            };

            const sendQuickText = async (text) => {
                if (text === 'Custom message...') {
                    const customMsg = prompt('Enter your message:');
                    if (!customMsg) return;
                    text = customMsg;
                }
                
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                // Send to all caregivers with permission
                for (const caregiver of caregivers) {
                    const perm = caregiverPermissions[caregiver.id];
                    if (perm && perm.receive_quick_text_alerts) {
                        await supabase
                            .from('quick_text_alerts')
                            .insert({
                                care_recipient_id: userId,
                                caregiver_id: caregiver.id,
                                message: text
                            });
                    }
                }
                
                addToTimeline('quick_text_sent', 'Quick Text Sent', text, '📱', 'high');
                alert('Message sent to caregivers!');
            };

            // ===== AUTH FUNCTIONS =====
            const handleAuth = async () => {
                if (isLogin) {
                    // Login
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('username', authUsername)
                        .eq('password', authPassword)
                        .single();
                    
                    if (data) {
                        setCurrentUser(data);
                        localStorage.setItem('salamaUser', JSON.stringify(data));
                        setShowAuth(false);
                        checkUser(data);
                        loadUserData(data.id);
                        loadCaregivers(data.care_circle_id);
                        loadCareTips();
                        loadCareTasks(data.id);
                        loadNotifications(data.id);
                        loadTimelineEvents(data.id);
                        calculateKeyMetrics(data.id);
                        loadRecentMoods(data.id);
                        
                        // Check if first time user
                        const hasSeenOnboarding = localStorage.getItem('salamaOnboardingComplete');
                        if (!hasSeenOnboarding && data.role === 'care_recipient') {
                            setShowOnboarding(true);
                        }
                    } else {
                        alert('Invalid credentials');
                    }
                } else {
                    // Register
                    if (!authUsername || !authPassword || !authName) {
                        alert('Please fill all fields');
                        return;
                    }
                    
                    const careCircleId = crypto.randomUUID();
                    
                    const { data, error } = await supabase
                        .from('users')
                        .insert({
                            username: authUsername,
                            password: authPassword,
                            name: authName,
                            role: authRole,
                            role_type: authRole,
                            avatar: authRole === 'care_recipient' ? '👴' : '👨‍⚕️',
                            care_circle_id: careCircleId
                        })
                        .select()
                        .single();
                    
                    if (data) {
                        setCurrentUser(data);
                        localStorage.setItem('salamaUser', JSON.stringify(data));
                        setShowAuth(false);
                        
                        // Show onboarding for new care recipients
                        if (authRole === 'care_recipient') {
                            setShowOnboarding(true);
                        }
                        
                        // Professional setup for professionals
                        if (authRole === 'professional') {
                            setShowProfessionalSetup(true);
                        }
                    } else {
                        alert('Error creating account: ' + error.message);
                    }
                }
            };

            const startQRScanner = () => {
                setShowQRScanner(true);
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("qr-reader");
                    html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: 250 },
                        async (decodedText) => {
                            html5QrCode.stop();
                            setShowQRScanner(false);
                            
                            const { data, error } = await supabase
                                .from('users')
                                .select('id, name, care_circle_id')
                                .eq('care_circle_id', decodedText)
                                .single();
                            
                            if (data) {
                                await supabase
                                    .from('caregivers')
                                    .insert({
                                        care_circle_id: data.care_circle_id,
                                        caregiver_user_id: currentUser.id,
                                        name: currentUser.name,
                                        avatar: currentUser.avatar
                                    });
                                
                                alert(`Added to ${data.name}'s care circle!`);
                                await loadMyCareRecipients(currentUser.id);
                            } else {
                                alert('Invalid QR code');
                            }
                        }
                    );
                }, 100);
            };

            const loadMessages = async (otherUserId) => {
                const { data } = await supabase
                    .from('messages')
                    .select('*')
                    .or(`from_user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`)
                    .or(`from_user_id.eq.${otherUserId},to_user_id.eq.${otherUserId}`)
                    .order('created_at', { ascending: true });
                
                if (data) {
                    const formatted = data.map(msg => ({
                        sender: msg.from_user_id === currentUser.id ? 'me' : 'them',
                        text: msg.message_text,
                        time: new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }));
                    setChatMessages(formatted);
                }
            };

            const sendMessage = async () => {
                if (!messageInput.trim() || !chatWith) return;
                
                await supabase
                    .from('messages')
                    .insert({
                        from_user_id: currentUser.id,
                        to_user_id: chatWith.id,
                        message_text: messageInput
                    });
                
                setChatMessages([...chatMessages, {
                    sender: 'me',
                    text: messageInput,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
                
                setMessageInput('');
            };

            const askSalama = async (question) => {
                setProtectionMessages(prev => [...prev, {
                    sender: 'me',
                    text: question,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
                setProtectionInput('');
                setIsAIThinking(true);
                
                setTimeout(() => {
                    let response = "I'm here to help! ";
                    
                    if (question.toLowerCase().includes('lonely')) {
                        response = "I understand feeling lonely can be difficult. Would you like me to notify your caregivers? Or we can just chat - I'm always here to listen.";
                    } else if (question.toLowerCase().includes('joke')) {
                        response = "Why don't scientists trust atoms? Because they make up everything! 😄";
                    } else if (question.toLowerCase().includes('suspicious') || question.toLowerCase().includes('safety')) {
                        response = "Your safety is important. I've alerted your caregivers. If this is an emergency, please use the SOS button or call emergency services.";
                        sendQuickText('Salama AI detected a safety concern');
                    } else if (question.toLowerCase().includes('weather')) {
                        response = "I don't have real-time weather data, but you can check your local forecast. Would you like me to remind you to bring an umbrella for your next outing?";
                    } else {
                        response = "That's a great question! How can I best help you with that?";
                    }
                    
                    setProtectionMessages(prev => [...prev, {
                        sender: 'salama',
                        text: response,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }]);
                    setIsAIThinking(false);
                }, 1500);
            };

            const logout = () => {
                localStorage.removeItem('salamaUser');
                window.location.reload();
            };
            // ===== RENDER FUNCTIONS =====
            const renderNavBar = () => {
                if (showAuth) return null;
                
                // Professional Navigation
                if (isProfessional) {
                    return (
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-300 flex justify-around py-3 z-40">
                            <button 
                                onClick={() => setCurrentPage('dashboard')}
                                className={`flex flex-col items-center ${currentPage === 'dashboard' ? 'text-teal-600' : 'text-gray-600'}`}
                            >
                                <Home className="w-6 h-6" />
                                <span className="text-xs mt-1">Dashboard</span>
                            </button>
                            <button 
                                onClick={() => setCurrentPage('requests')}
                                className={`flex flex-col items-center ${currentPage === 'requests' ? 'text-teal-600' : 'text-gray-600'}`}
                            >
                                <FileText className="w-6 h-6" />
                                <span className="text-xs mt-1">Requests</span>
                            </button>
                            <button 
                                onClick={() => setCurrentPage('assignments')}
                                className={`flex flex-col items-center ${currentPage === 'assignments' ? 'text-teal-600' : 'text-gray-600'}`}
                            >
                                <Users className="w-6 h-6" />
                                <span className="text-xs mt-1">Cases</span>
                            </button>
                            <button 
                                onClick={() => setCurrentPage('profile')}
                                className={`flex flex-col items-center ${currentPage === 'profile' ? 'text-teal-600' : 'text-gray-600'}`}
                            >
                                <User className="w-6 h-6" />
                                <span className="text-xs mt-1">Profile</span>
                            </button>
                        </div>
                    );
                }
                
                // Regular Navigation
                return (
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-300 flex justify-around py-3 z-40">
                        <button 
                            onClick={() => setCurrentPage('home')}
                            className={`flex flex-col items-center ${currentPage === 'home' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Home className="w-6 h-6" />
                            <span className="text-xs mt-1">Home</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('timeline')}
                            className={`flex flex-col items-center relative ${currentPage === 'timeline' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Clock className="w-6 h-6" />
                            <span className="text-xs mt-1">Timeline</span>
                            {todaysEvents.length > 0 && (
                                <span className="notification-badge">{todaysEvents.length}</span>
                            )}
                        </button>
                        <button 
                            onClick={() => setCurrentPage('checkin')}
                            className={`flex flex-col items-center ${currentPage === 'checkin' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Heart className="w-6 h-6" />
                            <span className="text-xs mt-1">Check-In</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('carenotes')}
                            className={`flex flex-col items-center ${currentPage === 'carenotes' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <FileText className="w-6 h-6" />
                            <span className="text-xs mt-1">Notes</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('safety')}
                            className={`flex flex-col items-center ${currentPage === 'safety' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Shield className="w-6 h-6" />
                            <span className="text-xs mt-1">Safety</span>
                        </button>
                        <button 
                            onClick={() => setCurrentPage('carecircle')}
                            className={`flex flex-col items-center ${currentPage === 'carecircle' ? 'text-teal-600' : 'text-gray-600'}`}
                        >
                            <Users className="w-6 h-6" />
                            <span className="text-xs mt-1">Circle</span>
                        </button>
                    </div>
                );
            };

            const renderHeader = (title) => {
                const unreadCount = notifications.filter(n => !n.isRead).length;
                
                return (
                    <div className="flex justify-between items-center mb-8">
                        <button 
                            onClick={() => setShowSidebar(true)} 
                            className="w-14 h-14 rounded-full border-2 border-white flex items-center justify-center"
                        >
                            <User className="w-8 h-8 text-white" />
                        </button>
                        
                        <h1 className="text-4xl font-serif text-white">{title}</h1>
                        
                        <button 
                            onClick={() => setShowNotifications(true)}
                            className="w-14 h-14 rounded-full border-2 border-white flex items-center justify-center relative"
                        >
                            <Bell className="w-8 h-8 text-white" />
                            {unreadCount > 0 && (
                                <span className="notification-badge">{unreadCount}</span>
                            )}
                        </button>
                    </div>
                );
            };

            // ===== LOADING SCREEN =====
            if (showAuth) {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 flex items-center justify-center p-6">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-md">
                            <h1 className="text-5xl font-serif text-center mb-2 text-teal-700">Salama</h1>
                            <p className="text-center text-gray-600 mb-8 italic">Care with dignity</p>
                            
                            <div className="mb-6">
                                <div className="flex gap-2 mb-4">
                                    <button 
                                        onClick={() => setIsLogin(true)}
                                        className={`flex-1 py-3 rounded-lg font-semibold ${isLogin ? 'bg-teal-600 text-white' : 'bg-gray-200 text-gray-700'}`}
                                    >
                                        Login
                                    </button>
                                    <button 
                                        onClick={() => setIsLogin(false)}
                                        className={`flex-1 py-3 rounded-lg font-semibold ${!isLogin ? 'bg-teal-600 text-white' : 'bg-gray-200 text-gray-700'}`}
                                    >
                                        Sign Up
                                    </button>
                                </div>
                                
                                {!isLogin && (
                                    <div className="mb-4">
                                        <label className="block text-sm font-semibold mb-2">I am a:</label>
                                        <select 
                                            value={authRole}
                                            onChange={(e) => setAuthRole(e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg"
                                        >
                                            <option value="care_recipient">Care Recipient</option>
                                            <option value="caregiver">Family Caregiver</option>
                                            <option value="professional">Professional Caregiver</option>
                                        </select>
                                    </div>
                                )}
                                
                                {!isLogin && (
                                    <input
                                        type="text"
                                        placeholder="Full Name"
                                        value={authName}
                                        onChange={(e) => setAuthName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg"
                                    />
                                )}
                                
                                <input
                                    type="text"
                                    placeholder="Username"
                                    value={authUsername}
                                    onChange={(e) => setAuthUsername(e.target.value)}
                                    className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg"
                                />
                                
                                <div className="relative">
                                    <input
                                        type={showPassword ? "text" : "password"}
                                        placeholder="Password"
                                        value={authPassword}
                                        onChange={(e) => setAuthPassword(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg mb-4 text-lg pr-12"
                                    />
                                    <button
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-4 top-4 text-gray-600"
                                    >
                                        {showPassword ? '👁️' : '👁️‍🗨️'}
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={handleAuth}
                                    className="w-full bg-teal-600 text-white py-4 rounded-lg text-lg font-semibold hover:bg-teal-700"
                                >
                                    {isLogin ? 'Login' : 'Create Account'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== MAIN APP =====
            return (
                <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 pb-24">
                    {/* ===== ✨ NEW: NOTIFICATIONS PANEL ===== */}
                    {showNotifications && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-start justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full mt-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-black">Notifications</h2>
                                    <button onClick={() => setShowNotifications(false)} className="text-2xl">✕</button>
                                </div>
                                
                                {notifications.length === 0 ? (
                                    <div className="text-center py-12">
                                        <Bell className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                        <p className="text-gray-500">No notifications</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {notifications.map(notif => (
                                            <div 
                                                key={notif.id}
                                                onClick={() => markNotificationRead(notif.id)}
                                                className={`p-4 rounded-lg cursor-pointer ${
                                                    notif.isRead ? 'bg-gray-50' : 'bg-blue-50 border-2 border-blue-200'
                                                }`}
                                            >
                                                <div className="flex items-start gap-3">
                                                    {notif.type === 'alert' && <AlertCircle className="w-5 h-5 text-red-500 mt-1" />}
                                                    {notif.type === 'update' && <CheckCircle className="w-5 h-5 text-green-500 mt-1" />}
                                                    {notif.type === 'reminder' && <Clock className="w-5 h-5 text-blue-500 mt-1" />}
                                                    
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-black">{notif.title}</p>
                                                        <p className="text-sm text-gray-600">{notif.message}</p>
                                                        {notif.timestamp && (
                                                            <p className="text-xs text-gray-400 mt-1">
                                                                {new Date(notif.timestamp).toLocaleString()}
                                                            </p>
                                                        )}
                                                    </div>
                                                    
                                                    {!notif.isRead && (
                                                        <div className="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {notifications.length > 0 && (
                                    <button 
                                        onClick={() => setNotifications([])}
                                        className="w-full mt-4 text-sm text-gray-500 hover:text-gray-700"
                                    >
                                        Clear All
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== ✨ NEW: ONBOARDING FLOW ===== */}
                    {showOnboarding && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="mb-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-3xl font-serif text-black">Welcome to Salama! 👋</h2>
                                        <button onClick={skipOnboarding} className="text-gray-400 text-sm">Skip</button>
                                    </div>
                                    <div className="flex gap-2">
                                        {[0,1,2,3,4].map(step => (
                                            <div 
                                                key={step}
                                                className={`flex-1 h-2 rounded-full ${step <= onboardingStep ? 'bg-teal-600' : 'bg-gray-200'}`}
                                            />
                                        ))}
                                    </div>
                                </div>
                                
                                {onboardingStep === 0 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">🏠</div>
                                        <h3 className="text-2xl font-semibold mb-4">Let's get you set up</h3>
                                        <p className="text-gray-600 mb-6">Salama helps you manage your care, stay connected with loved ones, and maintain your independence.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(0)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Get Started
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 1 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">💊</div>
                                        <h3 className="text-2xl font-semibold mb-4">Track Your Medications</h3>
                                        <p className="text-gray-600 mb-6">Add your medications with times, and we'll help you remember to take them.</p>
                                        <button 
                                            onClick={() => {
                                                completeOnboardingStep(1);
                                                setShowAddMedication(true);
                                                setShowOnboarding(false);
                                            }}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mb-2"
                                        >
                                            Add First Medication
                                        </button>
                                        <button 
                                            onClick={() => completeOnboardingStep(1)}
                                            className="w-full text-gray-500"
                                        >
                                            Skip for now
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 2 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">👥</div>
                                        <h3 className="text-2xl font-semibold mb-4">Build Your Care Circle</h3>
                                        <p className="text-gray-600 mb-6">Share your QR code with family members so they can help care for you.</p>
                                        <button 
                                            onClick={() => {
                                                completeOnboardingStep(2);
                                                setShowQRCode(true);
                                                setShowOnboarding(false);
                                                setTimeout(() => generateQRCode(currentUser.care_circle_id), 300);
                                            }}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mb-2"
                                        >
                                            Show My QR Code
                                        </button>
                                        <button 
                                            onClick={() => completeOnboardingStep(2)}
                                            className="w-full text-gray-500"
                                        >
                                            Skip for now
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 3 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">😊</div>
                                        <h3 className="text-2xl font-semibold mb-4">Daily Check-Ins</h3>
                                        <p className="text-gray-600 mb-6">Tell us how you're feeling each day. We'll track trends and alert your caregivers if needed.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(3)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Got it!
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 4 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">🎉</div>
                                        <h3 className="text-2xl font-semibold mb-4">You're All Set!</h3>
                                        <p className="text-gray-600 mb-6">You can always access settings, add caregivers, or request professional care from your dashboard.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(4)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Start Using Salama
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    {/* ===== SIDEBAR ===== */}
                    {showSidebar && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex">
                            <div className="bg-white w-80 h-full p-6 overflow-y-auto">
                                <button onClick={() => setShowSidebar(false)} className="text-2xl mb-6">✕</button>
                                
                                <div className="text-center mb-8">
                                    <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">
                                        {currentUser.avatar}
                                    </div>
                                    <h2 className="text-2xl font-serif text-black">{currentUser.name}</h2>
                                    <p className="text-gray-600 capitalize">{currentUser.role_type || currentUser.role}</p>
                                    
                                    {isProfessional && professionalProfile?.is_verified && (
                                        <span className="inline-block bg-green-500 text-white px-3 py-1 rounded-full text-sm mt-2">
                                            ✓ Verified Professional
                                        </span>
                                    )}
                                    
                                    {viewingCareRecipient && (
                                        <div className="mt-4 p-3 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-gray-600">Currently viewing:</p>
                                            <p className="font-semibold text-black">{viewingCareRecipient.name}</p>
                                            <button 
                                                onClick={() => {
                                                    setViewingCareRecipient(null);
                                                    loadUserData(currentUser.id);
                                                    loadCareTasks(currentUser.id);
                                                    setShowSidebar(false);
                                                }}
                                                className="text-sm text-blue-600 mt-2"
                                            >
                                                Back to my view
                                            </button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-3">
                                    <button 
                                        onClick={() => {
                                            setShowProfileEdit(true);
                                            setEditName(currentUser.name);
                                            setEditAvatar(currentUser.avatar);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        👤 Edit Profile
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            setShowSettings(true);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        ⚙️ Settings
                                    </button>
                                    
                                    {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (
                                        <button 
                                            onClick={() => {
                                                setShowDocumentQRManager(true);
                                                setShowSidebar(false);
                                            }}
                                            className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                        >
                                            🔗 Share Links
                                        </button>
                                    )}
                                    
                                    {isProfessional && (
                                        <button 
                                            onClick={() => {
                                                setShowProfessionalSetup(true);
                                                setShowSidebar(false);
                                            }}
                                            className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                        >
                                            👨‍⚕️ Professional Settings
                                        </button>
                                    )}
                                    
                                    <button 
                                        onClick={() => {
                                            setShowOnboarding(true);
                                            setOnboardingStep(0);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        📚 Show Tutorial Again
                                    </button>
                                    
                                    <button 
                                        onClick={logout}
                                        className="w-full text-left p-4 bg-red-100 text-red-600 rounded-lg hover:bg-red-200"
                                    >
                                        🚪 Logout
                                    </button>
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => setShowSidebar(false)}></div>
                        </div>
                    )}

                    {/* ===== QR CODE MODAL ===== */}
                    {showQRCode && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">My Care Circle QR Code</h2>
                                <div id="qr-code-display" className="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                <p className="text-center text-gray-600 mb-6">Caregivers can scan this to join your care circle</p>
                                <button 
                                    onClick={() => setShowQRCode(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== QR SCANNER MODAL ===== */}
                    {showQRScanner && (
                        <div className="fixed inset-0 bg-black z-50 flex flex-col">
                            <div className="p-6 flex items-center justify-between bg-black/50">
                                <h2 className="text-2xl font-serif text-white">Scan QR Code</h2>
                                <button onClick={() => {
                                    setShowQRScanner(false);
                                    window.location.reload();
                                }} className="text-white text-3xl">✕</button>
                            </div>
                            <div id="qr-reader" className="flex-1"></div>
                        </div>
                    )}

                    {/* ===== PROFILE EDIT MODAL ===== */}
                    {showProfileEdit && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Edit Profile</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Name</label>
                                    <input
                                        type="text"
                                        value={editName}
                                        onChange={(e) => setEditName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                </div>
                                
                                <div className="mb-6">
                                    <label className="block text-lg font-semibold mb-2">Avatar</label>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['👴', '👵', '👨', '👩', '🧑', '👶', '🧓', '👨‍⚕️', '👩‍⚕️', '🧑‍⚕️'].map(emoji => (
                                            <button
                                                key={emoji}
                                                onClick={() => setEditAvatar(emoji)}
                                                className={`text-4xl p-3 rounded-lg ${editAvatar === emoji ? 'bg-teal-100 border-2 border-teal-600' : 'bg-gray-100'}`}
                                            >
                                                {emoji}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => setShowProfileEdit(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={updateProfile}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Save
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== PROFESSIONAL SETUP MODAL ===== */}
                    {showProfessionalSetup && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Professional Profile Setup</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Full Name</label>
                                        <input
                                            type="text"
                                            value={professionalForm.full_name}
                                            onChange={(e) => setProfessionalForm({...professionalForm, full_name: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Professional Type</label>
                                        <select
                                            value={professionalForm.professional_type}
                                            onChange={(e) => setProfessionalForm({...professionalForm, professional_type: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        >
                                            {professionalTypes.map(type => (
                                                <option key={type.value} value={type.value}>{type.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">License Number</label>
                                        <input
                                            type="text"
                                            value={professionalForm.license_number}
                                            onChange={(e) => setProfessionalForm({...professionalForm, license_number: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Years of Experience</label>
                                        <input
                                            type="number"
                                            value={professionalForm.years_experience}
                                            onChange={(e) => setProfessionalForm({...professionalForm, years_experience: parseInt(e.target.value)})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-lg font-semibold mb-2">City</label>
                                            <input
                                                type="text"
                                                value={professionalForm.city}
                                                onChange={(e) => setProfessionalForm({...professionalForm, city: e.target.value})}
                                                className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-lg font-semibold mb-2">State</label>
                                            <input
                                                type="text"
                                                value={professionalForm.state}
                                                onChange={(e) => setProfessionalForm({...professionalForm, state: e.target.value})}
                                                className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                            />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Bio</label>
                                        <textarea
                                            value={professionalForm.bio}
                                            onChange={(e) => setProfessionalForm({...professionalForm, bio: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-32"
                                            placeholder="Tell us about your experience and specialties..."
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Hourly Rate ($)</label>
                                        <input
                                            type="number"
                                            value={professionalForm.hourly_rate}
                                            onChange={(e) => setProfessionalForm({...professionalForm, hourly_rate: parseFloat(e.target.value)})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                </div>
                                
                                <div className="flex gap-4 mt-6">
                                    <button 
                                        onClick={() => setShowProfessionalSetup(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={createProfessionalProfile}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        {professionalProfile ? 'Update Profile' : 'Create Profile'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== SETTINGS MODAL ===== */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Settings</h2>
                                
                                <h3 className="text-2xl font-serif text-black mb-4">Caregiver Permissions</h3>
                                
                                {caregivers.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No caregivers yet. Add caregivers by sharing your QR code!</p>
                                ) : (
                                    caregivers.map((caregiver) => {
                                        const perms = caregiverPermissions[caregiver.id] || {};
                                        return (
                                            <div key={caregiver.id} className="mb-6 p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center text-2xl">
                                                        {caregiver.avatar}
                                                    </div>
                                                    <h4 className="text-xl font-semibold text-black">{caregiver.name}</h4>
                                                </div>
                                                
                                                <div className="space-y-3">
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view documents</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_documents || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_documents', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view medications</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_medications || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_medications', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view appointments</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_appointments || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_appointments', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view activities</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_activities || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_activities', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Receive quick text alerts</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.receive_quick_text_alerts || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'receive_quick_text_alerts', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                
                                <button 
                                    onClick={() => setShowSettings(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== DOCUMENT QR MANAGER MODAL ===== */}
                    {showDocumentQRManager && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Document Share Links</h2>
                                
                                <button 
                                    onClick={() => setShowCreateShareLink(true)}
                                    className="w-full bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold mb-6"
                                >
                                    + Create New Share Link
                                </button>
                                
                                {documentShareLinks.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No share links yet</p>
                                ) : (
                                    <div className="space-y-4">
                                        {documentShareLinks.map(link => (
                                            <div key={link.id} className="p-4 bg-gray-50 rounded-lg">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <h4 className="font-semibold text-lg">{link.link_name}</h4>
                                                        <p className="text-sm text-gray-600">Code: {link.link_code}</p>
                                                    </div>
                                                    <button 
                                                        onClick={() => deleteShareLink(link.id)}
                                                        className="text-red-500 text-xl"
                                                    >
                                                        🗑️
                                                    </button>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        const modal = document.createElement('div');
                                                        modal.innerHTML = `
                                                            <div class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6" onclick="this.remove()">
                                                                <div class="bg-white rounded-3xl p-8 max-w-md w-full" onclick="event.stopPropagation()">
                                                                    <h3 class="text-2xl font-serif text-center mb-6">${link.link_name}</h3>
                                                                    <div id="share-link-qr-${link.id}" class="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                                                    <p class="text-center text-gray-600 mb-6">Share Code: ${link.link_code}</p>
                                                                    <button onclick="this.closest('.fixed').remove()" class="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Close</button>
                                                                </div>
                                                            </div>
                                                        `;
                                                        document.body.appendChild(modal);
                                                        setTimeout(() => generateShareLinkQR(link.link_code), 300);
                                                    }}
                                                    className="w-full bg-blue-500 text-white py-2 rounded-lg text-sm"
                                                >
                                                    Show QR Code
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                <button 
                                    onClick={() => setShowDocumentQRManager(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== CREATE SHARE LINK MODAL ===== */}
                    {showCreateShareLink && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Create Share Link</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Link Name</label>
                                    <input
                                        type="text"
                                        placeholder="e.g., For Doctor"
                                        value={shareLinkName}
                                        onChange={(e) => setShareLinkName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                </div>
                                
                                <div className="mb-6">
                                    <label className="flex items-center gap-3">
                                        <input
                                            type="checkbox"
                                            checked={shareAllDocs}
                                            onChange={(e) => setShareAllDocs(e.target.checked)}
                                            className="w-6 h-6"
                                        />
                                        <span>Share all documents</span>
                                    </label>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => {
                                            setShowCreateShareLink(false);
                                            setShareLinkName('');
                                        }}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={createDocumentShareLink}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Create
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* ===== ADD MEDICATION MODAL ===== */}
                    {showAddMedication && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Medication</h2>
                                
                                <div className="space-y-4">
                                    <input
                                        type="text"
                                        placeholder="Medication Name *"
                                        id="med-name"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Dosage (e.g., 10mg)"
                                        id="med-dosage"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <input
                                        type="time"
                                        placeholder="Time"
                                        id="med-time"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <textarea
                                        placeholder="Notes (optional)"
                                        id="med-notes"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24"
                                    />
                                </div>
                                
                                <div className="flex gap-4 mt-6">
                                    <button 
                                        onClick={() => setShowAddMedication(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={() => {
                                            const name = document.getElementById('med-name').value;
                                            const dosage = document.getElementById('med-dosage').value;
                                            const time = document.getElementById('med-time').value;
                                            const notes = document.getElementById('med-notes').value;
                                            addMedication(name, dosage, time, notes);
                                        }}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Add
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD APPOINTMENT MODAL ===== */}
                    {showAddAppointment && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
