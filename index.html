            return (
                <div className="min-h-screen bg-gradient-to-b from-teal-600 to-blue-300 pb-24">
                    {error && (
                        <div className="fixed top-4 left-4 right-4 z-50 animate-slideUp">
                            <div className="bg-red-500 text-white p-4 rounded-lg shadow-2xl flex items-start gap-3">
                                <AlertCircle className="w-6 h-6 mt-0.5" />
                                <div className="flex-1">
                                    <p className="font-semibold">Error</p>
                                    <p className="text-sm">{error}</p>
                                </div>
                                <button onClick={() => setError(null)} className="text-white text-xl">✕</button>
                            </div>
                        </div>
                    )}

                    {isLoading && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                            <div className="bg-white rounded-3xl p-8 flex flex-col items-center">
                                <div className="w-16 h-16 border-4 border-teal-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-lg font-semibold text-black">Loading...</p>
                            </div>
                        </div>
                    )}

                    {/* ===== SIDEBAR ===== */}
                    {showSidebar && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex">
                            <div className="bg-white w-80 h-full p-6 overflow-y-auto">
                                <button onClick={() => setShowSidebar(false)} className="text-2xl mb-6">✕</button>
                                
                                <div className="text-center mb-8">
                                    <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">{currentUser.avatar}</div>
                                    <h2 className="text-2xl font-serif text-black">{currentUser.name}</h2>
                                    <p className="text-gray-600 capitalize">{currentUser.role_type || currentUser.role}</p>
                                    
                                    {viewingCareRecipient && (
                                        <div className="mt-4 p-3 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-gray-600">Viewing:</p>
                                            <p className="font-semibold text-black">{viewingCareRecipient.name}</p>
                                            <button onClick={() => { setViewingCareRecipient(null); loadUserData(currentUser.id); setShowSidebar(false); }} className="text-sm text-blue-600 mt-2">Back to my view</button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-3">
                                    <button onClick={() => { setShowProfileEdit(true); setEditName(currentUser.name); setEditAvatar(currentUser.avatar); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">👤 Edit Profile</button>
                                    <button onClick={() => { setShowSettings(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">⚙️ Settings</button>
                                    {isProfessional && (<button onClick={() => { setShowProfessionalSetup(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">👨‍⚕️ Professional Settings</button>)}
                                    <button onClick={() => { setShowSearch(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">🔍 Search</button>
                                    <button onClick={() => { setShowExportOptions(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">📦 Export Data</button>
                                    <button onClick={() => { setShowAccessibilitySettings(true); setShowSidebar(false); }} className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200">♿ Accessibility</button>
                                    <button onClick={logout} className="w-full text-left p-4 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">🚪 Logout</button>
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => setShowSidebar(false)}></div>
                        </div>
                    )}

                    {/* ===== NOTIFICATIONS ===== */}
                    {showNotifications && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-start justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full mt-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-black">Notifications</h2>
                                    <button onClick={() => setShowNotifications(false)} className="text-2xl">✕</button>
                                </div>
                                
                                {notifications.length === 0 ? (
                                    <div className="text-center py-12">
                                        <Bell className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                        <p className="text-gray-500">No notifications</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {notifications.map(notif => (
                                            <div key={notif.id} onClick={() => markNotificationRead(notif.id)} className={`p-4 rounded-lg cursor-pointer ${notif.isRead ? 'bg-gray-50' : 'bg-blue-50 border-2 border-blue-200'}`}>
                                                <p className="font-semibold text-black">{notif.title}</p>
                                                <p className="text-sm text-gray-600">{notif.message}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== SEARCH MODAL ===== */}
                    {showSearch && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col">
                            <div className="p-6 bg-gradient-to-b from-teal-600 to-blue-300">
                                <div className="flex items-center gap-3 mb-4">
                                    <button onClick={() => setShowSearch(false)} className="text-white text-3xl">←</button>
                                    <h2 className="text-2xl font-serif text-white">Search</h2>
                                </div>
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search..." className="w-full p-4 rounded-lg text-lg" autoFocus />
                                <div className="flex gap-2 mt-4 overflow-x-auto">
                                    {['all', 'medications', 'appointments', 'documents', 'tasks'].map(type => (
                                        <button key={type} onClick={() => setFilterType(type)} className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${filterType === type ? 'bg-white text-teal-700' : 'bg-white/20 text-white'}`}>{type.charAt(0).toUpperCase() + type.slice(1)}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 bg-white">
                                {filterData().length === 0 ? (
                                    <div className="text-center py-12"><p className="text-gray-500 text-xl">No results found</p></div>
                                ) : (
                                    <div className="space-y-3">
                                        {filterData().map((result, idx) => (
                                            <div key={idx} className="p-4 bg-gray-50 rounded-lg">
                                                <p className="font-semibold text-black">{result.medication_name || result.appointment_name || result.document_name || result.task_name}</p>
                                                <span className="text-xs bg-gray-200 px-2 py-1 rounded">{result.type}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== EXPORT OPTIONS ===== */}
                    {showExportOptions && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Export Data</h2>
                                    <button onClick={() => setShowExportOptions(false)} className="text-2xl">✕</button>
                                </div>
                                <div className="space-y-3">
                                    <button onClick={exportToJSON} className="w-full bg-teal-600 text-white py-3 rounded-lg">📦 Complete Data (JSON)</button>
                                    <button onClick={() => exportToCSV('medications')} className="w-full bg-blue-500 text-white py-3 rounded-lg">💊 Medications (CSV)</button>
                                    <button onClick={() => exportToCSV('appointments')} className="w-full bg-purple-500 text-white py-3 rounded-lg">📅 Appointments (CSV)</button>
                                    <button onClick={() => exportToCSV('tasks')} className="w-full bg-orange-500 text-white py-3 rounded-lg">📋 Tasks (CSV)</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ACCESSIBILITY ===== */}
                    {showAccessibilitySettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-serif text-black">Accessibility</h2>
                                    <button onClick={() => setShowAccessibilitySettings(false)} className="text-2xl">✕</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-lg font-semibold mb-3">Text Size</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['small', 'normal', 'large', 'xlarge'].map((size, idx) => (
                                                <button key={size} onClick={() => setFontSize(size)} className={`py-2 rounded-lg font-semibold ${fontSize === size ? 'bg-teal-600 text-white' : 'bg-gray-200 text-black'}`} style={{ fontSize: ['12px', '16px', '20px', '24px'][idx] }}>A</button>
                                            ))}
                                        </div>
                                    </div>
                                    <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                        <div>
                                            <p className="font-semibold">High Contrast Mode</p>
                                            <p className="text-sm text-gray-600">Easier to read</p>
                                        </div>
                                        <button onClick={() => setHighContrast(!highContrast)} className={`w-14 h-7 rounded-full ${highContrast ? 'bg-teal-600' : 'bg-gray-400'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${highContrast ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                        </button>
                                    </label>
                                    <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                        <div>
                                            <p className="font-semibold">Voice Announcements</p>
                                            <p className="text-sm text-gray-600">Speak notifications</p>
                                        </div>
                                        <button onClick={() => setVoiceAnnouncements(!voiceAnnouncements)} className={`w-14 h-7 rounded-full ${voiceAnnouncements ? 'bg-teal-600' : 'bg-gray-400'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${voiceAnnouncements ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                        </button>
                                    </label>
                                </div>
                                <button onClick={() => setShowAccessibilitySettings(false)} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mt-6">Done</button>
                            </div>
                        </div>
                    )}

                    {/* ===== QR CODE ===== */}
                    {showQRCode && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">My Care Circle QR</h2>
                                <div id="qr-code-display" className="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                <p className="text-center text-gray-600 mb-6">Caregivers scan this to join</p>
                                <button onClick={() => setShowQRCode(false)} className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Close</button>
                            </div>
                        </div>
                    )}

                    {/* ===== QR SCANNER ===== */}
                    {showQRScanner && (
                        <div className="fixed inset-0 bg-black z-50 flex flex-col">
                            <div className="p-6 flex items-center justify-between bg-black/50">
                                <h2 className="text-2xl font-serif text-white">Scan QR Code</h2>
                                <button onClick={() => { setShowQRScanner(false); window.location.reload(); }} className="text-white text-3xl">✕</button>
                            </div>
                            <div id="qr-reader" className="flex-1"></div>
                        </div>
                    )}

                    {/* ===== PROFILE EDIT ===== */}
                    {showProfileEdit && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Edit Profile</h2>
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Name</label>
                                    <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-lg font-semibold mb-2">Avatar</label>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['👴', '👵', '👨', '👩', '🧑', '👶', '🧓', '👨‍⚕️', '👩‍⚕️', '🧑‍⚕️'].map(emoji => (
                                            <button key={emoji} onClick={() => setEditAvatar(emoji)} className={`text-4xl p-3 rounded-lg ${editAvatar === emoji ? 'bg-teal-100 border-2 border-teal-600' : 'bg-gray-100'}`}>{emoji}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowProfileEdit(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={updateProfile} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== SETTINGS ===== */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Settings</h2>
                                <h3 className="text-2xl font-serif text-black mb-4">Caregiver Permissions</h3>
                                {caregivers.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No caregivers yet</p>
                                ) : (
                                    caregivers.map((cg) => {
                                        const perms = caregiverPermissions[cg.id] || {};
                                        return (
                                            <div key={cg.id} className="mb-6 p-4 bg-gray-50 rounded-lg">
                                                <h4 className="text-xl font-semibold text-black mb-4">{cg.name}</h4>
                                                <div className="space-y-3">
                                                    <label className="flex items-center justify-between">
                                                        <span>View documents</span>
                                                        <input type="checkbox" checked={perms.can_view_documents || false} onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_documents', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                    <label className="flex items-center justify-between">
                                                        <span>View medications</span>
                                                        <input type="checkbox" checked={perms.can_view_medications || false} onChange={(e) => updateCaregiverPermission(cg.id, 'can_view_medications', e.target.checked)} className="w-6 h-6" />
                                                    </label>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                <button onClick={() => setShowSettings(false)} className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6">Close</button>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD MEDICATION ===== */}
                    {showAddMedication && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Medication</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Medication Name *" id="med-name" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="Dosage" id="med-dosage" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="time" id="med-time" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Notes" id="med-notes" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowAddMedication(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={() => {
                                        addMedication(
                                            document.getElementById('med-name').value,
                                            document.getElementById('med-dosage').value,
                                            document.getElementById('med-time').value,
                                            document.getElementById('med-notes').value
                                        );
                                    }} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Add</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD APPOINTMENT ===== */}
                    {showAddAppointment && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Appointment</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Appointment Name *" id="appt-name" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="datetime-local" id="appt-time" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="Location" id="appt-location" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Notes" id="appt-notes" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowAddAppointment(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={() => {
                                        addAppointment(
                                            document.getElementById('appt-name').value,
                                            document.getElementById('appt-time').value,
                                            document.getElementById('appt-location').value,
                                            document.getElementById('appt-notes').value
                                        );
                                    }} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Add</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD ACTIVITY ===== */}
                    {showAddActivity && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Activity</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Activity Name *" id="act-name" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="time" id="act-time" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Notes" id="act-notes" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowAddActivity(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={() => {
                                        addActivity(
                                            document.getElementById('act-name').value,
                                            document.getElementById('act-time').value,
                                            document.getElementById('act-notes').value
                                        );
                                    }} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Add</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ONBOARDING ===== */}
                    {showOnboarding && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full">
                                {onboardingStep === 0 && (
                                    <div className="text-center">
                                        <h2 className="text-4xl font-serif mb-4">Welcome to Salama! 🌟</h2>
                                        <p className="text-xl mb-8">Your complete elder care companion</p>
                                        <button onClick={() => completeOnboardingStep(0)} className="bg-teal-600 text-white px-8 py-4 rounded-lg text-xl font-semibold">Get Started</button>
                                        <button onClick={skipOnboarding} className="block mx-auto mt-4 text-gray-500">Skip Tutorial</button>
                                    </div>
                                )}
                                {onboardingStep === 1 && (
                                    <div>
                                        <h2 className="text-3xl font-serif mb-4">📅 Stay Organized</h2>
                                        <p className="text-lg mb-6">Track medications, appointments, and daily activities all in one place.</p>
                                        <button onClick={() => completeOnboardingStep(1)} className="bg-teal-600 text-white px-8 py-3 rounded-lg">Next</button>
                                    </div>
                                )}
                                {onboardingStep === 2 && (
                                    <div>
                                        <h2 className="text-3xl font-serif mb-4">👨‍👩‍👧 Care Circle</h2>
                                        <p className="text-lg mb-6">Connect with family caregivers and share important information securely.</p>
                                        <button onClick={() => completeOnboardingStep(2)} className="bg-teal-600 text-white px-8 py-3 rounded-lg">Next</button>
                                    </div>
                                )}
                                {onboardingStep === 3 && (
                                    <div>
                                        <h2 className="text-3xl font-serif mb-4">🛡️ Safety First</h2>
                                        <p className="text-lg mb-6">SOS button, AI companion, and smart monitoring to keep you safe.</p>
                                        <button onClick={() => completeOnboardingStep(3)} className="bg-teal-600 text-white px-8 py-3 rounded-lg">Next</button>
                                    </div>
                                )}
                                {onboardingStep === 4 && (
                                    <div className="text-center">
                                        <h2 className="text-3xl font-serif mb-4">You're All Set! 🎉</h2>
                                        <p className="text-lg mb-6">Start exploring Salama and enjoy peace of mind.</p>
                                        <button onClick={() => completeOnboardingStep(4)} className="bg-teal-600 text-white px-8 py-4 rounded-lg text-xl font-semibold">Start Using Salama</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== PROFESSIONAL SETUP ===== */}
                    {showProfessionalSetup && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Professional Profile Setup</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Full Name *" value={professionalForm.full_name} onChange={(e) => setProfessionalForm({...professionalForm, full_name: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <select value={professionalForm.professional_type} onChange={(e) => setProfessionalForm({...professionalForm, professional_type: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg">
                                        {professionalTypes.map(pt => (<option key={pt.value} value={pt.value}>{pt.label}</option>))}
                                    </select>
                                    <input type="text" placeholder="License Number *" value={professionalForm.license_number} onChange={(e) => setProfessionalForm({...professionalForm, license_number: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="number" placeholder="Years Experience" value={professionalForm.years_experience} onChange={(e) => setProfessionalForm({...professionalForm, years_experience: parseInt(e.target.value)})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="City" value={professionalForm.city} onChange={(e) => setProfessionalForm({...professionalForm, city: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <input type="text" placeholder="State" value={professionalForm.state} onChange={(e) => setProfessionalForm({...professionalForm, state: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                    <textarea placeholder="Bio" value={professionalForm.bio} onChange={(e) => setProfessionalForm({...professionalForm, bio: e.target.value})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-32" />
                                    <input type="number" placeholder="Hourly Rate ($)" value={professionalForm.hourly_rate} onChange={(e) => setProfessionalForm({...professionalForm, hourly_rate: parseFloat(e.target.value)})} className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg" />
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <button onClick={() => setShowProfessionalSetup(false)} className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Cancel</button>
                                    <button onClick={createProfessionalProfile} className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold">Save Profile</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== MAIN PAGES ===== */}
                    <div className="p-6">
                        {currentPage === 'home' && (
                            <div>
                                {renderHeader('Home')}
                                
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-serif text-black">Today</h2>
                                        <p className="text-xl text-black">{currentTime.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
                                    </div>
                                    <p className="text-5xl font-bold text-black">{currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                                </div>

                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📊 Today's Summary</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-4 bg-teal-50 rounded-lg">
                                            <p className="text-3xl font-bold text-teal-700">{medications.filter(m => medicationsTaken[m.id]).length}/{medications.length}</p>
                                            <p className="text-sm text-gray-600">Meds Taken</p>
                                        </div>
                                        <div className="p-4 bg-blue-50 rounded-lg">
                                            <p className="text-3xl font-bold text-blue-700">{appointments.length}</p>
                                            <p className="text-sm text-gray-600">Appointments</p>
                                        </div>
                                        <div className="p-4 bg-purple-50 rounded-lg">
                                            <p className="text-3xl font-bold text-purple-700">{careTasks.filter(t => t.status === 'completed').length}/{careTasks.length}</p>
                                            <p className="text-sm text-gray-600">Tasks Done</p>
                                        </div>
                                        <div className="p-4 bg-green-50 rounded-lg">
                                            <p className="text-3xl font-bold text-green-700">{caregivers.length}</p>
                                            <p className="text-sm text-gray-600">Caregivers</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">💊 Medications Today</h3>
                                    {medications.length === 0 ? (
                                        <p className="text-gray-500">No medications scheduled</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {medications.map(med => (
                                                <div key={med.id} className={`p-4 rounded-lg flex justify-between items-center ${medicationsTaken[med.id] ? 'bg-green-50' : 'bg-gray-50'}`}>
                                                    <div>
                                                        <p className="font-semibold text-black">{med.medication_name}</p>
                                                        <p className="text-sm text-gray-600">{med.dosage} • {med.time}</p>
                                                    </div>
                                                    {medicationsTaken[med.id] ? (
                                                        <span className="text-green-600 text-2xl">✅</span>
                                                    ) : (
                                                        <button onClick={() => markMedicationTaken(med.id)} className="bg-teal-600 text-white px-4 py-2 rounded-lg">Take</button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <button onClick={() => setShowAddMedication(true)} className="w-full mt-4 bg-teal-600 text-white py-3 rounded-lg font-semibold">+ Add Medication</button>
                                </div>

                                {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && myCareRecipients.length > 0 && (
                                    <div className="bg-white rounded-3xl p-6 mb-6">
                                        <h3 className="text-xl font-semibold text-black mb-4">👥 My Care Recipients</h3>
                                        <div className="space-y-3">
                                            {myCareRecipients.map(recipient => (
                                                <button key={recipient.id} onClick={() => viewCareRecipientData(recipient)} className="w-full p-4 bg-gray-50 rounded-lg text-left hover:bg-gray-100">
                                                    <p className="font-semibold text-black">{recipient.name}</p>
                                                    <p className="text-sm text-gray-600">Tap to view their data</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === 'timeline' && (
                            <div>
                                {renderHeader('Timeline')}
                                
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📅 Today's Events</h3>
                                    {todaysEvents.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No events today</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {todaysEvents.map(event => (
                                                <div key={event.id} className={`p-4 rounded-lg ${event.completed ? 'bg-green-50' : 'bg-gray-50'}`}>
                                                    <div className="flex items-start gap-3">
                                                        <span className="text-2xl">{event.icon}</span>
                                                        <div className="flex-1">
                                                            <p className="font-semibold text-black">{event.title}</p>
                                                            <p className="text-sm text-gray-600">{event.description}</p>
                                                            {event.time && <p className="text-xs text-gray-500 mt-1">{event.time}</p>}
                                                        </div>
                                                        {event.completed && <span className="text-green-600 text-xl">✓</span>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-3xl p-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📜 All Events</h3>
                                    {timelineEvents.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No events yet</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {timelineEvents.slice(0, 20).map(event => (
                                                <div key={event.id} className="p-4 bg-gray-50 rounded-lg">
                                                    <div className="flex items-start gap-3">
                                                        <span className="text-2xl">{event.icon}</span>
                                                        <div className="flex-1">
                                                            <p className="font-semibold text-black">{event.title}</p>
                                                            <p className="text-sm text-gray-600">{event.description}</p>
                                                            <p className="text-xs text-gray-500 mt-1">{new Date(event.timestamp).toLocaleString()}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentPage === 'checkin' && (
                            <div>
                                {renderHeader('Daily Check-In')}
                                
                                <div className="bg-white rounded-3xl p-8">
                                    <h2 className="text-3xl font-serif text-center mb-8 text-black">How are you feeling today?</h2>
                                    
                                    <div className="flex justify-around mb-8">
                                        {moods.map(mood => (
                                            <button key={mood.emoji} onClick={() => setSelectedMood(mood.emoji)} className={`flex flex-col items-center p-4 rounded-lg ${selectedMood === mood.emoji ? 'bg-teal-100 border-2 border-teal-600' : 'bg-gray-50'}`}>
                                                <span className="text-5xl mb-2">{mood.emoji}</span>
                                                <span className="text-sm text-black">{mood.label}</span>
                                            </button>
                                        ))}
                                    </div>

                                    <textarea value={checkInNotes} onChange={(e) => setCheckInNotes(e.target.value)} placeholder="Any notes about your day? (optional)" className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg mb-6 h-32" />

                                    <button onClick={() => {
                                        if (!selectedMood) {
                                            alert('Please select a mood');
                                            return;
                                        }
                                        submitDailyCheckIn(selectedMood, checkInNotes);
                                        setSelectedMood(null);
                                        setCheckInNotes('');
                                        alert('Check-in submitted!');
                                    }} className="w-full bg-teal-600 text-white py-4 rounded-lg text-xl font-semibold">Submit Check-In</button>

                                    {recentMoods.length > 0 && (
                                        <div className="mt-8 pt-8 border-t border-gray-200">
                                            <h3 className="text-xl font-semibold text-black mb-4">Recent Moods</h3>
                                            <div className="flex gap-3">
                                                {recentMoods.slice(0, 7).map((mood, idx) => (
                                                    <div key={idx} className="flex-1 text-center">
                                                        <span className="text-3xl">{mood}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentPage === 'carenotes' && (
                            <div>
                                {renderHeader('Care Notes')}
                                
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📷 Memories</h3>
                                    {memories.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No memories yet</p>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4">
                                            {memories.map(mem => (
                                                <div key={mem.id} className="relative">
                                                    {mem.file_type === 'image' ? (
                                                        <img src={mem.file_url} alt={mem.title} className="w-full h-40 object-cover rounded-lg" />
                                                    ) : (
                                                        <video src={mem.file_url} className="w-full h-40 object-cover rounded-lg" controls />
                                                    )}
                                                    <button onClick={() => deleteMemory(mem.id, mem.file_url)} className="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <label className="block w-full mt-4 bg-teal-600 text-white py-3 rounded-lg text-center font-semibold cursor-pointer">
                                        + Add Memory
                                        <input type="file" accept="image/*,video/*" onChange={uploadMemory} className="hidden" />
                                    </label>
                                </div>

                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📄 Documents</h3>
                                    {documents.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No documents yet</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {documents.map(doc => (
                                                <div key={doc.id} className="p-4 bg-gray-50 rounded-lg flex justify-between items-center">
                                                    <div>
                                                        <p className="font-semibold text-black">{doc.document_name}</p>
                                                        <p className="text-xs text-gray-500">{new Date(doc.uploaded_at).toLocaleDateString()}</p>
                                                    </div>
                                                    <a href={doc.file_url} target="_blank" className="text-blue-600">View</a>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <label className="block w-full mt-4 bg-teal-600 text-white py-3 rounded-lg text-center font-semibold cursor-pointer">
                                        + Upload Document
                                        <input type="file" onChange={uploadDocument} className="hidden" />
                                    </label>
                                </div>

                                <div className="bg-white rounded-3xl p-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">🎤 Voice Recordings</h3>
                                    {thoughtRecordings.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No recordings yet</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {thoughtRecordings.map(rec => (
                                                <div key={rec.id} className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="font-semibold text-black mb-2">{rec.title}</p>
                                                    <audio src={rec.audio_url} controls className="w-full mb-2" />
                                                    <button onClick={() => deleteRecording(rec.id, rec.audio_url)} className="text-red-600 text-sm">Delete</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    {isRecording ? (
                                        <div className="mt-4">
                                            <div className="text-center mb-4">
                                                <p className="text-2xl font-bold text-red-600">{formatDuration(recordingDuration)}</p>
                                                <p className="text-sm text-gray-600">Recording...</p>
                                            </div>
                                            <button onClick={stopRecording} className="w-full bg-red-600 text-white py-3 rounded-lg font-semibold">⏹ Stop Recording</button>
                                        </div>
                                    ) : (
                                        <button onClick={startRecording} className="w-full mt-4 bg-teal-600 text-white py-3 rounded-lg font-semibold">🎤 Start Recording</button>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentPage === 'safety' && (
                            <div>
                                {renderHeader('Safety')}
                                
                                <div className="bg-white rounded-3xl p-8 mb-6 text-center">
                                    <h2 className="text-3xl font-serif text-black mb-6">Emergency SOS</h2>
                                    <button onClick={() => {
                                        if (confirm('Call emergency services?')) {
                                            alert('Emergency services would be contacted. (Demo mode)');
                                            caregivers.forEach(cg => {
                                                sendMessage();
                                            });
                                        }
                                    }} className="w-48 h-48 bg-red-600 text-white rounded-full mx-auto text-6xl font-bold shadow-2xl hover:bg-red-700 active:scale-95 transition-transform">SOS</button>
                                    <p className="text-gray-600 mt-6">Press and hold for 3 seconds to activate</p>
                                </div>

                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">🤖 AI Companion</h3>
                                    <div className="space-y-3 mb-4 max-h-64 overflow-y-auto">
                                        {protectionMessages.map((msg, idx) => (
                                            <div key={idx} className={`p-3 rounded-lg ${msg.sender === 'me' ? 'bg-teal-100 ml-8' : 'bg-gray-100 mr-8'}`}>
                                                <p className="text-black">{msg.text}</p>
                                                <p className="text-xs text-gray-500 mt-1">{msg.time}</p>
                                            </div>
                                        ))}
                                        {isAIThinking && (
                                            <div className="p-3 rounded-lg bg-gray-100 mr-8">
                                                <p className="text-gray-500">Salama is typing...</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="text" value={protectionInput} onChange={(e) => setProtectionInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && askSalama(protectionInput)} placeholder="Ask Salama anything..." className="flex-1 p-3 border-2 border-gray-300 rounded-lg" />
                                        <button onClick={() => askSalama(protectionInput)} className="bg-teal-600 text-white px-6 py-3 rounded-lg font-semibold">Send</button>
                                    </div>
                                    <div className="mt-4 flex flex-wrap gap-2">
                                        <button onClick={() => askSalama("I'm feeling lonely")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">I'm feeling lonely</button>
                                        <button onClick={() => askSalama("Tell me a joke")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">Tell me a joke</button>
                                        <button onClick={() => askSalama("Suspicious phone call")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">Got suspicious call</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">📞 Quick Text Caregivers</h3>
                                    <div className="space-y-2">
                                        <button onClick={() => sendQuickText("I need help")} className="w-full bg-red-500 text-white py-3 rounded-lg font-semibold">🚨 I need help</button>
                                        <button onClick={() => sendQuickText("Please call me")} className="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold">📞 Please call me</button>
                                        <button onClick={() => sendQuickText("I'm okay")} className="w-full bg-green-500 text-white py-3 rounded-lg font-semibold">✅ I'm okay</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'carecircle' && (
                            <div>
                                {renderHeader('Care Circle')}
                                
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">👥 My Caregivers</h3>
                                    {caregivers.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No caregivers yet. Share your QR code!</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {caregivers.map(cg => (
                                                <div key={cg.id} className="p-4 bg-gray-50 rounded-lg flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center text-2xl">{cg.avatar}</div>
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-black">{cg.name}</p>
                                                        <p className="text-sm text-gray-600">{cg.relationship || 'Family'}</p>
                                                    </div>
                                                    <button onClick={() => { setChatWith(cg); setChatMessages([]); }} className="text-blue-600">Chat</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (
                                    <div className="bg-white rounded-3xl p-6">
                                        <h3 className="text-xl font-semibold text-black mb-4">📱 Share QR Code</h3>
                                        <p className="text-gray-600 mb-4">Let caregivers scan this to join your care circle</p>
                                        <button onClick={() => {
                                            setShowQRCode(true);
                                            setTimeout(() => generateQRCode(currentUser.care_circle_id), 100);
                                        }} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold">Show My QR Code</button>
                                    </div>
                                )}

                                {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && (
                                    <div className="bg-white rounded-3xl p-6">
                                        <h3 className="text-xl font-semibold text-black mb-4">📷 Scan QR Code</h3>
                                        <p className="text-gray-600 mb-4">Scan a care recipient's QR code to join their circle</p>
                                        <button onClick={startQRScanner} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold">Open Scanner</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === 'dashboard' && isProfessional && (
                            <div>
                                {renderHeader('Dashboard')}
                                
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">Professional Dashboard</h3>
                                    {professionalProfile ? (
                                        <div>
                                            <p className="text-lg text-black">Welcome, {professionalProfile.full_name}!</p>
                                            <p className="text-gray-600">{professionalProfile.professional_type}</p>
                                            <div className="mt-4 flex gap-2">
                                                <button onClick={() => updateProfessionalAvailability('available')} className="flex-1 bg-green-500 text-white py-2 rounded-lg">Available</button>
                                                <button onClick={() => updateProfessionalAvailability('busy')} className="flex-1 bg-orange-500 text-white py-2 rounded-lg">Busy</button>
                                                <button onClick={() => updateProfessionalAvailability('offline')} className="flex-1 bg-gray-500 text-white py-2 rounded-lg">Offline</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-gray-500">Complete your profile to start receiving requests</p>
                                    )}
                                </div>

                                <div className="bg-white rounded-3xl p-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">My Assignments</h3>
                                    {myAssignments.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No active assignments</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {myAssignments.map(assignment => (
                                                <div key={assignment.id} className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="font-semibold text-black">{assignment.care_recipient.name}</p>
                                                    <p className="text-sm text-gray-600">Started: {new Date(assignment.start_date).toLocaleDateString()}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentPage === 'requests' && isProfessional && (
                            <div>
                                {renderHeader('Care Requests')}
                                
                                <div className="bg-white rounded-3xl p-6">
                                    <h3 className="text-xl font-semibold text-black mb-4">Open Requests</h3>
                                    {careRequests.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No open requests</p>
                                    ) : (
                                        <div className="space-y-4">
                                            {careRequests.map(request => (
                                                <div key={request.id} className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="font-semibold text-black mb-2">{request.professional_type}</p>
                                                    <p className="text-sm text-gray-600 mb-2">{request.care_needs_description}</p>
                                                    <p className="text-xs text-gray-500 mb-3">📍 {request.location}</p>
                                                    <button onClick={() => respondToCareRequest(request.id, 'interested', 'I am interested in this position')} className="w-full bg-teal-600 text-white py-2 rounded-lg">Express Interest</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {renderNavBar()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SalamaApp />);
    </script>
</body>
</html>
