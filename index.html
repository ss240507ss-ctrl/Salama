                    // ===== ✨ ENHANCED ERROR HANDLING =====
        const [error, setError] = useState(null);
        const [isLoading, setIsLoading] = useState(false);

        const handleError = (errorMessage, context = '') => {
            console.error(`Error in ${context}:`, errorMessage);
            setError(errorMessage);
            
            // Create error notification
            createNotification(
                currentUser?.id || 'system',
                'alert',
                'Error Occurred',
                errorMessage
            );
            
            // Auto-clear error after 5 seconds
            setTimeout(() => setError(null), 5000);
        };

        // Wrap async operations with error handling
        const safeAsync = async (fn, context = 'operation') => {
            try {
                setIsLoading(true);
                await fn();
            } catch (err) {
                handleError(err.message || 'An error occurred', context);
            } finally {
                setIsLoading(false);
            }
        };

        // ===== ERROR DISPLAY COMPONENT =====
        const ErrorDisplay = () => {
            if (!error) return null;
            
            return (
                <div className="fixed top-4 left-4 right-4 z-50 animate-slideUp">

        // ===== LOADING SPINNER COMPONENT =====

                    // ===== ✨ OFFLINE SUPPORT =====
        const [isOnline, setIsOnline] = useState(navigator.onLine);
        const [pendingActions, setPendingActions] = useState([]);

        useEffect(() => {
            const handleOnline = () => {
                setIsOnline(true);
                // Sync pending actions when back online
                syncPendingActions();
            };
            
            const handleOffline = () => {
                setIsOnline(false);
                createNotification(
                    currentUser?.id || 'system',
                    'alert',
                    'You are offline',
                    'Changes will be saved when you reconnect'
                );
            };
            
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);
            
            return () => {
                window.removeEventListener('online', handleOnline);
                window.removeEventListener('offline', handleOffline);
            };
        }, []);

        const queueOfflineAction = (action) => {
            const newAction = {
                id: Date.now(),
                ...action,
                timestamp: new Date().toISOString()
            };
            
            const updated = [...pendingActions, newAction];
            setPendingActions(updated);
            localStorage.setItem('salamaPendingActions', JSON.stringify(updated));
        };

        const syncPendingActions = async () => {
            if (pendingActions.length === 0) return;
            
            for (const action of pendingActions) {
                try {
                    // Execute the pending action
                    await action.execute();
                } catch (err) {
                    console.error('Failed to sync action:', err);
                }
            }
            
            setPendingActions([]);
            localStorage.removeItem('salamaPendingActions');
        };

                setAppointments(data.appointments || []);

        const [fontSize, setFontSize] = useState('normal'); // small, normal, large, xlarge
        const [highContrast, setHighContrast] = useState(false);
        const [voiceAnnouncements, setVoiceAnnouncements] = useState(false);

        // Apply accessibility settings
        useEffect(() => {
            const root = document.documentElement;
            
            // Font size
            switch(fontSize) {
                case 'small':
                    root.style.fontSize = '14px';
                    break;
                case 'large':
                    root.style.fontSize = '18px';
                    break;
                case 'xlarge':
                    root.style.fontSize = '22px';
                    break;
                default:
                    root.style.fontSize = '16px';
            }
            
            // High contrast
            if (highContrast) {
                root.classList.add('high-contrast');
            } else {
                root.classList.remove('high-contrast');
            }
            
            // Save preferences
            localStorage.setItem('salamaAccessibility', JSON.stringify({
                fontSize,
                highContrast,
                voiceAnnouncements
            }));
        }, [fontSize, highContrast, voiceAnnouncements]);

        // Load accessibility preferences
        useEffect(() => {
            const saved = localStorage.getItem('salamaAccessibility');
            if (saved) {
                try {
                    const prefs = JSON.parse(saved);
                    setFontSize(prefs.fontSize || 'normal');
                    setHighContrast(prefs.highContrast || false);
                    setVoiceAnnouncements(prefs.voiceAnnouncements || false);
                } catch (err) {
                    console.error('Failed to load accessibility preferences:', err);
                }
            }
        }, []);

        // Voice announcements
        const announce = (message) => {
            if (!voiceAnnouncements) return;
            
            const utterance = new SpeechSynthesisUtterance(message);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);
        };

        // Keyboard navigation
        useEffect(() => {
            const handleKeyboard = (e) => {
                // Escape key closes modals
                if (e.key === 'Escape') {
                    setShowSidebar(false);
                    setShowQRCode(false);
                    setShowQRScanner(false);
                    setShowAddMedication(false);
                    setShowAddAppointment(false);
                    setShowAddActivity(false);
                    setShowNotifications(false);
                    setShowSearch(false);
                    setShowExportOptions(false);
                }
                
                // Ctrl/Cmd + K for search
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    setShowSearch(true);
                }
                
                // Ctrl/Cmd + / for help
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    setShowOnboarding(true);
                    setOnboardingStep(0);
                }
            };
            
            window.addEventListener('keydown', handleKeyboard);
            return () => window.removeEventListener('keydown', handleKeyboard);
        }, []);

        // ===== ACCESSIBILITY SETTINGS MODAL =====
        const [showAccessibilitySettings, setShowAccessibilitySettings] = useState(false);

        const AccessibilityModal = () => {
            if (!showAccessibilitySettings) return null;
            
            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                    <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-3xl font-serif text-black">Accessibility</h2>
                            <button onClick={() => setShowAccessibilitySettings(false)} className="text-2xl">✕</button>
                        </div>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-lg font-semibold mb-3">Text Size</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {['small', 'normal', 'large', 'xlarge'].map(size => (
                                        <button
                                            key={size}
                                            onClick={() => setFontSize(size)}
                                            className={`py-2 rounded-lg font-semibold ${
                                                fontSize === size 
                                                    ? 'bg-teal-600 text-white' 
                                                    : 'bg-gray-200 text-black'
                                            }`}
                                        >
                                            {size === 'small' && 'A'}
                                            {size === 'normal' && 'A'}
                                            {size === 'large' && 'A'}
                                            {size === 'xlarge' && 'A'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div>
                                <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                    <div>
                                        <p className="font-semibold">High Contrast Mode</p>
                                        <p className="text-sm text-gray-600">Easier to read for low vision</p>
                                    </div>
                                    <button 
                                        onClick={() => setHighContrast(!highContrast)}
                                        className={`w-14 h-7 rounded-full ${highContrast ? 'bg-teal-600' : 'bg-gray-400'}`}
                                    >
                                        <div className={`w-6 h-6 bg-white rounded-full transition-transform ${highContrast ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                    </button>
                                </label>
                            </div>
                            
                            <div>
                                <label className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                    <div>
                                        <p className="font-semibold">Voice Announcements</p>
                                        <p className="text-sm text-gray-600">Speak notifications aloud</p>
                                    </div>
                                    <button 
                                        onClick={() => setVoiceAnnouncements(!voiceAnnouncements)}
                                        className={`w-14 h-7 rounded-full ${voiceAnnouncements ? 'bg-teal-600' : 'bg-gray-400'}`}
                                    >
                                        <div className={`w-6 h-6 bg-white rounded-full transition-transform ${voiceAnnouncements ? 'translate-x-7' : 'translate-x-0.5'}`} />
                                    </button>
                                </label>
                            </div>
                            
                            <div className="pt-4 border-t border-gray-200">
                                <p className="text-sm text-gray-600 mb-2">Keyboard Shortcuts:</p>
                                <ul className="text-sm text-gray-600 space-y-1">
                                    <li>• <kbd className="bg-gray-200 px-2 py-1 rounded">Esc</kbd> - Close modals</li>
                                    <li>• <kbd className="bg-gray-200 px-2 py-1 rounded">Ctrl/Cmd + K</kbd> - Search</li>
                                    <li>• <kbd className="bg-gray-200 px-2 py-1 rounded">Ctrl/Cmd + /</kbd> - Help</li>
                                </ul>
                            </div>
                        </div>
                        
                        <button 
                            onClick={() => setShowAccessibilitySettings(false)}
                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mt-6"
                        >
                            Done
                        </button>
                    </div>
                </div>
            );
        };
                    // ===== ✨ PERFORMANCE OPTIMIZATIONS =====
        
        // Memoize expensive calculations
        const memoizedTimelineEvents = React.useMemo(() => {
            return timelineEvents.slice(0, 50); // Limit to 50 for performance
        }, [timelineEvents]);

        const memoizedTodaysEvents = React.useMemo(() => {
            const today = new Date().toDateString();
            return timelineEvents.filter(event => 
                new Date(event.timestamp).toDateString() === today
            );
        }, [timelineEvents]);

        // Lazy load images
        const lazyLoadImage = (src) => {
            const img = new Image();
            img.src = src;
            return src;
        };

        // Debounce search
        const [debouncedSearch, setDebouncedSearch] = useState('');
        useEffect(() => {
            const timer = setTimeout(() => {
                setDebouncedSearch(searchQuery);
            }, 300);
            return () => clearTimeout(timer);
        }, [searchQuery]);

        // Virtual scrolling for large lists (simplified)
        const ITEMS_PER_PAGE = 20;
        const [currentPage, setCurrentPage] = useState(1);
        
        const paginateList = (list) => {
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            return list.slice(start, end);
        };

        // ===== RENDER ALL MODALS & OVERLAYS =====
        // This ensures all components are included in the final render
        return (
            <div>
                {/* Main App Content (from Part 14) */}
                {/* ... all previous content ... */}
                
                {/* Additional Components */}
                <ErrorDisplay />
                <LoadingSpinner />
                <OfflineIndicator />
                <SearchModal />
                <ExportModal />
                <AccessibilityModal />
            </div>
        );
    </script>
</body>
</html>
