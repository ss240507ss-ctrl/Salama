<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salama - Care Coordination</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        * { box-sizing: border-box; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .timeline-item { animation: slideUp 0.3s ease-out; }
        @keyframes pulse-alert {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .alert-pulse { animation: pulse-alert 2s infinite; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 9999px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Supabase Configuration
        const supabaseUrl = 'https://gqgsmhqpixvqxkynpotc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ3NtaHFwaXh2cXhreW5wb3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE2ODQ4OTcsImV4cCI6MjA0NzI2MDg5N30.kejYs_suxaEic84CboNue_aIzTxaT5cNn-z1zN38nI';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Lucide React Icons (inline SVG components)
        const User = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const Home = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const Heart = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const FileText = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const Shield = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const Users = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const Settings = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-9-9h6m6 0h6"/></svg>;
        const MessageSquare = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const Mic = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>;
        const Keyboard = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>;
        const Clock = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const Bell = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
        const AlertCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const CheckCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const TrendingUp = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Calendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

        const SalamaApp = () => {
            // ===== CORE STATE =====
            const [currentUser, setCurrentUser] = useState(null);
            const [showAuth, setShowAuth] = useState(true);
            const [isLogin, setIsLogin] = useState(true);
            const [authUsername, setAuthUsername] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authRole, setAuthRole] = useState('care_recipient');
            const [showPassword, setShowPassword] = useState(false);
            const [currentPage, setCurrentPage] = useState('home');
            
            // ===== DATA STATE =====
            const [medications, setMedications] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [activities, setActivities] = useState([]);
            const [documents, setDocuments] = useState([]);
            const [caregivers, setCaregivers] = useState([]);
            const [memories, setMemories] = useState([]);
            const [thoughtRecordings, setThoughtRecordings] = useState([]);
            const [documentShareLinks, setDocumentShareLinks] = useState([]);
            const [myCareRecipients, setMyCareRecipients] = useState([]);
            const [viewingCareRecipient, setViewingCareRecipient] = useState(null);
            
            // ===== UI STATE =====
            const [showSidebar, setShowSidebar] = useState(false);
            const [showQRCode, setShowQRCode] = useState(false);
            const [showQRScanner, setShowQRScanner] = useState(false);
            const [showAddMedication, setShowAddMedication] = useState(false);
            const [showAddAppointment, setShowAddAppointment] = useState(false);
            const [showAddActivity, setShowAddActivity] = useState(false);
            const [showAddMemory, setShowAddMemory] = useState(false);
            const [showDocumentUpload, setShowDocumentUpload] = useState(false);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedMood, setSelectedMood] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showProfileEdit, setShowProfileEdit] = useState(false);
            const [editName, setEditName] = useState('');
            const [editAvatar, setEditAvatar] = useState('');
            const [uploadingFile, setUploadingFile] = useState(false);
            const [showThoughtRecordings, setShowThoughtRecordings] = useState(false);
            const [showDocumentQRManager, setShowDocumentQRManager] = useState(false);
            const [showCreateShareLink, setShowCreateShareLink] = useState(false);
            const [shareLinkName, setShareLinkName] = useState('');
            const [shareAllDocs, setShareAllDocs] = useState(true);
            const [showSharedDocuments, setShowSharedDocuments] = useState(false);
            const [sharedDocumentsData, setSharedDocumentsData] = useState(null);
            
            // ===== MESSAGING STATE =====
            const [chatWith, setChatWith] = useState(null);
            const [messageInput, setMessageInput] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [showProtectionChat, setShowProtectionChat] = useState(false);
            const [protectionInput, setProtectionInput] = useState('');
            const [protectionMessages, setProtectionMessages] = useState([]);
            const [isAIThinking, setIsAIThinking] = useState(false);
            
            // ===== SAFETY STATE =====
            const [okPressed, setOkPressed] = useState(false);
            const [sosPressed, setSosPressed] = useState(false);
            const [backgroundMonitoring, setBackgroundMonitoring] = useState(false);
            const [monitoringAlerts, setMonitoringAlerts] = useState([]);
            
            // ===== RECORDING STATE =====
            const [isRecording, setIsRecording] = useState(false);
            const [recordingDuration, setRecordingDuration] = useState(0);
            const [mediaRecorder, setMediaRecorder] = useState(null);
            const [audioChunks, setAudioChunks] = useState([]);
            
            // ===== PERMISSIONS STATE =====
            const [caregiverPermissions, setCaregiverPermissions] = useState({});
            const [showCommunities, setShowCommunities] = useState(false);
            
            // ===== PROFESSIONAL STATE =====
            const [isProfessional, setIsProfessional] = useState(false);
            const [professionalProfile, setProfessionalProfile] = useState(null);
            const [showProfessionalSetup, setShowProfessionalSetup] = useState(false);
            const [professionalForm, setProfessionalForm] = useState({
                full_name: '',
                professional_type: 'nurse',
                license_number: '',
                years_experience: 0,
                city: '',
                state: '',
                bio: '',
                hourly_rate: 0
            });
            const [careRequests, setCareRequests] = useState([]);
            const [showCareRequestModal, setShowCareRequestModal] = useState(false);
            const [newCareRequest, setNewCareRequest] = useState({
                professional_type: 'nurse',
                location: '',
                urgency_level: 'medium',
                care_needs_description: '',
                preferred_languages: [],
                start_date: '',
                duration_weeks: 4
            });
            const [myAssignments, setMyAssignments] = useState([]);
            const [dailyCareLogs, setDailyCareLogs] = useState([]);
            const [showDailyCareLogModal, setShowDailyCareLogModal] = useState(false);
            const [selectedAssignment, setSelectedAssignment] = useState(null);
            
            // ===== CARE TIPS & TASKS STATE =====
            const [careTips, setCareTips] = useState([]);
            const [todaysTip, setTodaysTip] = useState(null);
            const [careTasks, setCareTasks] = useState([]);
            const [showTaskModal, setShowTaskModal] = useState(false);
            const [newTask, setNewTask] = useState({
                task_name: '',
                description: '',
                due_date: '',
                priority: 'medium',
                assigned_to: null
            });

            // ===== ✨ NEW: TIMELINE & IMPROVEMENTS STATE =====
            const [timelineEvents, setTimelineEvents] = useState([]);
            const [showFullTimeline, setShowFullTimeline] = useState(false);
            const [medicationsTaken, setMedicationsTaken] = useState({});
            const [showOnboarding, setShowOnboarding] = useState(false);
            const [onboardingStep, setOnboardingStep] = useState(0);
            const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            const [keyMetrics, setKeyMetrics] = useState({
                tasksCompleted: 0,
                checkInsThisWeek: 0,
                missedMedications: 0,
                completionRate: 0
            });
            const [recentMoods, setRecentMoods] = useState([]);
            const [todaysEvents, setTodaysEvents] = useState([]);

            // ===== CONSTANTS =====
            const moods = [
                { emoji: '😡', color: 'bg-red-500', label: 'Very Bad' },
                { emoji: '😟', color: 'bg-orange-400', label: 'Bad' },
                { emoji: '😐', color: 'bg-yellow-400', label: 'Okay' },
                { emoji: '🙂', color: 'bg-green-400', label: 'Good' },
                { emoji: '😊', color: 'bg-green-500', label: 'Great' }
            ];

            const quickTexts = [
                "I fell",
                "I have been mistreated",
                "I feel sick",
                "I need to go to the hospital",
                "Custom message..."
            ];

            const communities = [
                { id: 1, name: 'Internal Community\n(Caregivers only)' },
                { id: 2, name: 'External Support Groups' }
            ];

            const professionalTypes = [
                { value: 'nurse', label: 'Registered Nurse' },
                { value: 'doctor', label: 'Medical Doctor' },
                { value: 'therapist', label: 'Physical Therapist' },
                { value: 'social_worker', label: 'Social Worker' },
                { value: 'aide', label: 'Home Health Aide' },
                { value: 'other', label: 'Other Professional' }
            ];
            // ===== USE EFFECTS =====
            useEffect(() => {
                const user = localStorage.getItem('salamaUser');
                if (user) {
                    const userData = JSON.parse(user);
                    setCurrentUser(userData);
                    setShowAuth(false);
                    checkUser(userData);
                    loadUserData(userData.id);
                    loadCaregivers(userData.care_circle_id);
                    loadCareTips();
                    loadCareTasks(userData.id);
                    loadNotifications(userData.id);
                    loadTimelineEvents(userData.id);
                    calculateKeyMetrics(userData.id);
                    loadRecentMoods(userData.id);
                    
                    // Check if first time user (show onboarding)
                    const hasSeenOnboarding = localStorage.getItem('salamaOnboardingComplete');
                    if (!hasSeenOnboarding && userData.role === 'care_recipient') {
                        setShowOnboarding(true);
                    }
                }
                
                const interval = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (isRecording) {
                    const interval = setInterval(() => {
                        setRecordingDuration(prev => prev + 1);
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [isRecording]);

            // ===== ✨ NEW: CHECK FOR ALERTS =====
            useEffect(() => {
                if (currentUser) {
                    const alertInterval = setInterval(() => {
                        checkForAlerts(currentUser.id);
                    }, 60000); // Check every minute
                    return () => clearInterval(alertInterval);
                }
            }, [currentUser, medications, careTasks, recentMoods]);

            // ===== CORE FUNCTIONS =====
            const checkUser = async (user) => {
                if (user.role === 'professional' || user.role_type === 'professional') {
                    setIsProfessional(true);
                    await loadProfessionalProfile(user.id);
                    await loadCareRequests();
                    await loadMyAssignments(user.id);
                }
                
                if (user.role === 'caregiver' || user.role_type === 'family_caregiver') {
                    await loadMyCareRecipients(user.id);
                }
            };

            const loadProfessionalProfile = async (userId) => {
                const { data, error } = await supabase
                    .from('professionals')
                    .select('*')
                    .eq('user_id', userId)
                    .single();
                
                if (data) setProfessionalProfile(data);
            };

            const loadCareTips = async () => {
                const { data } = await supabase
                    .from('care_tips')
                    .select('*')
                    .eq('is_active', true);
                
                if (data && data.length > 0) {
                    setCareTips(data);
                    const randomTip = data[Math.floor(Math.random() * data.length)];
                    setTodaysTip(randomTip);
                }
            };

            const loadCareTasks = async (userId) => {
                const { data } = await supabase
                    .from('care_tasks')
                    .select('*')
                    .or(`care_recipient_id.eq.${userId},assigned_to.eq.${userId}`)
                    .order('created_at', { ascending: false });
                
                if (data) setCareTasks(data);
            };

            const loadCareRequests = async () => {
                const { data } = await supabase
                    .from('care_requests')
                    .select('*')
                    .eq('status', 'open')
                    .order('created_at', { ascending: false });
                
                if (data) setCareRequests(data);
            };

            const loadMyAssignments = async (userId) => {
                const { data: professional } = await supabase
                    .from('professionals')
                    .select('id')
                    .eq('user_id', userId)
                    .single();
                
                if (professional) {
                    const { data } = await supabase
                        .from('care_assignments')
                        .select(`
                            *,
                            care_recipient:users!care_assignments_care_recipient_id_fkey(id, name, avatar)
                        `)
                        .eq('professional_id', professional.id)
                        .eq('status', 'active');
                    
                    if (data) setMyAssignments(data);
                }
            };

            const loadUserData = async (userId) => {
                const { data: meds } = await supabase
                    .from('medications')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                const { data: appts } = await supabase
                    .from('appointments')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                const { data: acts } = await supabase
                    .from('activities')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                const { data: docs } = await supabase
                    .from('documents')
                    .select('*')
                    .eq('user_id', userId)
                    .order('uploaded_at', { ascending: false });
                
                const { data: mems } = await supabase
                    .from('memories')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                const { data: recs } = await supabase
                    .from('thought_recordings')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                const { data: links } = await supabase
                    .from('document_share_links')
                    .select('*')
                    .eq('care_recipient_id', userId)
                    .eq('is_active', true);
                
                if (meds) setMedications(meds);
                if (appts) setAppointments(appts);
                if (acts) setActivities(acts);
                if (docs) setDocuments(docs);
                if (mems) setMemories(mems);
                if (recs) setThoughtRecordings(recs);
                if (links) setDocumentShareLinks(links);
            };

            const loadCaregivers = async (careCircleId) => {
                const { data } = await supabase
                    .from('caregivers')
                    .select(`
                        *,
                        caregiver:users!caregivers_caregiver_user_id_fkey(id, name, avatar)
                    `)
                    .eq('care_circle_id', careCircleId);
                
                if (data) {
                    const caregiversList = data.map(cg => ({
                        id: cg.caregiver.id,
                        name: cg.caregiver.name,
                        avatar: cg.caregiver.avatar,
                        type: 'caregiver'
                    }));
                    setCaregivers(caregiversList);
                    await loadCaregiverPermissions(currentUser.id);
                }
            };

            const loadCaregiverPermissions = async (userId) => {
                const { data } = await supabase
                    .from('caregiver_permissions')
                    .select('*')
                    .eq('care_recipient_id', userId);
                
                if (data) {
                    const permsMap = {};
                    data.forEach(perm => {
                        permsMap[perm.caregiver_id] = perm;
                    });
                    setCaregiverPermissions(permsMap);
                }
            };

            const loadMyCareRecipients = async (userId) => {
                const { data } = await supabase
                    .from('caregivers')
                    .select(`
                        care_circle_id,
                        users!inner(id, name, avatar, care_circle_id)
                    `)
                    .eq('caregiver_user_id', userId);
                
                if (data) {
                    const recipients = data.map(item => item.users).filter(Boolean);
                    setMyCareRecipients(recipients);
                }
            };

            const viewCareRecipientData = async (recipient) => {
                setViewingCareRecipient(recipient);
                await loadUserData(recipient.id);
                await loadCareTasks(recipient.id);
                await loadTimelineEvents(recipient.id);
            };

            const updateCaregiverPermission = async (caregiverId, permission, value) => {
                const userId = viewingCareRecipient ? viewingCareRecipient.id : currentUser.id;
                
                const { data: existing } = await supabase
                    .from('caregiver_permissions')
                    .select('*')
                    .eq('care_recipient_id', userId)
                    .eq('caregiver_id', caregiverId)
                    .single();
                
                if (existing) {
                    await supabase
                        .from('caregiver_permissions')
                        .update({ [permission]: value })
                        .eq('id', existing.id);
                } else {
                    await supabase
                        .from('caregiver_permissions')
                        .insert({
                            care_recipient_id: userId,
                            caregiver_id: caregiverId,
                            [permission]: value
                        });
                }
                
                await loadCaregiverPermissions(userId);
            };

            // ===== ✨ NEW: TIMELINE FUNCTIONS =====
            const loadTimelineEvents = async (userId) => {
                const events = [];
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // Medications for today
                const todayMeds = medications.filter(med => {
                    if (!med.time) return false;
                    const isTaken = medicationsTaken[med.id];
                    return true;
                });

                todayMeds.forEach(med => {
                    const isTaken = medicationsTaken[med.id];
                    events.push({
                        id: `med-${med.id}`,
                        type: isTaken ? 'medication_taken' : 'medication_pending',
                        title: med.medication_name,
                        description: `Scheduled for ${med.time}`,
                        time: med.time,
                        icon: '💊',
                        priority: isTaken ? 'normal' : 'high',
                        completed: isTaken
                    });
                });

                // Appointments for today
                const todayAppts = appointments.filter(appt => {
                    if (!appt.appointment_time) return false;
                    const apptDate = new Date(appt.appointment_time);
                    return apptDate >= today && apptDate < new Date(today.getTime() + 24*60*60*1000);
                });

                todayAppts.forEach(appt => {
                    events.push({
                        id: `appt-${appt.id}`,
                        type: 'appointment',
                        title: appt.appointment_name,
                        description: appt.location,
                        time: new Date(appt.appointment_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        icon: '📅',
