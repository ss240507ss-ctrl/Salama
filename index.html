                                            <p className="text-gray-500 mb-4">Complete your professional profile to start receiving care requests</p>
                                            <button onClick={() => setShowProfessionalSetup(true)} className="bg-teal-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-teal-700">
                                                Complete Profile
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Active Assignments */}
                                <div className="bg-white rounded-3xl p-6 mb-6 shadow-lg">
                                    <h3 className="text-xl font-semibold text-black mb-4">📋 Active Assignments ({myAssignments.length})</h3>
                                    {myAssignments.length === 0 ? (
                                        <p className="text-gray-500 text-center py-8">No active assignments</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {myAssignments.map(assignment => (
                                                <div key={assignment.id} className="p-4 bg-gradient-to-r from-teal-50 to-blue-50 rounded-lg">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <p className="font-semibold text-black text-lg">{assignment.care_recipient.name}</p>
                                                        <span className="text-xs bg-green-500 text-white px-2 py-1 rounded">Active</span>
                                                    </div>
                                                    <p className="text-sm text-gray-600 mb-3">Started: {new Date(assignment.start_date).toLocaleDateString()}</p>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {
                                                            setSelectedAssignment(assignment);
                                                            setShowDailyCareLogModal(true);
                                                        }} className="flex-1 bg-teal-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">
                                                            Log Care
                                                        </button>
                                                        <button onClick={() => viewCareRecipientData(assignment.care_recipient)} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">
                                                            View Details
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Statistics */}
                                <div className="bg-white rounded-3xl p-6 shadow-lg">
                                    <h3 className="text-xl font-semibold text-black mb-4">📊 This Week</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-4 bg-purple-50 rounded-lg">
                                            <p className="text-3xl font-bold text-purple-700">{careRequests.length}</p>
                                            <p className="text-sm text-gray-600">Open Requests</p>
                                        </div>
                                        <div className="p-4 bg-orange-50 rounded-lg">
                                            <p className="text-3xl font-bold text-orange-700">{myAssignments.length}</p>
                                            <p className="text-sm text-gray-600">Active Cases</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===== CARE REQUESTS PAGE ===== */}
                        {currentPage === 'requests' && isProfessional && (
                            <div>
                                {renderHeader('Care Requests')}
                                
                                <div className="bg-white rounded-3xl p-6 shadow-lg">
                                    <h3 className="text-xl font-semibold text-black mb-4">📢 Open Requests ({careRequests.length})</h3>
                                    {careRequests.length === 0 ? (
                                        <div className="text-center py-12">
                                            <FileText className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                            <p className="text-gray-500">No open care requests at this time</p>
                                            <p className="text-sm text-gray-400 mt-2">Check back later for new opportunities</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {careRequests.map(request => (
                                                <div key={request.id} className="p-5 bg-gradient-to-br from-blue-50 to-purple-50 rounded-lg border-2 border-blue-100">
                                                    <div className="flex items-start justify-between mb-3">
                                                        <div>
                                                            <p className="font-bold text-black text-lg capitalize">{request.professional_type.replace('_', ' ')}</p>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className={`text-xs px-2 py-1 rounded ${
                                                                    request.urgency_level === 'urgent' ? 'bg-red-500 text-white' :
                                                                    request.urgency_level === 'high' ? 'bg-orange-500 text-white' :
                                                                    'bg-blue-500 text-white'
                                                                }`}>
                                                                    {request.urgency_level}
                                                                </span>
                                                                <span className="text-xs text-gray-500">
                                                                    Posted {new Date(request.created_at).toLocaleDateString()}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="mb-4">
                                                        <p className="text-sm text-gray-700 mb-2">{request.care_needs_description}</p>
                                                        {request.location && <p className="text-sm text-gray-600">📍 {request.location}</p>}
                                                        {request.start_date && <p className="text-sm text-gray-600">📅 Start: {new Date(request.start_date).toLocaleDateString()}</p>}
                                                        {request.duration_weeks && <p className="text-sm text-gray-600">⏱️ Duration: {request.duration_weeks} weeks</p>}
                                                    </div>
                                                    
                                                    <button onClick={() => respondToCareRequest(request.id, 'interested', 'I am interested in this care opportunity and would like to discuss further.')} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold hover:bg-teal-700">
                                                        Express Interest
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ===== ASSIGNMENTS PAGE ===== */}
                        {currentPage === 'assignments' && isProfessional && (
                            <div>
                                {renderHeader('My Cases')}
                                
                                <div className="bg-white rounded-3xl p-6 shadow-lg">
                                    <h3 className="text-xl font-semibold text-black mb-4">👨‍⚕️ Active Cases ({myAssignments.length})</h3>
                                    {myAssignments.length === 0 ? (
                                        <div className="text-center py-12">
                                            <Users className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                            <p className="text-gray-500">No active cases</p>
                                            <p className="text-sm text-gray-400 mt-2">Respond to care requests to get started</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {myAssignments.map(assignment => (
                                                <div key={assignment.id} className="p-5 bg-gradient-to-br from-teal-50 to-green-50 rounded-lg border-2 border-teal-100">
                                                    <div className="flex items-center gap-4 mb-4">
                                                        <div className="w-16 h-16 bg-teal-400 rounded-full flex items-center justify-center text-3xl">
                                                            {assignment.care_recipient.avatar}
                                                        </div>
                                                        <div className="flex-1">
                                                            <p className="font-bold text-black text-xl">{assignment.care_recipient.name}</p>
                                                            <p className="text-sm text-gray-600">Started: {new Date(assignment.start_date).toLocaleDateString()}</p>
                                                            {assignment.end_date && <p className="text-sm text-gray-600">Ends: {new Date(assignment.end_date).toLocaleDateString()}</p>}
                                                        </div>
                                                        <span className="text-xs bg-green-500 text-white px-3 py-1 rounded-full font-semibold">
                                                            Active
                                                        </span>
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <button onClick={() => {
                                                            setSelectedAssignment(assignment);
                                                            setShowDailyCareLogModal(true);
                                                        }} className="bg-teal-600 text-white py-3 rounded-lg font-semibold hover:bg-teal-700">
                                                            📝 Log Care
                                                        </button>
                                                        <button onClick={() => viewCareRecipientData(assignment.care_recipient)} className="bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
                                                            👁️ View Details
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ===== PROFESSIONAL PROFILE PAGE ===== */}
                        {currentPage === 'profile' && isProfessional && (
                            <div>
                                {renderHeader('My Profile')}
                                
                                <div className="bg-white rounded-3xl p-6 shadow-lg">
                                    {professionalProfile ? (
                                        <div>
                                            <div className="text-center mb-6">
                                                <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">
                                                    {currentUser.avatar}
                                                </div>
                                                <h2 className="text-2xl font-bold text-black">{professionalProfile.full_name}</h2>
                                                <p className="text-gray-600 capitalize">{professionalProfile.professional_type.replace('_', ' ')}</p>
                                                {professionalProfile.is_verified && (
                                                    <span className="inline-block bg-green-500 text-white px-3 py-1 rounded-full text-sm mt-2">
                                                        ✓ Verified Professional
                                                    </span>
                                                )}
                                            </div>
                                            
                                            <div className="space-y-4 mb-6">
                                                <div className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="text-sm text-gray-600 mb-1">License Number</p>
                                                    <p className="font-semibold text-black">{professionalProfile.license_number}</p>
                                                </div>
                                                
                                                <div className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="text-sm text-gray-600 mb-1">Experience</p>
                                                    <p className="font-semibold text-black">{professionalProfile.years_experience} years</p>
                                                </div>
                                                
                                                <div className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="text-sm text-gray-600 mb-1">Location</p>
                                                    <p className="font-semibold text-black">{professionalProfile.city}, {professionalProfile.state}</p>
                                                </div>
                                                
                                                <div className="p-4 bg-gray-50 rounded-lg">
                                                    <p className="text-sm text-gray-600 mb-1">Hourly Rate</p>
                                                    <p className="font-semibold text-black">${professionalProfile.hourly_rate}/hour</p>
                                                </div>
                                                
                                                {professionalProfile.bio && (
                                                    <div className="p-4 bg-gray-50 rounded-lg">
                                                        <p className="text-sm text-gray-600 mb-1">About Me</p>
                                                        <p className="text-black">{professionalProfile.bio}</p>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <button onClick={() => setShowProfessionalSetup(true)} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold hover:bg-teal-700 flex items-center justify-center gap-2">
                                                <Edit className="w-5 h-5" /> Edit Profile
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="text-center py-12">
                                            <User className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                            <p className="text-gray-500 mb-4">No profile yet</p>
                                            <button onClick={() => setShowProfessionalSetup(true)} className="bg-teal-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-teal-700">
                                                Create Profile
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {renderNavBar()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SalamaApp />);
    </script>
</body>
</html>
