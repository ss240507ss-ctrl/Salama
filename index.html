                                                        )}
                                                    </div>
                                                    
                                                    {!notif.isRead && (
                                                        <div className="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {notifications.length > 0 && (
                                    <button 
                                        onClick={() => setNotifications([])}
                                        className="w-full mt-4 text-sm text-gray-500 hover:text-gray-700"
                                    >
                                        Clear All
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== ONBOARDING FLOW ===== */}
                    {showOnboarding && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full">
                                <div className="mb-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-3xl font-serif text-black">Welcome to Salama! 👋</h2>
                                        <button onClick={skipOnboarding} className="text-gray-400 text-sm">Skip</button>
                                    </div>
                                    <div className="flex gap-2">
                                        {[0,1,2,3,4].map(step => (
                                            <div 
                                                key={step}
                                                className={`flex-1 h-2 rounded-full ${step <= onboardingStep ? 'bg-teal-600' : 'bg-gray-200'}`}
                                            />
                                        ))}
                                    </div>
                                </div>
                                
                                {onboardingStep === 0 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">🏠</div>
                                        <h3 className="text-2xl font-semibold mb-4">Let's get you set up</h3>
                                        <p className="text-gray-600 mb-6">Salama helps you manage your care, stay connected with loved ones, and maintain your independence.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(0)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Get Started
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 1 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">💊</div>
                                        <h3 className="text-2xl font-semibold mb-4">Track Your Medications</h3>
                                        <p className="text-gray-600 mb-6">Add your medications with times, and we'll help you remember to take them.</p>
                                        <button 
                                            onClick={() => {
                                                completeOnboardingStep(1);
                                                setShowAddMedication(true);
                                                setShowOnboarding(false);
                                            }}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mb-2"
                                        >
                                            Add First Medication
                                        </button>
                                        <button 
                                            onClick={() => completeOnboardingStep(1)}
                                            className="w-full text-gray-500"
                                        >
                                            Skip for now
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 2 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">👥</div>
                                        <h3 className="text-2xl font-semibold mb-4">Build Your Care Circle</h3>
                                        <p className="text-gray-600 mb-6">Share your QR code with family members so they can help care for you.</p>
                                        <button 
                                            onClick={() => {
                                                completeOnboardingStep(2);
                                                setShowQRCode(true);
                                                setShowOnboarding(false);
                                                setTimeout(() => generateQRCode(currentUser.care_circle_id), 300);
                                            }}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold mb-2"
                                        >
                                            Show My QR Code
                                        </button>
                                        <button 
                                            onClick={() => completeOnboardingStep(2)}
                                            className="w-full text-gray-500"
                                        >
                                            Skip for now
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 3 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">😊</div>
                                        <h3 className="text-2xl font-semibold mb-4">Daily Check-Ins</h3>
                                        <p className="text-gray-600 mb-6">Tell us how you're feeling each day. We'll track trends and alert your caregivers if needed.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(3)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Got it!
                                        </button>
                                    </div>
                                )}
                                
                                {onboardingStep === 4 && (
                                    <div className="text-center">
                                        <div className="text-6xl mb-4">🎉</div>
                                        <h3 className="text-2xl font-semibold mb-4">You're All Set!</h3>
                                        <p className="text-gray-600 mb-6">You can always access settings, add caregivers, or request professional care from your dashboard.</p>
                                        <button 
                                            onClick={() => completeOnboardingStep(4)}
                                            className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold"
                                        >
                                            Start Using Salama
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== SIDEBAR ===== */}
                    {showSidebar && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex">
                            <div className="bg-white w-80 h-full p-6 overflow-y-auto">
                                <button onClick={() => setShowSidebar(false)} className="text-2xl mb-6">✕</button>
                                
                                <div className="text-center mb-8">
                                    <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">
                                        {currentUser.avatar}
                                    </div>
                                    <h2 className="text-2xl font-serif text-black">{currentUser.name}</h2>
                                    <p className="text-gray-600 capitalize">{currentUser.role_type || currentUser.role}</p>
                                    
                                    {isProfessional && professionalProfile?.is_verified && (
                                        <span className="inline-block bg-green-500 text-white px-3 py-1 rounded-full text-sm mt-2">
                                            ✓ Verified Professional
                                        </span>
                                    )}
                                    
                                    {viewingCareRecipient && (
                                        <div className="mt-4 p-3 bg-blue-50 rounded-lg">
                                            <p className="text-sm text-gray-600">Currently viewing:</p>
                                            <p className="font-semibold text-black">{viewingCareRecipient.name}</p>
                                            <button 
                                                onClick={() => {
                                                    setViewingCareRecipient(null);
                                                    loadUserData(currentUser.id);
                                                    loadCareTasks(currentUser.id);
                                                    setShowSidebar(false);
                                                }}
                                                className="text-sm text-blue-600 mt-2"
                                            >
                                                Back to my view
                                            </button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-3">
                                    <button 
                                        onClick={() => {
                                            setShowProfileEdit(true);
                                            setEditName(currentUser.name);
                                            setEditAvatar(currentUser.avatar);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        👤 Edit Profile
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            setShowSettings(true);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        ⚙️ Settings
                                    </button>
                                    
                                    {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (
                                        <button 
                                            onClick={() => {
                                                setShowDocumentQRManager(true);
                                                setShowSidebar(false);
                                            }}
                                            className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                        >
                                            🔗 Share Links
                                        </button>
                                    )}
                                    
                                    {isProfessional && (
                                        <button 
                                            onClick={() => {
                                                setShowProfessionalSetup(true);
                                                setShowSidebar(false);
                                            }}
                                            className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                        >
                                            👨‍⚕️ Professional Settings
                                        </button>
                                    )}
                                    
                                    <button 
                                        onClick={() => {
                                            setShowSearch(true);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        🔍 Search
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            setShowExportOptions(true);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        📦 Export Data
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            setShowAccessibilitySettings(true);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        ♿ Accessibility
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            setShowOnboarding(true);
                                            setOnboardingStep(0);
                                            setShowSidebar(false);
                                        }}
                                        className="w-full text-left p-4 bg-gray-100 rounded-lg hover:bg-gray-200"
                                    >
                                        📚 Show Tutorial Again
                                    </button>
                                    
                                    <button 
                                        onClick={logout}
                                        className="w-full text-left p-4 bg-red-100 text-red-600 rounded-lg hover:bg-red-200"
                                    >
                                        🚪 Logout
                                    </button>
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => setShowSidebar(false)}></div>
                        </div>
                    )}

                    {/* ===== QR CODE MODAL ===== */}
                    {showQRCode && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">My Care Circle QR Code</h2>
                                <div id="qr-code-display" className="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                <p className="text-center text-gray-600 mb-6">Caregivers can scan this to join your care circle</p>
                                <button 
                                    onClick={() => setShowQRCode(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== QR SCANNER MODAL ===== */}
                    {showQRScanner && (
                        <div className="fixed inset-0 bg-black z-50 flex flex-col">
                            <div className="p-6 flex items-center justify-between bg-black/50">
                                <h2 className="text-2xl font-serif text-white">Scan QR Code</h2>
                                <button onClick={() => {
                                    setShowQRScanner(false);
                                    window.location.reload();
                                }} className="text-white text-3xl">✕</button>
                            </div>
                            <div id="qr-reader" className="flex-1"></div>
                        </div>
                    )}

                    {/* ===== PROFILE EDIT MODAL ===== */}
                    {showProfileEdit && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Edit Profile</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Name</label>
                                    <input
                                        type="text"
                                        value={editName}
                                        onChange={(e) => setEditName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                </div>
                                
                                <div className="mb-6">
                                    <label className="block text-lg font-semibold mb-2">Avatar</label>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['👴', '👵', '👨', '👩', '🧑', '👶', '🧓', '👨‍⚕️', '👩‍⚕️', '🧑‍⚕️'].map(emoji => (
                                            <button
                                                key={emoji}
                                                onClick={() => setEditAvatar(emoji)}
                                                className={`text-4xl p-3 rounded-lg ${editAvatar === emoji ? 'bg-teal-100 border-2 border-teal-600' : 'bg-gray-100'}`}
                                            >
                                                {emoji}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => setShowProfileEdit(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={updateProfile}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Save
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* ===== PROFESSIONAL SETUP MODAL ===== */}
                    {showProfessionalSetup && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Professional Profile Setup</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Full Name</label>
                                        <input
                                            type="text"
                                            value={professionalForm.full_name}
                                            onChange={(e) => setProfessionalForm({...professionalForm, full_name: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Professional Type</label>
                                        <select
                                            value={professionalForm.professional_type}
                                            onChange={(e) => setProfessionalForm({...professionalForm, professional_type: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        >
                                            {professionalTypes.map(type => (
                                                <option key={type.value} value={type.value}>{type.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">License Number</label>
                                        <input
                                            type="text"
                                            value={professionalForm.license_number}
                                            onChange={(e) => setProfessionalForm({...professionalForm, license_number: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Years of Experience</label>
                                        <input
                                            type="number"
                                            value={professionalForm.years_experience}
                                            onChange={(e) => setProfessionalForm({...professionalForm, years_experience: parseInt(e.target.value)})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-lg font-semibold mb-2">City</label>
                                            <input
                                                type="text"
                                                value={professionalForm.city}
                                                onChange={(e) => setProfessionalForm({...professionalForm, city: e.target.value})}
                                                className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-lg font-semibold mb-2">State</label>
                                            <input
                                                type="text"
                                                value={professionalForm.state}
                                                onChange={(e) => setProfessionalForm({...professionalForm, state: e.target.value})}
                                                className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                            />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Bio</label>
                                        <textarea
                                            value={professionalForm.bio}
                                            onChange={(e) => setProfessionalForm({...professionalForm, bio: e.target.value})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-32"
                                            placeholder="Tell us about your experience and specialties..."
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-lg font-semibold mb-2">Hourly Rate ($)</label>
                                        <input
                                            type="number"
                                            value={professionalForm.hourly_rate}
                                            onChange={(e) => setProfessionalForm({...professionalForm, hourly_rate: parseFloat(e.target.value)})}
                                            className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                        />
                                    </div>
                                </div>
                                
                                <div className="flex gap-4 mt-6">
                                    <button 
                                        onClick={() => setShowProfessionalSetup(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={createProfessionalProfile}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        {professionalProfile ? 'Update Profile' : 'Create Profile'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== SETTINGS MODAL ===== */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Settings</h2>
                                
                                <h3 className="text-2xl font-serif text-black mb-4">Caregiver Permissions</h3>
                                
                                {caregivers.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No caregivers yet. Add caregivers by sharing your QR code!</p>
                                ) : (
                                    caregivers.map((caregiver) => {
                                        const perms = caregiverPermissions[caregiver.id] || {};
                                        return (
                                            <div key={caregiver.id} className="mb-6 p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center text-2xl">
                                                        {caregiver.avatar}
                                                    </div>
                                                    <h4 className="text-xl font-semibold text-black">{caregiver.name}</h4>
                                                </div>
                                                
                                                <div className="space-y-3">
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view documents</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_documents || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_documents', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view medications</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_medications || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_medications', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view appointments</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_appointments || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_appointments', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Can view activities</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.can_view_activities || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'can_view_activities', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                    
                                                    <label className="flex items-center justify-between">
                                                        <span>Receive quick text alerts</span>
                                                        <input
                                                            type="checkbox"
                                                            checked={perms.receive_quick_text_alerts || false}
                                                            onChange={(e) => updateCaregiverPermission(caregiver.id, 'receive_quick_text_alerts', e.target.checked)}
                                                            className="w-6 h-6"
                                                        />
                                                    </label>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                
                                <button 
                                    onClick={() => setShowSettings(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== DOCUMENT QR MANAGER MODAL ===== */}
                    {showDocumentQRManager && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full my-8">
                                <h2 className="text-3xl font-serif text-center mb-6">Document Share Links</h2>
                                
                                <button 
                                    onClick={() => setShowCreateShareLink(true)}
                                    className="w-full bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold mb-6"
                                >
                                    + Create New Share Link
                                </button>
                                
                                {documentShareLinks.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">No share links yet</p>
                                ) : (
                                    <div className="space-y-4">
                                        {documentShareLinks.map(link => (
                                            <div key={link.id} className="p-4 bg-gray-50 rounded-lg">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <h4 className="font-semibold text-lg">{link.link_name}</h4>
                                                        <p className="text-sm text-gray-600">Code: {link.link_code}</p>
                                                    </div>
                                                    <button 
                                                        onClick={() => deleteShareLink(link.id)}
                                                        className="text-red-500 text-xl"
                                                    >
                                                        🗑️
                                                    </button>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        const modal = document.createElement('div');
                                                        modal.innerHTML = `
                                                            <div class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6" onclick="this.remove()">
                                                                <div class="bg-white rounded-3xl p-8 max-w-md w-full" onclick="event.stopPropagation()">
                                                                    <h3 class="text-2xl font-serif text-center mb-6">${link.link_name}</h3>
                                                                    <div id="share-link-qr-${link.link_code}" class="bg-gray-100 rounded-lg p-8 mb-6 flex items-center justify-center min-h-[300px]"></div>
                                                                    <p class="text-center text-gray-600 mb-6">Share Code: ${link.link_code}</p>
                                                                    <button onclick="this.closest('.fixed').remove()" class="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold">Close</button>
                                                                </div>
                                                            </div>
                                                        `;
                                                        document.body.appendChild(modal);
                                                        setTimeout(() => generateShareLinkQR(link.link_code), 300);
                                                    }}
                                                    className="w-full bg-blue-500 text-white py-2 rounded-lg text-sm"
                                                >
                                                    Show QR Code
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                <button 
                                    onClick={() => setShowDocumentQRManager(false)}
                                    className="w-full bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold mt-6"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== CREATE SHARE LINK MODAL ===== */}
                    {showCreateShareLink && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Create Share Link</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-lg font-semibold mb-2">Link Name</label>
                                    <input
                                        type="text"
                                        placeholder="e.g., For Doctor"
                                        value={shareLinkName}
                                        onChange={(e) => setShareLinkName(e.target.value)}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                </div>
                                
                                <div className="mb-6">
                                    <label className="flex items-center gap-3">
                                        <input
                                            type="checkbox"
                                            checked={shareAllDocs}
                                            onChange={(e) => setShareAllDocs(e.target.checked)}
                                            className="w-6 h-6"
                                        />
                                        <span>Share all documents</span>
                                    </label>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => {
                                            setShowCreateShareLink(false);
                                            setShareLinkName('');
                                        }}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={createDocumentShareLink}
                                        className="flex-1 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Create
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== ADD MEDICATION MODAL ===== */}
                    {showAddMedication && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full">
                                <h2 className="text-3xl font-serif text-center mb-6">Add Medication</h2>
                                
                                <div className="space-y-4">
                                    <input
                                        type="text"
                                        placeholder="Medication Name *"
                                        id="med-name"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Dosage (e.g., 10mg)"
                                        id="med-dosage"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <input
                                        type="time"
                                        placeholder="Time"
                                        id="med-time"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg"
                                    />
                                    <textarea
                                        placeholder="Notes (optional)"
                                        id="med-notes"
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg h-24"
                                    />
                                </div>
                                
                                <div className="flex gap-4 mt-6">
                                    <button 
                                        onClick={() => setShowAddMedication(false)}
                                        className="flex-1 bg-gray-300 text-black py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={() => {
                                            const name = document.getElementById('med-name').value;
                                            const dosage = document.getElementById('med-dosage').value;
                                            const time = document.getElementById('med-time').value;
                                            const notes = document.getElementById('med-notes').value;

                        <div className="p-6 pb-32">
                            <div className="flex items-center gap-4 mb-8">
                                <button onClick={() => setCurrentPage('dashboard')} className="text-white text-3xl">←</button>
                                <h1 className="text-4xl font-serif text-white">My Profile</h1>
                            </div>
                            
                            {professionalProfile ? (
                                <div className="bg-white rounded-3xl p-8">
                                    <div className="text-center mb-6">
                                        <div className="w-24 h-24 bg-teal-500 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl">
                                            {currentUser.avatar}
                                        </div>
                                        <h2 className="text-3xl font-serif text-black mb-2">{professionalProfile.full_name}</h2>
                                        <p className="text-gray-600 capitalize mb-2">
                                            {professionalProfile.professional_type.replace('_', ' ')}
                                        </p>
                                        {professionalProfile.is_verified && (
                                            <span className="inline-block bg-green-500 text-white px-4 py-1 rounded-full text-sm font-semibold">
                                                ✓ Verified Professional
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <div className="p-4 bg-gray-50 rounded-lg">
                                            <p className="text-sm text-gray-600 mb-1">License Number</p>
                                            <p className="text-black font-semibold">{professionalProfile.license_number}</p>
                                        </div>
                                        
                                        <div className="p-4 bg-gray-50 rounded-lg">
                                            <p className="text-sm text-gray-600 mb-1">Experience</p>
                                            <p className="text-black font-semibold">{professionalProfile.years_experience} years</p>
                                        </div>
                                        
                                        <div className="p-4 bg-gray-50 rounded-lg">
                                            <p className="text-sm text-gray-600 mb-1">Location</p>
                                            <p className="text-black font-semibold">
                                                {professionalProfile.city}, {professionalProfile.state}
                                            </p>
                                        </div>
                                        
                                        {professionalProfile.bio && (
                                            <div className="p-4 bg-gray-50 rounded-lg">
                                                <p className="text-sm text-gray-600 mb-1">Bio</p>
                                                <p className="text-black">{professionalProfile.bio}</p>
                                            </div>
                                        )}
                                        
                                        <div className="p-4 bg-gray-50 rounded-lg">
                                            <p className="text-sm text-gray-600 mb-1">Hourly Rate</p>
                                            <p className="text-black font-semibold">${professionalProfile.hourly_rate}/hour</p>
                                        </div>
                                    </div>
                                    
                                    <button
                                        onClick={() => setShowProfessionalSetup(true)}
                                        className="w-full mt-6 bg-teal-600 text-white py-3 rounded-lg text-lg font-semibold"
                                    >
                                        Edit Profile
                                    </button>
                                </div>
                            ) : (
                                <div className="text-center py-12">
                                    <p className="text-2xl text-white mb-6">Complete your professional profile</p>
                                    <button
                                        onClick={() => setShowProfessionalSetup(true)}
                                        className="bg-white text-teal-700 px-8 py-4 rounded-full text-lg font-semibold"
                                    >
                                        Setup Profile
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ===== SAFETY PAGE ===== */}
                    {currentPage === 'safety' && (
                        <div className="p-6 pb-32">
                            {renderHeader('Safety')}
                            
                            <div className="text-center mb-8">
                                <h2 className="text-4xl font-serif text-white mb-4">Your Safety Matters</h2>
                                <p className="text-xl text-white/80">We're here to protect you</p>
                            </div>
                            
                            <button 
                                onClick={() => {
                                    alert('🚨 EMERGENCY SOS ACTIVATED! All caregivers have been notified. Emergency services contact information has been sent.');
                                    caregivers.forEach(cg => {
                                        createNotification(
                                            cg.id,
                                            'alert',
                                            '🚨 EMERGENCY SOS',
                                            `${currentUser.name} has activated emergency SOS! Please check on them immediately.`,
                                            'urgent'
                                        );
                                    });
                                }}
                                className="w-full bg-red-600 text-white rounded-3xl p-8 mb-6 shadow-2xl hover:bg-red-700 transition-all transform hover:scale-105"
                            >
                                <div className="text-6xl mb-4">🚨</div>
                                <div className="text-4xl font-bold mb-2">EMERGENCY SOS</div>
                                <p className="text-xl">Press to alert all caregivers immediately</p>
                            </button>
                            
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <button 
                                    onClick={() => setShowProtectionChat(true)}
                                    className="bg-white rounded-2xl p-6 text-center hover:scale-105 transition-transform"
                                >
                                    <div className="text-4xl mb-3">🤖</div>
                                    <p className="text-lg font-semibold text-black">AI Companion</p>
                                    <p className="text-sm text-gray-600">Chat about safety concerns</p>
                                </button>
                                
                                <button 
                                    onClick={() => {
                                        const quickTexts = [
                                            "I'm okay, just checking in",
                                            "I need help with something",
                                            "Can someone call me?",
                                            "Feeling unwell, please check on me"
                                        ];
                                        const selected = prompt(`Choose a quick text:\n1. ${quickTexts[0]}\n2. ${quickTexts[1]}\n3. ${quickTexts[2]}\n4. ${quickTexts[3]}\n\nEnter 1-4:`);
                                        if (selected && quickTexts[parseInt(selected) - 1]) {
                                            sendQuickText(quickTexts[parseInt(selected) - 1]);
                                        }
                                    }}
                                    className="bg-white rounded-2xl p-6 text-center hover:scale-105 transition-transform"
                                >
                                    <div className="text-4xl mb-3">💬</div>
                                    <p className="text-lg font-semibold text-black">Quick Text</p>
                                    <p className="text-sm text-gray-600">Send preset message</p>
                                </button>
                                
                                <button 
                                    onClick={() => {
                                        alert('📞 Calling emergency contact...');
                                        window.location.href = 'tel:911';
                                    }}
                                    className="bg-white rounded-2xl p-6 text-center hover:scale-105 transition-transform"
                                >
                                    <div className="text-4xl mb-3">📞</div>
                                    <p className="text-lg font-semibold text-black">Call 911</p>
                                    <p className="text-sm text-gray-600">Emergency services</p>
                                </button>
                                
                                <button 
                                    onClick={() => {
                                        setBackgroundMonitoring(!backgroundMonitoring);
                                        if (!backgroundMonitoring) {
                                            alert('Background monitoring enabled. We will alert caregivers if unusual patterns are detected.');
                                        } else {
                                            alert('Background monitoring disabled.');
                                        }
                                    }}
                                    className={`rounded-2xl p-6 text-center hover:scale-105 transition-transform ${
                                        backgroundMonitoring ? 'bg-green-500 text-white' : 'bg-white'
                                    }`}
                                >
                                    <div className="text-4xl mb-3">{backgroundMonitoring ? '✅' : '👁️'}</div>
                                    <p className={`text-lg font-semibold ${backgroundMonitoring ? 'text-white' : 'text-black'}`}>
                                        {backgroundMonitoring ? 'Monitoring On' : 'Monitoring Off'}
                                    </p>
                                    <p className={`text-sm ${backgroundMonitoring ? 'text-white/80' : 'text-gray-600'}`}>
                                        Background safety check
                                    </p>
                                </button>
                            </div>
                            
                            <div className="bg-white rounded-3xl p-6 mb-6">
                                <h3 className="text-2xl font-serif text-black mb-4">🛡️ Safety Tips</h3>
                                <div className="space-y-3">
                                    <div className="p-4 bg-blue-50 rounded-lg">
                                        <p className="font-semibold text-black mb-2">Scam Calls</p>
                                        <p className="text-sm text-gray-700">Never give personal info over the phone. Legitimate organizations won't ask for passwords or financial details.</p>
                                    </div>
                                    
                                    <div className="p-4 bg-green-50 rounded-lg">
                                        <p className="font-semibold text-black mb-2">Fall Prevention</p>
                                        <p className="text-sm text-gray-700">Keep walkways clear, use nightlights, and wear non-slip footwear. Don't rush when getting up.</p>
                                    </div>
                                    
                                    <div className="p-4 bg-purple-50 rounded-lg">
                                        <p className="font-semibold text-black mb-2">Medication Safety</p>
                                        <p className="text-sm text-gray-700">Never take more than prescribed. Keep medications in original containers with labels.</p>
                                    </div>
                                    
                                    <div className="p-4 bg-orange-50 rounded-lg">
                                        <p className="font-semibold text-black mb-2">Home Security</p>
                                        <p className="text-sm text-gray-700">Lock doors and windows. Don't open the door to strangers. Ask for ID from service workers.</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-white rounded-3xl p-6">
                                <h3 className="text-2xl font-serif text-black mb-4">📞 Emergency Contacts</h3>
                                <div className="space-y-3">
                                    <button 
                                        onClick={() => window.location.href = 'tel:911'}
                                        className="w-full p-4 bg-red-50 rounded-lg text-left flex items-center justify-between"
                                    >
                                        <div>
                                            <p className="font-semibold text-black">Emergency Services</p>
                                            <p className="text-sm text-gray-600">Police, Fire, Ambulance</p>
                                        </div>
                                        <p className="text-2xl font-bold text-red-600">911</p>
                                    </button>
                                    
                                    <button 
                                        onClick={() => window.location.href = 'tel:988'}
                                        className="w-full p-4 bg-purple-50 rounded-lg text-left flex items-center justify-between"
                                    >
                                        <div>
                                            <p className="font-semibold text-black">Mental Health Crisis</p>
                                            <p className="text-sm text-gray-600">24/7 Support Line</p>
                                        </div>
                                        <p className="text-2xl font-bold text-purple-600">988</p>
                                    </button>
                                    
                                    <button 
                                        onClick={() => window.location.href = 'tel:18003104258'}
                                        className="w-full p-4 bg-blue-50 rounded-lg text-left flex items-center justify-between"
                                    >
                                        <div>
                                            <p className="font-semibold text-black">Poison Control</p>
                                            <p className="text-sm text-gray-600">24/7 Poison Help</p>
                                        </div>
                                        <p className="text-lg font-bold text-blue-600">1-800-310-4258</p>
                                    </button>
                                    
                                    {caregivers.length > 0 && (
                                        <>
                                            <div className="border-t-2 border-gray-200 pt-3 mt-3">
                                                <p className="text-sm font-semibold text-gray-600 mb-3">MY CAREGIVERS</p>
                                            </div>
                                            {caregivers.map(caregiver => (
                                                <button 
                                                    key={caregiver.id}
                                                    onClick={() => {
                                                        setChatWith(caregiver);
                                                        loadMessages(caregiver.id);
                                                    }}
                                                    className="w-full p-4 bg-teal-50 rounded-lg text-left flex items-center gap-3"
                                                >
                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center">
                                                        <span className="text-2xl">{caregiver.avatar}</span>
                                                    </div>
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-black">{caregiver.name}</p>
                                                        <p className="text-sm text-gray-600">Message</p>
                                                    </div>
                                                    <span className="text-teal-600 text-2xl">💬</span>
                                                </button>
                                            ))}
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== CARE CIRCLE PAGE ===== */}
                    {currentPage === 'carecircle' && (
                        <div className="p-6 pb-32">
                            {renderHeader('Care Circle')}
                            
                            <div className="text-center mb-8">
                                <h2 className="text-4xl font-serif text-white mb-4">Your Care Team</h2>
                                <p className="text-xl text-white/80">The people who care about you</p>
                            </div>
                            
                            {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (
                                <div className="bg-white rounded-3xl p-6 mb-6 text-center">
                                    <h3 className="text-2xl font-serif text-black mb-4">Add Caregivers</h3>
                                    <p className="text-gray-600 mb-4">Share this QR code with family members to add them to your care circle</p>
                                    <button 
                                        onClick={() => {
                                            setShowQRCode(true);
                                            setTimeout(() => generateQRCode(currentUser.care_circle_id), 300);
                                        }}
                                        className="bg-teal-600 text-white px-8 py-4 rounded-full text-lg font-semibold"
                                    >
                                        📱 Show My QR Code
                                    </button>
                                </div>
                            )}
                            
                            {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && (
                                <div className="bg-white rounded-3xl p-6 mb-6 text-center">
                                    <h3 className="text-2xl font-serif text-black mb-4">Join a Care Circle</h3>
                                    <p className="text-gray-600 mb-4">Scan a care recipient's QR code to join their care circle</p>
                                    <button 
                                        onClick={startQRScanner}
                                        className="bg-teal-600 text-white px-8 py-4 rounded-full text-lg font-semibold"
                                    >
                                        📷 Scan QR Code
                                    </button>
                                </div>
                            )}
                            
                            {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && caregivers.length > 0 && (
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-2xl font-serif text-black mb-4">My Caregivers</h3>
                                    <div className="space-y-3">
                                        {caregivers.map((caregiver) => (
                                            <div key={caregiver.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-16 h-16 bg-teal-400 rounded-full flex items-center justify-center">
                                                        <span className="text-3xl">{caregiver.avatar}</span>
                                                    </div>
                                                    <div>
                                                        <p className="text-xl font-semibold text-black">{caregiver.name}</p>
                                                        <p className="text-sm text-gray-600">Family Caregiver</p>
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => {
                                                        setChatWith(caregiver);
                                                        loadMessages(caregiver.id);
                                                    }}
                                                    className="bg-teal-600 text-white px-4 py-2 rounded-lg font-semibold"
                                                >
                                                    Message
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && myCareRecipients.length > 0 && (
                                <div className="bg-white rounded-3xl p-6 mb-6">
                                    <h3 className="text-2xl font-serif text-black mb-4">People I Care For</h3>
                                    <div className="space-y-3">
                                        {myCareRecipients.map((recipient) => (
                                            <div key={recipient.id} className="p-4 bg-gray-50 rounded-lg">
                                                <div className="flex items-center justify-between mb-3">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-16 h-16 bg-teal-400 rounded-full flex items-center justify-center">
                                                            <span className="text-3xl">{recipient.avatar}</span>
                                                        </div>
                                                        <div>
                                                            <p className="text-xl font-semibold text-black">{recipient.name}</p>
                                                            <p className="text-sm text-gray-600">Care Recipient</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button
                                                        onClick={() => {
                                                            viewCareRecipientData(recipient);
                                                            setCurrentPage('home');
                                                        }}
                                                        className="flex-1 bg-teal-600 text-white py-2 rounded-lg font-semibold"
                                                    >
                                                        View Dashboard
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            setChatWith(recipient);
                                                            loadMessages(recipient.id);
                                                        }}
                                                        className="flex-1 bg-blue-500 text-white py-2 rounded-lg font-semibold"
                                                    >
                                                        Message
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            <div className="bg-white rounded-3xl p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-2xl font-serif text-black">Communities</h3>
                                    <button
                                        onClick={() => setShowCommunities(true)}
                                        className="text-teal-600 font-semibold"
                                    >
                                        View All →
                                    </button>
                                </div>
                                
                                {communities.length === 0 ? (
                                    <div className="text-center py-8">
                                        <Users className="w-16 h-16 text-gray-300 mx-auto mb-3" />
                                        <p className="text-gray-500">No communities yet</p>
                                        <p className="text-sm text-gray-400 mt-1">Join support groups to connect with others</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-4">
                                        {communities.slice(0, 4).map((community) => (
                                            <button
                                                key={community.id}
                                                onClick={() => {
                                                    setShowCommunities(false);
                                                    setChatWith({ type: 'community', name: community.name, avatar: '👥' });
                                                }}
                                                className="p-4 bg-gray-50 rounded-lg text-center hover:bg-gray-100"
                                            >
                                                <Users className="w-12 h-12 text-teal-600 mx-auto mb-2" />
                                                <p className="font-semibold text-black text-sm">{community.name}</p>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== NAVIGATION BAR ===== */}
                    {renderNavBar()}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SalamaApp />);
    </script>
</body>
</html>
