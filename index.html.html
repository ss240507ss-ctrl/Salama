<html><head><meta http-equiv="Content-Type" content="text/html;charset=UTF-8"/></head><body><!DOCTYPE html><br><html lang="en"><br><head><br>    <meta charset="UTF-8"><br>    <meta name="viewport" content="width=device-width, initial-scale=1.0"><br>    <title>Salama - Elder Care App</title><br>    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script><br>    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><br>    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><br>    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><br>    <script src="https://unpkg.com/lucide@latest"></script><br>    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><br>    <script src="https://unpkg.com/html5-qrcode"></script><br>    <style><br>        * {<br>            margin: 0;<br>            padding: 0;<br>            box-sizing: border-box;<br>        }<br>        body {<br>            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;<br>            -webkit-font-smoothing: antialiased;<br>            overflow-x: hidden;<br>        }<br>        .notification-badge {<br>            position: absolute;<br>            top: -5px;<br>            right: -5px;<br>            background: red;<br>            color: white;<br>            border-radius: 50%;<br>            width: 24px;<br>            height: 24px;<br>            display: flex;<br>            align-items: center;<br>            justify-content: center;<br>            font-size: 12px;<br>            font-weight: bold;<br>        }<br>        @keyframes slideUp {<br>            from {<br>                transform: translateY(-100%);<br>                opacity: 0;<br>            }<br>            to {<br>                transform: translateY(0);<br>                opacity: 1;<br>            }<br>        }<br>        .animate-slideUp {<br>            animation: slideUp 0.3s ease-out;<br>        }<br>        .high-contrast {<br>            filter: contrast(1.5);<br>        }<br>        @keyframes pulse {<br>            0%, 100% { opacity: 1; }<br>            50% { opacity: 0.5; }<br>        }<br>        .animate-pulse {<br>            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;<br>        }<br>        @keyframes spin {<br>            to { transform: rotate(360deg); }<br>        }<br>        .animate-spin {<br>            animation: spin 1s linear infinite;<br>        }<br>        @keyframes bounce {<br>            0%, 100% { transform: translateY(0); }<br>            50% { transform: translateY(-25%); }<br>        }<br>        .animate-bounce {<br>            animation: bounce 1s infinite;<br>        }<br>    </style><br></head><br><body><br>    <div id="root"></div><br><br>    <script type="text/babel"><br>        const { useState, useEffect } = React;<br>        const { createClient } = supabase;<br>        const { Home, Heart, Users, FileText, Shield, Clock, Bell, User, Camera, Mic, Settings, Search, ChevronLeft, ChevronRight, CheckSquare, AlertCircle, CheckCircle, Keyboard, Menu, X } = lucide;<br><br>        // ===== 🔥 REPLACE WITH YOUR SUPABASE CREDENTIALS 🔥 =====<br>        const SUPABASE_URL = 'YOUR_SUPABASE_URL';<br>        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';<br>        // ===== Get from: https://supabase.com/dashboard → Your Project → Settings → API =====<br><br>        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);<br><br>        function SalamaApp() {<br>            // ===== STATE VARIABLES =====<br>            const [currentUser, setCurrentUser] = useState(null);<br>            const [showAuth, setShowAuth] = useState(true);<br>            const [isLogin, setIsLogin] = useState(true);<br>            const [authUsername, setAuthUsername] = useState('');<br>            const [authPassword, setAuthPassword] = useState('');<br>            const [authName, setAuthName] = useState('');<br>            const [authRole, setAuthRole] = useState('care_recipient');<br>            const [showPassword, setShowPassword] = useState(false);<br>            <br>            const [currentPage, setCurrentPage] = useState('home');<br>            const [currentTime, setCurrentTime] = useState(new Date());<br>            const [currentCardIndex, setCurrentCardIndex] = useState(0);<br>            <br>            const [medications, setMedications] = useState([]);<br>            const [appointments, setAppointments] = useState([]);<br>            const [activities, setActivities] = useState([]);<br>            const [memories, setMemories] = useState([]);<br>            const [documents, setDocuments] = useState([]);<br>            const [thoughtRecordings, setThoughtRecordings] = useState([]);<br>            const [caregivers, setCaregivers] = useState([]);<br>            const [careTasks, setCareTasks] = useState([]);<br>            const [communities, setCommunities] = useState([]);<br>            <br>            const [showSidebar, setShowSidebar] = useState(false);<br>            const [showNotifications, setShowNotifications] = useState(false);<br>            const [showAddMedication, setShowAddMedication] = useState(false);<br>            const [showAddAppointment, setShowAddAppointment] = useState(false);<br>            const [showAddActivity, setShowAddActivity] = useState(false);<br>            const [showAddMemory, setShowAddMemory] = useState(false);<br>            const [showDocumentUpload, setShowDocumentUpload] = useState(false);<br>            const [showQRCode, setShowQRCode] = useState(false);<br>            const [showQRScanner, setShowQRScanner] = useState(false);<br>            const [showProfileEdit, setShowProfileEdit] = useState(false);<br>            const [showSettings, setShowSettings] = useState(false);<br>            const [showProtectionChat, setShowProtectionChat] = useState(false);<br>            const [showCommunities, setShowCommunities] = useState(false);<br>            const [showTaskModal, setShowTaskModal] = useState(false);<br>            const [showCareRequestModal, setShowCareRequestModal] = useState(false);<br>            const [showDocumentQRManager, setShowDocumentQRManager] = useState(false);<br>            const [showCreateShareLink, setShowCreateShareLink] = useState(false);<br>            const [showOnboarding, setShowOnboarding] = useState(false);<br>            const [onboardingStep, setOnboardingStep] = useState(0);<br>            <br>            const [editName, setEditName] = useState('');<br>            const [editAvatar, setEditAvatar] = useState('');<br>            const [uploadingFile, setUploadingFile] = useState(false);<br>            <br>            const [isRecording, setIsRecording] = useState(false);<br>            const [mediaRecorder, setMediaRecorder] = useState(null);<br>            const [recordingDuration, setRecordingDuration] = useState(0);<br>            <br>            const [chatWith, setChatWith] = useState(null);<br>            const [messageInput, setMessageInput] = useState('');<br>            const [chatMessages, setChatMessages] = useState([]);<br>            <br>            const [protectionInput, setProtectionInput] = useState('');<br>            const [protectionMessages, setProtectionMessages] = useState([]);<br>            const [isAIThinking, setIsAIThinking] = useState(false);<br>            <br>            const [selectedMood, setSelectedMood] = useState(null);<br>            const [checkInNotes, setCheckInNotes] = useState('');<br>            const [recentMoods, setRecentMoods] = useState([]);<br>            const [recentCheckIns, setRecentCheckIns] = useState([]);<br>            <br>            const [notifications, setNotifications] = useState([]);<br>            const [unreadNotifications, setUnreadNotifications] = useState(0);<br>            <br>            const [timelineEvents, setTimelineEvents] = useState([]);<br>            const [todaysEvents, setTodaysEvents] = useState([]);<br>            const [todaysTip, setTodaysTip] = useState(null);<br>            <br>            const [medicationsTaken, setMedicationsTaken] = useState({});<br>            const [keyMetrics, setKeyMetrics] = useState({<br>                tasksCompleted: 0,<br>                checkInsThisWeek: 0,<br>                missedMedications: 0,<br>                completionRate: 0<br>            });<br>            <br>            const [backgroundMonitoring, setBackgroundMonitoring] = useState(false);<br>            const [monitoringAlerts, setMonitoringAlerts] = useState([]);<br>            <br>            const [caregiverPermissions, setCaregiverPermissions] = useState({});<br>            const [documentShareLinks, setDocumentShareLinks] = useState([]);<br>            const [shareLinkName, setShareLinkName] = useState('');<br>            const [shareAllDocs, setShareAllDocs] = useState(true);<br>            <br>            const [viewingCareRecipient, setViewingCareRecipient] = useState(null);<br>            const [myCareRecipients, setMyCareRecipients] = useState([]);<br>            <br>            const [isProfessional, setIsProfessional] = useState(false);<br>            const [professionalProfile, setProfessionalProfile] = useState(null);<br>            const [professionalForm, setProfessionalForm] = useState({<br>                full_name: '',<br>                professional_type: 'nurse',<br>                license_number: '',<br>                years_experience: 0,<br>                city: '',<br>                state: '',<br>                bio: '',<br>                hourly_rate: 0<br>            });<br>            const [showProfessionalSetup, setShowProfessionalSetup] = useState(false);<br>            const [careRequests, setCareRequests] = useState([]);<br>            const [myAssignments, setMyAssignments] = useState([]);<br>            const [newCareRequest, setNewCareRequest] = useState({<br>                professional_type: 'nurse',<br>                location: '',<br>                urgency_level: 'medium',<br>                care_needs_description: '',<br>                preferred_languages: [],<br>                start_date: '',<br>                duration_weeks: 4<br>            });<br>            const [selectedAssignment, setSelectedAssignment] = useState(null);<br>            const [showDailyCareLogModal, setShowDailyCareLogModal] = useState(false);<br>            const [newTask, setNewTask] = useState({<br>                task_name: '',<br>                description: '',<br>                due_date: '',<br>                priority: 'medium',<br>                assigned_to: null<br>            });<br>            <br>            const [error, setError] = useState(null);<br>            const [isLoading, setIsLoading] = useState(false);<br>            const [isOnline, setIsOnline] = useState(navigator.onLine);<br>            const [pendingActions, setPendingActions] = useState([]);<br>            <br>            const [searchQuery, setSearchQuery] = useState('');<br>            const [debouncedSearch, setDebouncedSearch] = useState('');<br>            const [filterType, setFilterType] = useState('all');<br>            const [showSearch, setShowSearch] = useState(false);<br>            <br>            const [showExportOptions, setShowExportOptions] = useState(false);<br>            const [analyticsData, setAnalyticsData] = useState(null);<br>            <br>            const [fontSize, setFontSize] = useState('normal');<br>            const [highContrast, setHighContrast] = useState(false);<br>            const [voiceAnnouncements, setVoiceAnnouncements] = useState(false);<br>            const [showAccessibilitySettings, setShowAccessibilitySettings] = useState(false);<br><br>            const moods = [<br>                { emoji: '😊', label: 'Great', value: 5 },<br>                { emoji: '🙂', label: 'Good', value: 4 },<br>                { emoji: '😐', label: 'Okay', value: 3 },<br>                { emoji: '😟', label: 'Sad', value: 2 },<br>                { emoji: '😡', label: 'Angry', value: 1 }<br>            ];<br><br>            const professionalTypes = [<br>                { value: 'nurse', label: 'Registered Nurse' },<br>                { value: 'home_health_aide', label: 'Home Health Aide' },<br>                { value: 'physical_therapist', label: 'Physical Therapist' },<br>                { value: 'occupational_therapist', label: 'Occupational Therapist' },<br>                { value: 'social_worker', label: 'Social Worker' },<br>                { value: 'companion', label: 'Companion Caregiver' }<br>            ];<br><br>            // ===== UTILITY FUNCTIONS =====<br>            const formatDuration = (seconds) => {<br>                const mins = Math.floor(seconds / 60);<br>                const secs = seconds % 60;<br>                return `${mins}:${secs.toString().padStart(2, '0')}`;<br>            };<br><br>            const handleError = (errorMessage, context = '') => {<br>                console.error(`Error in ${context}:`, errorMessage);<br>                setError(errorMessage);<br>                createNotification(currentUser?.id || 'system', 'alert', 'Error Occurred', errorMessage);<br>                setTimeout(() => setError(null), 5000);<br>            };<br><br>            const announce = (message) => {<br>                if (!voiceAnnouncements) return;<br>                const utterance = new SpeechSynthesisUtterance(message);<br>                window.speechSynthesis.speak(utterance);<br>            };<br><br>            const filterData = () => {<br>                const query = debouncedSearch.toLowerCase();<br>                let results = [];<br>                <br>                if (filterType === 'all' || filterType === 'medications') {<br>                    results.push(...medications.filter(m => <br>                        m.medication_name.toLowerCase().includes(query)<br>                    ).map(m => ({...m, type: 'medication'})));<br>                }<br>                <br>                if (filterType === 'all' || filterType === 'appointments') {<br>                    results.push(...appointments.filter(a => <br>                        a.appointment_name.toLowerCase().includes(query)<br>                    ).map(a => ({...a, type: 'appointment'})));<br>                }<br>                <br>                if (filterType === 'all' || filterType === 'documents') {<br>                    results.push(...documents.filter(d => <br>                        d.document_name.toLowerCase().includes(query)<br>                    ).map(d => ({...d, type: 'document'})));<br>                }<br>                <br>                if (filterType === 'all' || filterType === 'tasks') {<br>                    results.push(...careTasks.filter(t => <br>                        t.task_name.toLowerCase().includes(query)<br>                    ).map(t => ({...t, type: 'task'})));<br>                }<br>                <br>                return results;<br>            };<br><br>            const generateAnalytics = () => {<br>                setAnalyticsData({<br>                    summary: {<br>                        totalMedications: medications.length,<br>                        totalAppointments: appointments.length,<br>                        totalTasks: careTasks.length,<br>                        completedTasks: careTasks.filter(t => t.status === 'completed').length,<br>                    },<br>                    careCircle: {<br>                        totalCaregivers: caregivers.length<br>                    }<br>                });<br>            };<br><br>            const exportToJSON = () => {<br>                const exportData = {<br>                    exportDate: new Date().toISOString(),<br>                    user: { name: currentUser.name, role: currentUser.role },<br>                    medications, appointments, activities, careTasks<br>                };<br>                <br>                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });<br>                const url = URL.createObjectURL(blob);<br>                const link = document.createElement('a');<br>                link.href = url;<br>                link.download = `salama_export_${new Date().toISOString().split('T')[0]}.json`;<br>                link.click();<br>                URL.revokeObjectURL(url);<br>            };<br><br>            const exportToCSV = (dataType) => {<br>                let csvContent = '';<br>                let filename = '';<br>                <br>                switch(dataType) {<br>                    case 'medications':<br>                        csvContent = 'Medication Name,Dosage,Time,Notes\n';<br>                        medications.forEach(m => {<br>                            csvContent += `"${m.medication_name}","${m.dosage || ''}","${m.time || ''}","${m.notes || ''}"\n`;<br>                        });<br>                        filename = 'medications';<br>                        break;<br>                    case 'appointments':<br>                        csvContent = 'Appointment Name,Date/Time,Location\n';<br>                        appointments.forEach(a => {<br>                            csvContent += `"${a.appointment_name}","${a.appointment_time || ''}","${a.location || ''}"\n`;<br>                        });<br>                        filename = 'appointments';<br>                        break;<br>                    case 'tasks':<br>                        csvContent = 'Task Name,Description,Priority,Status\n';<br>                        careTasks.forEach(t => {<br>                            csvContent += `"${t.task_name}","${t.description || ''}","${t.priority}","${t.status}"\n`;<br>                        });<br>                        filename = 'tasks';<br>                        break;<br>                }<br>                <br>                const blob = new Blob([csvContent], { type: 'text/csv' });<br>                const url = URL.createObjectURL(blob);<br>                const link = document.createElement('a');<br>                link.href = url;<br>                link.download = `salama_${filename}.csv`;<br>                link.click();<br>                URL.revokeObjectURL(url);<br>            };<br>// ===== TIMELINE & NOTIFICATION FUNCTIONS =====<br>            const addToTimeline = (type, title, description, icon, priority = 'normal', completed = false) => {<br>                const event = {<br>                    id: `${type}-${Date.now()}`,<br>                    type, title, description, icon, priority, completed,<br>                    timestamp: new Date().toISOString(),<br>                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })<br>                };<br>                setTimelineEvents(prev => [event, ...prev]);<br>                const today = new Date().toDateString();<br>                if (new Date(event.timestamp).toDateString() === today) {<br>                    setTodaysEvents(prev => [event, ...prev]);<br>                }<br>            };<br><br>            const loadTimelineEvents = () => {<br>                const events = [];<br>                <br>                medications.forEach(med => {<br>                    const taken = medicationsTaken[med.id];<br>                    events.push({<br>                        id: `med-${med.id}`,<br>                        type: taken ? 'medication_taken' : 'medication_pending',<br>                        title: med.medication_name,<br>                        description: med.dosage || '',<br>                        time: med.time,<br>                        icon: '💊',<br>                        priority: 'normal',<br>                        completed: taken,<br>                        timestamp: new Date().toISOString()<br>                    });<br>                });<br>                <br>                appointments.forEach(appt => {<br>                    events.push({<br>                        id: `appt-${appt.id}`,<br>                        type: 'appointment',<br>                        title: appt.appointment_name,<br>                        description: appt.location || '',<br>                        time: appt.appointment_time ? new Date(appt.appointment_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',<br>                        icon: '📅',<br>                        priority: 'normal',<br>                        completed: false,<br>                        timestamp: appt.appointment_time || new Date().toISOString()<br>                    });<br>                });<br>                <br>                careTasks.forEach(task => {<br>                    events.push({<br>                        id: `task-${task.id}`,<br>                        type: task.status === 'completed' ? 'task_completed' : 'task_pending',<br>                        title: task.task_name,<br>                        description: task.description || '',<br>                        time: task.due_date ? new Date(task.due_date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',<br>                        icon: '📋',<br>                        priority: task.priority || 'normal',<br>                        completed: task.status === 'completed',<br>                        timestamp: task.due_date || new Date().toISOString()<br>                    });<br>                });<br>                <br>                setTimelineEvents(events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));<br>                const today = new Date().toDateString();<br>                setTodaysEvents(events.filter(e => new Date(e.timestamp).toDateString() === today));<br>            };<br><br>            const createNotification = (userId, type, title, message, priority = 'normal') => {<br>                const notification = {<br>                    id: Date.now(),<br>                    type, title, message, priority,<br>                    isRead: false,<br>                    timestamp: new Date().toISOString()<br>                };<br>                setNotifications(prev => [notification, ...prev]);<br>                setUnreadNotifications(prev => prev + 1);<br>                if (voiceAnnouncements) announce(title + '. ' + message);<br>            };<br><br>            const loadNotifications = () => {<br>                const unread = notifications.filter(n => !n.isRead).length;<br>                setUnreadNotifications(unread);<br>            };<br><br>            const markNotificationRead = (notificationId) => {<br>                setNotifications(prev => prev.map(n => <br>                    n.id === notificationId ? {...n, isRead: true} : n<br>                ));<br>                setUnreadNotifications(prev => Math.max(0, prev - 1));<br>            };<br><br>            const calculateKeyMetrics = () => {<br>                const completedTasks = careTasks.filter(t => t.status === 'completed').length;<br>                const totalTasks = careTasks.length;<br>                const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;<br>                const missedMeds = medications.filter(m => !medicationsTaken[m.id]).length;<br>                <br>                setKeyMetrics({<br>                    tasksCompleted: completedTasks,<br>                    checkInsThisWeek: recentCheckIns.length,<br>                    missedMedications: missedMeds,<br>                    completionRate<br>                });<br>            };<br><br>            const loadRecentMoods = async () => {<br>                if (!currentUser) return;<br>                try {<br>                    const { data } = await supabase<br>                        .from('daily_checkins')<br>                        .select('mood_emoji')<br>                        .eq('user_id', currentUser.id)<br>                        .order('created_at', { ascending: false })<br>                        .limit(7);<br>                    if (data) setRecentMoods(data.map(d => d.mood_emoji));<br>                } catch (err) {<br>                    console.error('Error loading moods:', err);<br>                }<br>            };<br><br>            const markMedicationTaken = async (medId) => {<br>                setMedicationsTaken(prev => ({...prev, [medId]: true}));<br>                const med = medications.find(m => m.id === medId);<br>                if (med) {<br>                    addToTimeline('medication_taken', `${med.medication_name} Taken`, med.dosage || '', '✅', 'normal', true);<br>                    createNotification(currentUser.id, 'update', 'Medication Taken', `${med.medication_name} marked as taken`, 'normal');<br>                }<br>                loadTimelineEvents();<br>                calculateKeyMetrics();<br>            };<br><br>            const completeOnboardingStep = (step) => {<br>                if (step === 4) {<br>                    setShowOnboarding(false);<br>                    localStorage.setItem('salamaOnboardingComplete', 'true');<br>                } else {<br>                    setOnboardingStep(step + 1);<br>                }<br>            };<br><br>            const skipOnboarding = () => {<br>                setShowOnboarding(false);<br>                localStorage.setItem('salamaOnboardingComplete', 'true');<br>            };<br><br>            // ===== AUTHENTICATION FUNCTIONS =====<br>            const handleAuth = async () => {<br>                if (!authUsername || !authPassword) {<br>                    alert('Please fill in all fields');<br>                    return;<br>                }<br><br>                if (isLogin) {<br>                    const { data, error } = await supabase<br>                        .from('users')<br>                        .select('*')<br>                        .eq('username', authUsername)<br>                        .eq('password', authPassword)<br>                        .single();<br><br>                    if (error || !data) {<br>                        alert('Invalid credentials');<br>                        return;<br>                    }<br><br>                    setCurrentUser(data);<br>                    setIsProfessional(data.role === 'professional' || data.role_type === 'professional');<br>                    setShowAuth(false);<br>                    <br>                    if (data.role === 'professional' || data.role_type === 'professional') {<br>                        loadProfessionalProfile(data.id);<br>                        setCurrentPage('dashboard');<br>                    }<br>                } else {<br>                    if (!authName) {<br>                        alert('Please enter your name');<br>                        return;<br>                    }<br><br>                    const careCircleId = crypto.randomUUID();<br>                    <br>                    const { data, error } = await supabase<br>                        .from('users')<br>                        .insert([{<br>                            username: authUsername,<br>                            password: authPassword,<br>                            name: authName,<br>                            role: authRole === 'professional' ? 'professional' : authRole,<br>                            role_type: authRole,<br>                            avatar: authRole === 'care_recipient' ? '👴' : authRole === 'caregiver' ? '👨' : '👨‍⚕️',<br>                            care_circle_id: authRole === 'care_recipient' ? careCircleId : null<br>                        }])<br>                        .select()<br>                        .single();<br><br>                    if (error) {<br>                        alert('Error creating account: ' + error.message);<br>                        return;<br>                    }<br><br>                    setCurrentUser(data);<br>                    setIsProfessional(authRole === 'professional');<br>                    setShowAuth(false);<br>                    <br>                    if (authRole === 'professional') {<br>                        setShowProfessionalSetup(true);<br>                        setCurrentPage('dashboard');<br>                    }<br>                }<br>            };<br><br>            const logout = () => {<br>                setCurrentUser(null);<br>                setShowAuth(true);<br>                setIsProfessional(false);<br>                setCurrentPage('home');<br>                setViewingCareRecipient(null);<br>                setAuthUsername('');<br>                setAuthPassword('');<br>                setAuthName('');<br>            };<br><br>            const updateProfile = async () => {<br>                const { error } = await supabase<br>                    .from('users')<br>                    .update({ name: editName, avatar: editAvatar })<br>                    .eq('id', currentUser.id);<br><br>                if (error) {<br>                    alert('Error updating profile');<br>                    return;<br>                }<br><br>                setCurrentUser({ ...currentUser, name: editName, avatar: editAvatar });<br>                setShowProfileEdit(false);<br>            };<br><br>            const loadUserData = async (userId) => {<br>                try {<br>                    const { data: medsData } = await supabase.from('medications').select('*').eq('user_id', userId).order('time', { ascending: true });<br>                    if (medsData) setMedications(medsData);<br><br>                    const { data: apptsData } = await supabase.from('appointments').select('*').eq('user_id', userId).order('appointment_time', { ascending: true });<br>                    if (apptsData) setAppointments(apptsData);<br><br>                                       </div><br>                                                ))}<br>                                            </div><br>                                        </div><br>                                    )}<br>                                </div><br>                            </div><br>                        )}<br><br>                        {currentPage === 'carenotes' && (<br>                            <div><br>                                {renderHeader('Care Notes')}<br>                                <br>                                <div className="bg-white rounded-3xl p-6 mb-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">📷 Memories</h3><br>                                    {memories.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No memories yet</p><br>                                    ) : (<br>                                        <div className="grid grid-cols-2 gap-4"><br>                                            {memories.map(mem => (<br>                                                <div key={mem.id} className="relative"><br>                                                    {mem.file_type === 'image' ? (<br>                                                        <img src={mem.file_url} alt={mem.title} className="w-full h-40 object-cover rounded-lg" /><br>                                                    ) : (<br>                                                        <video src={mem.file_url} className="w-full h-40 object-cover rounded-lg" controls /><br>                                                    )}<br>                                                    <button onClick={() => deleteMemory(mem.id, mem.file_url)} className="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full">✕</button><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                    <label className="block w-full mt-4 bg-teal-600 text-white py-3 rounded-lg text-center font-semibold cursor-pointer"><br>                                        + Add Memory<br>                                        <input type="file" accept="image/*,video/*" onChange={uploadMemory} className="hidden" /><br>                                    </label><br>                                </div><br><br>                                <div className="bg-white rounded-3xl p-6 mb-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">📄 Documents</h3><br>                                    {documents.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No documents yet</p><br>                                    ) : (<br>                                        <div className="space-y-3"><br>                                            {documents.map(doc => (<br>                                                <div key={doc.id} className="p-4 bg-gray-50 rounded-lg flex justify-between items-center"><br>                                                    <div><br>                                                        <p className="font-semibold text-black">{doc.document_name}</p><br>                                                        <p className="text-xs text-gray-500">{new Date(doc.uploaded_at).toLocaleDateString()}</p><br>                                                    </div><br>                                                    <a href={doc.file_url} target="_blank" className="text-blue-600">View</a><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                    <label className="block w-full mt-4 bg-teal-600 text-white py-3 rounded-lg text-center font-semibold cursor-pointer"><br>                                        + Upload Document<br>                                        <input type="file" onChange={uploadDocument} className="hidden" /><br>                                    </label><br>                                </div><br><br>                                <div className="bg-white rounded-3xl p-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">🎤 Voice Recordings</h3><br>                                    {thoughtRecordings.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No recordings yet</p><br>                                    ) : (<br>                                        <div className="space-y-3"><br>                                            {thoughtRecordings.map(rec => (<br>                                                <div key={rec.id} className="p-4 bg-gray-50 rounded-lg"><br>                                                    <p className="font-semibold text-black mb-2">{rec.title}</p><br>                                                    <audio src={rec.audio_url} controls className="w-full mb-2" /><br>                                                    <button onClick={() => deleteRecording(rec.id, rec.audio_url)} className="text-red-600 text-sm">Delete</button><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                    {isRecording ? (<br>                                        <div className="mt-4"><br>                                            <div className="text-center mb-4"><br>                                                <p className="text-2xl font-bold text-red-600">{formatDuration(recordingDuration)}</p><br>                                                <p className="text-sm text-gray-600">Recording...</p><br>                                            </div><br>                                            <button onClick={stopRecording} className="w-full bg-red-600 text-white py-3 rounded-lg font-semibold">⏹ Stop Recording</button><br>                                        </div><br>                                    ) : (<br>                                        <button onClick={startRecording} className="w-full mt-4 bg-teal-600 text-white py-3 rounded-lg font-semibold">🎤 Start Recording</button><br>                                    )}<br>                                </div><br>                            </div><br>                        )}<br><br>                        {currentPage === 'safety' && (<br>                            <div><br>                                {renderHeader('Safety')}<br>                                <br>                                <div className="bg-white rounded-3xl p-8 mb-6 text-center"><br>                                    <h2 className="text-3xl font-serif text-black mb-6">Emergency SOS</h2><br>                                    <button onClick={() => {<br>                                        if (confirm('Call emergency services?')) {<br>                                            alert('Emergency services would be contacted. (Demo mode)');<br>                                            caregivers.forEach(cg => {<br>                                                sendMessage();<br>                                            });<br>                                        }<br>                                    }} className="w-48 h-48 bg-red-600 text-white rounded-full mx-auto text-6xl font-bold shadow-2xl hover:bg-red-700 active:scale-95 transition-transform">SOS</button><br>                                    <p className="text-gray-600 mt-6">Press and hold for 3 seconds to activate</p><br>                                </div><br><br>                                <div className="bg-white rounded-3xl p-6 mb-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">🤖 AI Companion</h3><br>                                    <div className="space-y-3 mb-4 max-h-64 overflow-y-auto"><br>                                        {protectionMessages.map((msg, idx) => (<br>                                            <div key={idx} className={`p-3 rounded-lg ${msg.sender === 'me' ? 'bg-teal-100 ml-8' : 'bg-gray-100 mr-8'}`}><br>                                                <p className="text-black">{msg.text}</p><br>                                                <p className="text-xs text-gray-500 mt-1">{msg.time}</p><br>                                            </div><br>                                        ))}<br>                                        {isAIThinking && (<br>                                            <div className="p-3 rounded-lg bg-gray-100 mr-8"><br>                                                <p className="text-gray-500">Salama is typing...</p><br>                                            </div><br>                                        )}<br>                                    </div><br>                                    <div className="flex gap-2"><br>                                        <input type="text" value={protectionInput} onChange={(e) => setProtectionInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && askSalama(protectionInput)} placeholder="Ask Salama anything..." className="flex-1 p-3 border-2 border-gray-300 rounded-lg" /><br>                                        <button onClick={() => askSalama(protectionInput)} className="bg-teal-600 text-white px-6 py-3 rounded-lg font-semibold">Send</button><br>                                    </div><br>                                    <div className="mt-4 flex flex-wrap gap-2"><br>                                        <button onClick={() => askSalama("I'm feeling lonely")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">I'm feeling lonely</button><br>                                        <button onClick={() => askSalama("Tell me a joke")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">Tell me a joke</button><br>                                        <button onClick={() => askSalama("Suspicious phone call")} className="px-4 py-2 bg-gray-100 rounded-lg text-sm">Got suspicious call</button><br>                                    </div><br>                                </div><br><br>                                <div className="bg-white rounded-3xl p-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">📞 Quick Text Caregivers</h3><br>                                    <div className="space-y-2"><br>                                        <button onClick={() => sendQuickText("I need help")} className="w-full bg-red-500 text-white py-3 rounded-lg font-semibold">🚨 I need help</button><br>                                        <button onClick={() => sendQuickText("Please call me")} className="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold">📞 Please call me</button><br>                                        <button onClick={() => sendQuickText("I'm okay")} className="w-full bg-green-500 text-white py-3 rounded-lg font-semibold">✅ I'm okay</button><br>                                    </div><br>                                </div><br>                            </div><br>                        )}<br><br>                        {currentPage === 'carecircle' && (<br>                            <div><br>                                {renderHeader('Care Circle')}<br>                                <br>                                <div className="bg-white rounded-3xl p-6 mb-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">👥 My Caregivers</h3><br>                                    {caregivers.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No caregivers yet. Share your QR code!</p><br>                                    ) : (<br>                                        <div className="space-y-3"><br>                                            {caregivers.map(cg => (<br>                                                <div key={cg.id} className="p-4 bg-gray-50 rounded-lg flex items-center gap-4"><br>                                                    <div className="w-12 h-12 bg-teal-400 rounded-full flex items-center justify-center text-2xl">{cg.avatar}</div><br>                                                    <div className="flex-1"><br>                                                        <p className="font-semibold text-black">{cg.name}</p><br>                                                        <p className="text-sm text-gray-600">{cg.relationship || 'Family'}</p><br>                                                    </div><br>                                                    <button onClick={() => { setChatWith(cg); setChatMessages([]); }} className="text-blue-600">Chat</button><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                </div><br><br>                                {(currentUser.role === 'care_recipient' || currentUser.role_type === 'care_recipient') && (<br>                                    <div className="bg-white rounded-3xl p-6"><br>                                        <h3 className="text-xl font-semibold text-black mb-4">📱 Share QR Code</h3><br>                                        <p className="text-gray-600 mb-4">Let caregivers scan this to join your care circle</p><br>                                        <button onClick={() => {<br>                                            setShowQRCode(true);<br>                                            setTimeout(() => generateQRCode(currentUser.care_circle_id), 100);<br>                                        }} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold">Show My QR Code</button><br>                                    </div><br>                                )}<br><br>                                {(currentUser.role === 'caregiver' || currentUser.role_type === 'family_caregiver') && (<br>                                    <div className="bg-white rounded-3xl p-6"><br>                                        <h3 className="text-xl font-semibold text-black mb-4">📷 Scan QR Code</h3><br>                                        <p className="text-gray-600 mb-4">Scan a care recipient's QR code to join their circle</p><br>                                        <button onClick={startQRScanner} className="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold">Open Scanner</button><br>                                    </div><br>                                )}<br>                            </div><br>                        )}<br><br>                        {currentPage === 'dashboard' && isProfessional && (<br>                            <div><br>                                {renderHeader('Dashboard')}<br>                                <br>                                <div className="bg-white rounded-3xl p-6 mb-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">Professional Dashboard</h3><br>                                    {professionalProfile ? (<br>                                        <div><br>                                            <p className="text-lg text-black">Welcome, {professionalProfile.full_name}!</p><br>                                            <p className="text-gray-600">{professionalProfile.professional_type}</p><br>                                            <div className="mt-4 flex gap-2"><br>                                                <button onClick={() => updateProfessionalAvailability('available')} className="flex-1 bg-green-500 text-white py-2 rounded-lg">Available</button><br>                                                <button onClick={() => updateProfessionalAvailability('busy')} className="flex-1 bg-orange-500 text-white py-2 rounded-lg">Busy</button><br>                                                <button onClick={() => updateProfessionalAvailability('offline')} className="flex-1 bg-gray-500 text-white py-2 rounded-lg">Offline</button><br>                                            </div><br>                                        </div><br>                                    ) : (<br>                                        <p className="text-gray-500">Complete your profile to start receiving requests</p><br>                                    )}<br>                                </div><br><br>                                <div className="bg-white rounded-3xl p-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">My Assignments</h3><br>                                    {myAssignments.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No active assignments</p><br>                                    ) : (<br>                                        <div className="space-y-3"><br>                                            {myAssignments.map(assignment => (<br>                                                <div key={assignment.id} className="p-4 bg-gray-50 rounded-lg"><br>                                                    <p className="font-semibold text-black">{assignment.care_recipient.name}</p><br>                                                    <p className="text-sm text-gray-600">Started: {new Date(assignment.start_date).toLocaleDateString()}</p><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                </div><br>                            </div><br>                        )}<br><br>                        {currentPage === 'requests' && isProfessional && (<br>                            <div><br>                                {renderHeader('Care Requests')}<br>                                <br>                                <div className="bg-white rounded-3xl p-6"><br>                                    <h3 className="text-xl font-semibold text-black mb-4">Open Requests</h3><br>                                    {careRequests.length === 0 ? (<br>                                        <p className="text-gray-500 text-center py-8">No open requests</p><br>                                    ) : (<br>                                        <div className="space-y-4"><br>                                            {careRequests.map(request => (<br>                                                <div key={request.id} className="p-4 bg-gray-50 rounded-lg"><br>                                                    <p className="font-semibold text-black mb-2">{request.professional_type}</p><br>                                                    <p className="text-sm text-gray-600 mb-2">{request.care_needs_description}</p><br>                                                    <p className="text-xs text-gray-500 mb-3">📍 {request.location}</p><br>                                                    <button onClick={() => respondToCareRequest(request.id, 'interested', 'I am interested in this position')} className="w-full bg-teal-600 text-white py-2 rounded-lg">Express Interest</button><br>                                                </div><br>                                            ))}<br>                                        </div><br>                                    )}<br>                                </div><br>                            </div><br>                        )}<br>                    </div><br><br>                    {renderNavBar()}<br>                </div><br>            );<br>        }<br><br>        const root = ReactDOM.createRoot(document.getElementById('root'));<br>        root.render(<SalamaApp />);<br>    </script><br></body><br></html></body></html>
